name = "byeduin-vives"
type = "javascript"
compatibility_date = "2024-11-21"

[build]
command = "echo \"const ALADIN_TTB_KEY = '$ALADIN_TTB_KEY';\" > public/book-share/config.js"
publish = "public"

[functions]
directory = "functions"

[[functions]]
name = "signage-image"
max_execution_ms = 26000

[env.production]
routes = [
  { pattern = "byeduin.kr/*", zone_name = "byeduin.kr" }
]
