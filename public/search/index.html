<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>에듀서치 — byeduin</title>
  <link rel="icon" href="/logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="/common/hero-theme.css">
  <script src="/common/theme.js"></script>
  <script src="/common/init.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Segoe UI", sans-serif;
    }

    /* ── 전체 레이아웃 ── */
    .app-layout {
      display: flex;
      height: 100vh;
      background: var(--bg);
    }

    /* ══════════════════════════════════════
       사이드바
    ══════════════════════════════════════ */
    .app-sidebar {
      width: 260px;
      min-width: 220px;
      height: 100%;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
      flex-shrink: 0;
    }

    /* 좌상단 오버레이(Home 버튼) 영역 확보 */
    .sidebar-top-pad { height: 56px; flex-shrink: 0; position: relative; }

    .sidebar-brand {
      position: absolute;
      bottom: 8px;
      left: 16px;
      right: 16px;
      padding: 0;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: -0.01em;
      color: var(--fg);
      z-index: 10;
    }

    .new-chat-btn {
      margin: 0 10px 10px;
      padding: 9px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: none;
      font-size: 13px;
      font-weight: 600;
      color: var(--fg-muted);
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .new-chat-btn:hover {
      background: var(--card-bg);
      border-color: var(--primary);
      color: var(--primary);
    }

    .sidebar-scrollable {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 16px;
    }

    .sidebar-section-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px 4px;
      font-size: 10px;
      font-weight: 700;
      color: var(--fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .sidebar-label-btn {
      font-size: 10px;
      color: var(--fg-muted);
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.12s;
    }
    .sidebar-label-btn:hover { color: var(--danger); }

    /* 대화 목록 */
    .conv-item {
      padding: 7px 14px;
      font-size: 12px;
      color: var(--fg);
      cursor: pointer;
      border-radius: 8px;
      margin: 1px 8px;
      transition: background 0.12s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.5;
    }
    .conv-item:hover { background: var(--card-bg); }
    .conv-item.active {
      background: rgba(0,111,238,0.1);
      color: var(--primary);
      font-weight: 600;
    }
    .conv-item-empty {
      padding: 8px 16px;
      font-size: 11px;
      color: var(--fg-muted);
      font-style: italic;
    }

    .sidebar-divider {
      height: 1px;
      background: var(--border);
      margin: 10px 12px;
    }

    /* 문서 트리 */
    .tree-category { margin-bottom: 2px; }
    .tree-cat-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      color: var(--fg-muted);
      border-radius: 6px;
      margin: 0 6px;
      transition: background 0.12s;
      user-select: none;
    }
    .tree-cat-header:hover { background: var(--card-bg); }
    .tree-cat-header .arrow {
      font-size: 9px;
      transition: transform 0.15s;
      display: inline-block;
    }
    .tree-cat-header.open .arrow { transform: rotate(90deg); }

    .tree-files { display: none; }
    .tree-files.open { display: block; }

    .tree-file {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px 5px 22px;
      font-size: 12px;
      cursor: pointer;
      color: var(--fg);
      border-radius: 6px;
      margin: 1px 6px;
      transition: background 0.12s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tree-file:hover { background: var(--card-bg); }
    .tree-file.active {
      background: rgba(0,111,238,0.1);
      color: var(--primary);
      font-weight: 600;
    }

    .tree-loading {
      padding: 16px;
      text-align: center;
    }
    .tree-loading::after {
      content: '';
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .tree-empty {
      padding: 12px 16px;
      font-size: 11px;
      color: var(--fg-muted);
      text-align: center;
      line-height: 1.6;
    }

    /* ══════════════════════════════════════
       메인 영역
    ══════════════════════════════════════ */
    .app-main {
      flex: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .main-view {
      display: none;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }
    .main-view.active { display: flex; }

    /* ── 환영 화면 ── */
    .welcome-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 40px 40px;
      overflow-y: auto;
    }

    .welcome-icon { font-size: 52px; margin-bottom: 16px; }

    .welcome-title {
      font-size: 26px;
      font-weight: 800;
      color: var(--fg);
      margin: 0 0 8px;
      letter-spacing: -0.02em;
      text-align: center;
    }

    .welcome-desc {
      font-size: 14px;
      color: var(--fg-muted);
      text-align: center;
      line-height: 1.7;
      margin: 0 0 32px;
      max-width: 460px;
    }

    .welcome-input-box {
      width: 100%;
      max-width: 600px;
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .welcome-input {
      flex: 1;
      padding: 13px 18px;
      border-radius: 14px;
      border: 2px solid var(--border);
      background: var(--card-bg);
      font-size: 15px;
      color: var(--fg);
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .welcome-input:focus { border-color: var(--primary); }
    .welcome-input::placeholder { color: var(--fg-muted); }

    .welcome-submit {
      padding: 13px 24px;
      border-radius: 14px;
      border: none;
      background: var(--primary);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .welcome-submit:hover { background: var(--primary-h); }

    .welcome-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 600px;
    }
    .welcome-chip {
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      font-size: 12px;
      color: var(--fg-muted);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.12s;
    }
    .welcome-chip:hover { border-color: var(--primary); color: var(--primary); }

    /* 최근 문서 */
    .recent-docs-wrap {
      width: 100%;
      max-width: 600px;
      margin-top: 24px;
    }
    .recent-docs-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }
    .recent-doc-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      margin-bottom: 6px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .recent-doc-item:hover { border-color: var(--primary); background: rgba(0,111,238,0.04); }
    .recent-doc-icon { font-size: 14px; flex-shrink: 0; }
    .recent-doc-info { flex: 1; min-width: 0; }
    .recent-doc-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--fg);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .recent-doc-meta {
      font-size: 11px;
      color: var(--fg-muted);
      margin-top: 1px;
    }

    /* ── 채팅 화면 ── */
    .chat-filter-bar {
      flex-shrink: 0;
      padding: 8px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      border-bottom: 1px solid var(--border);
      align-items: center;
      height: 32px;
    }
    .cat-chip {
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: none;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      color: var(--fg-muted);
      font-family: inherit;
      transition: all 0.12s;
    }
    .cat-chip.selected {
      background: rgba(0,111,238,0.12);
      border-color: var(--primary);
      color: var(--primary);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 0; /* flexbox에서 overflow 작동 위해 필수 */
    }

    /* 채팅 메시지 */
    .chat-turn { display: flex; flex-direction: column; gap: 8px; }

    .chat-user {
      align-self: flex-end;
      background: var(--primary);
      color: #fff;
      border-radius: 16px 16px 4px 16px;
      padding: 10px 15px;
      font-size: 14px;
      max-width: 75%;
      line-height: 1.5;
    }

    .chat-ai { align-self: flex-start; max-width: 90%; }
    .chat-ai-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 4px 16px 16px 16px;
      padding: 14px 16px;
    }
    .chat-ai-body { font-size: 13px; line-height: 1.8; color: var(--fg); }
    .chat-ai-body h1, .chat-ai-body h2, .chat-ai-body h3 { font-weight: 700; margin: 0.8em 0 0.3em; font-size: 1.05em; }
    .chat-ai-body p { margin: 0.4em 0; }
    .chat-ai-body ul, .chat-ai-body ol { padding-left: 1.4em; margin: 0.4em 0; }
    .chat-ai-body li { margin: 0.2em 0; }
    .chat-ai-body strong { font-weight: 700; }
    .chat-ai-body code { background: rgba(0,111,238,0.08); padding: 1px 5px; border-radius: 4px; font-size: 0.87em; }
    .chat-ai-body table { border-collapse: collapse; width: 100%; margin: 0.8em 0; font-size: 12px; }
    .chat-ai-body th, .chat-ai-body td { border: 1px solid var(--border); padding: 5px 8px; }
    .chat-ai-body th { background: rgba(0,0,0,0.04); font-weight: 700; }

    .chat-sources {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--fg-muted);
    }
    .chat-sources-label { font-weight: 700; margin-bottom: 4px; }
    .source-chip {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 4px;
      background: rgba(0,111,238,0.08);
      color: var(--primary);
      font-size: 10px;
      font-weight: 600;
      margin: 2px 2px 0 0;
      transition: all 0.12s;
    }
    .source-chip:hover {
      background: rgba(0,111,238,0.2);
      transform: scale(1.05);
    }

    .chat-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .chat-action-btn {
      padding: 5px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: none;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      color: var(--fg-muted);
      font-family: inherit;
      transition: all 0.12s;
    }
    .chat-action-btn:hover { border-color: var(--primary); color: var(--primary); }

    /* 로딩 점 */
    .chat-thinking {
      align-self: flex-start;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 12px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      font-size: 12px;
      color: var(--fg-muted);
    }
    .thinking-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--primary);
      opacity: 0.4;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dot:nth-child(3) { animation-delay: 0.4s; }

    /* 채팅 입력창 */
    .chat-input-bar {
      flex-shrink: 0;
      padding: 12px 20px 16px;
      border-top: 1px solid var(--border);
      background: var(--bg);
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .chat-input-bar input {
      flex: 1;
      padding: 11px 16px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--card-bg);
      font-size: 14px;
      color: var(--fg);
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .chat-input-bar input:focus { border-color: var(--primary); }
    .chat-input-bar input::placeholder { color: var(--fg-muted); }
    .chat-send-btn {
      padding: 11px 20px;
      border-radius: 12px;
      border: none;
      background: var(--primary);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .chat-send-btn:hover { background: var(--primary-h); }
    .chat-send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── 문서 화면 ── */
    .doc-header {
      flex-shrink: 0;
      padding: 74px 28px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg);
      position: relative;
      z-index: 10;
    }
    .doc-meta { flex: 1; min-width: 0; }
    .doc-filename {
      font-size: 15px;
      font-weight: 700;
      color: var(--fg);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .doc-path { font-size: 11px; color: var(--fg-muted); }
    .doc-action-btn {
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: none;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      color: var(--fg-muted);
      font-family: inherit;
      transition: all 0.12s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .doc-action-btn:hover { border-color: var(--primary); color: var(--primary); }

    /* 텍스트 선택 팝업 */
    .selection-popup {
      position: fixed;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 0;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      z-index: 1000;
      display: none;
      min-width: 140px;
    }
    .selection-popup.active { display: flex; flex-direction: column; }
    .selection-popup-btn {
      padding: 8px 12px;
      background: none;
      border: none;
      text-align: left;
      font-size: 12px;
      font-weight: 500;
      color: var(--fg);
      cursor: pointer;
      font-family: inherit;
      transition: background 0.12s;
    }
    .selection-popup-btn:hover { background: rgba(0,111,238,0.08); color: var(--primary); }

    .doc-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
      margin-top: 0;
    }

    /* MD 렌더링 */
    .md-body { font-size: 14px; line-height: 1.8; color: var(--fg); }
    .md-body h1, .md-body h2, .md-body h3 { font-weight: 700; margin: 1.2em 0 0.4em; }
    .md-body h1 { font-size: 1.4em; border-bottom: 1px solid var(--border); padding-bottom: 0.4em; }
    .md-body h2 { font-size: 1.2em; }
    .md-body h3 { font-size: 1.05em; }
    .md-body p { margin: 0.6em 0; }
    .md-body ul, .md-body ol { padding-left: 1.5em; margin: 0.5em 0; }
    .md-body li { margin: 0.25em 0; }
    .md-body table { border-collapse: collapse; width: 100%; margin: 1em 0; font-size: 13px; }
    .md-body th, .md-body td { border: 1px solid var(--border); padding: 6px 10px; }
    .md-body th { background: var(--card-bg); font-weight: 700; }
    .md-body code { background: var(--card-bg); padding: 1px 5px; border-radius: 4px; font-size: 0.88em; }
    .md-body pre { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; overflow-x: auto; }
    .md-body blockquote { border-left: 3px solid var(--primary); padding-left: 12px; margin: 0.8em 0; color: var(--fg-muted); }
    .md-body a { color: var(--primary); }
    .md-body hr { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; }

    /* 애니메이션 */
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.1); }
    }

    /* 모바일 삼선 버튼 */
    .sidebar-toggle-btn {
      display: none;
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: var(--fg);
      padding: 8px 12px;
      margin-right: 8px;
      transition: color 0.12s;
    }
    .sidebar-toggle-btn:hover { color: var(--primary); }

    /* 반응형 */
    @media (max-width: 640px) {
      .sidebar-toggle-btn { display: block; }
      .app-sidebar {
        width: 260px;
        position: fixed;
        left: 0;
        top: 0;
        height: 100vh;
        transform: translateX(-260px);
        transition: transform 0.3s ease;
        z-index: 999;
        box-shadow: 0 0 0 9999px rgba(0,0,0,0);
      }
      .app-sidebar.sidebar-open {
        transform: translateX(0);
        box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
      }
      .sidebar-brand { display: none; }
      .app-sidebar.sidebar-open .sidebar-brand { display: block; }
      .chat-messages { padding: 16px; }
      .doc-body { padding: 16px; }
      .welcome-wrap { padding: 56px 20px 24px; }
    }

    @media (min-width: 641px) {
      .sidebar-brand { display: block; }
    }
  </style>
</head>
<body>

  <!-- 좌상단: 삼선 + 홈 -->
  <div class="top-overlay-left">
    <button id="sidebarToggleBtn" class="sidebar-toggle-btn" onclick="toggleSidebar()" title="사이드바">☰</button>
    <a href="/" class="overlay-btn" title="홈">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Home</span>
    </a>
  </div>

  <!-- 우상단: 테마 + 공유 -->
  <div class="top-overlay">
    <button id="themeToggleBtn" class="overlay-btn" onclick="cycleTheme()" title="보기 모드">💻</button>
    <button class="overlay-btn" onclick="shareCurrentPage()" title="공유">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
        <polyline points="16 6 12 2 8 6"/>
        <line x1="12" x2="12" y1="2" y2="15"/>
      </svg>
      <span>공유</span>
    </button>
  </div>

  <div class="app-layout">
    <!-- ═══════════ 사이드바 ═══════════ -->
    <aside class="app-sidebar">
      <!-- Home 버튼 영역 확보 -->
      <div class="sidebar-top-pad"></div>

      <!-- 새 대화 -->
      <button class="new-chat-btn" onclick="newChat()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        새 대화
      </button>

      <div class="sidebar-scrollable">
        <!-- 대화 목록 -->
        <div class="sidebar-section-label">
          <span>대화 목록</span>
          <button class="sidebar-label-btn" onclick="clearHistory()">지우기</button>
        </div>
        <div id="convList"></div>

        <div class="sidebar-divider"></div>

        <!-- 에듀서치 브랜드 + 문서 목록 -->
        <div style="padding: 14px 16px 8px;">
          <div style="font-size: 14px; font-weight: 800; color: var(--fg); margin-bottom: 10px; letter-spacing: -0.01em;">🔎 에듀서치</div>
          <div style="font-size: 10px; font-weight: 700; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.06em;">문서 목록</div>
        </div>
        <div id="treePanel">
          <div class="tree-loading"></div>
        </div>
      </div>
    </aside>

    <!-- ═══════════ 메인 영역 ═══════════ -->
    <main class="app-main">

      <!-- 🏠 환영 화면 (기본) -->
      <div id="welcomeView" class="main-view active">
        <div class="welcome-wrap">
          <div class="welcome-icon">🔎</div>
          <h1 class="welcome-title">에듀서치</h1>
          <p class="welcome-desc">
            교육법규·교육과정·실무지침·교육청 계획서 등 교육 관련 문서를<br>
            자연어로 검색하고, AI 답변과 근거 출처를 함께 확인하세요.
          </p>
          <div class="welcome-input-box">
            <input
              type="text" id="welcomeInput" class="welcome-input"
              placeholder="무엇이 궁금하신가요?"
              onkeydown="if(event.key==='Enter')startFromWelcome()"
            >
            <button class="welcome-submit" onclick="startFromWelcome()">검색</button>
          </div>
          <div class="welcome-chips">
            <button class="welcome-chip" onclick="welcomeChip(this)">초등학교 법정 수업 일수는?</button>
            <button class="welcome-chip" onclick="welcomeChip(this)">학교생활기록부 기재 원칙</button>
            <button class="welcome-chip" onclick="welcomeChip(this)">교원 연수 이수 시간 기준</button>
            <button class="welcome-chip" onclick="welcomeChip(this)">2022 개정 교육과정 주요 변경사항</button>
          </div>
          <!-- 최근 업데이트 문서 -->
          <div class="recent-docs-wrap" id="recentDocsWrap" style="display:none">
            <div class="recent-docs-label">최근 업데이트 문서</div>
            <div id="recentDocsList"></div>
          </div>
        </div>
      </div>

      <!-- 💬 채팅 화면 -->
      <div id="chatView" class="main-view">
        <!-- 대화 제목 표시 -->
        <div class="chat-filter-bar" id="chatTitle" style="padding-left: 24px; display: flex; align-items: center;">
          <span id="chatTitleText" style="font-weight: 500; font-size: 13px; color: var(--fg-muted);">새 대화</span>
        </div>
        <!-- 메시지 영역 -->
        <div class="chat-messages" id="chatArea"></div>
        <!-- 입력창 -->
        <div class="chat-input-bar">
          <input
            type="text" id="searchInput"
            placeholder="질문을 입력하세요"
            onkeydown="if(event.key==='Enter')doSearch()"
          >
          <button class="chat-send-btn" id="searchBtn" onclick="doSearch()">검색</button>
        </div>
      </div>

      <!-- 📄 문서 화면 -->
      <div id="docView" class="main-view" style="display: flex; flex-direction: column;">
        <!-- 상단: 채팅창 같은 제목 표시 -->
        <div id="docTitleBar" style="flex-shrink: 0; padding: 8px 24px; border-bottom: 1px solid var(--border); height: 32px; display: flex; align-items: center;">
          <div id="docTitleText" style="font-weight: 500; font-size: 13px; color: var(--fg-muted);">문서</div>
        </div>

        <!-- 본문 -->
        <div class="doc-body" id="docBody" style="flex: 1; overflow-y: auto; min-height: 0; padding: 20px 32px;">
          <div class="md-body" id="docContent"></div>
        </div>

        <!-- 하단: 버튼들 중앙 배치 -->
        <div style="flex-shrink: 0; display: flex; justify-content: center; gap: 8px; padding: 12px 20px 16px; border-top: 1px solid var(--border);">
          <button class="doc-action-btn" onclick="summarizeDoc()" title="AI로 문서 요약">📝 요약</button>
          <button class="doc-action-btn" onclick="askAboutDoc()" title="이 문서에 대해 질문">💬 질문</button>
          <button class="doc-action-btn" id="docOpenBtn" title="MD Editor에서 열기">🔗 MD로 열기</button>
        </div>
      </div>

      <!-- 텍스트 선택 팝업 -->
      <div class="selection-popup" id="selectionPopup">
        <button class="selection-popup-btn" onclick="askAboutSelection()">선택 부분에 대해 질문</button>
      </div>

    </main>
  </div>

  <script>
    /* ─────────────────────────────────────────
       설정
    ───────────────────────────────────────── */
    const REPO         = 'eduinside/byeduin-edu-docs';
    const RAW_BASE     = `https://raw.githubusercontent.com/${REPO}/main`;
    const TREE_API     = `https://api.github.com/repos/${REPO}/git/trees/main?recursive=1`;
    const LS_HISTORY   = 'edu-search-history';
    const LS_TREE      = 'edu-search-tree-cache';
    const LS_TREE_TS   = 'edu-search-tree-ts';
    const TREE_TTL     = 10 * 60 * 1000;

    let currentChatTitle = '새 대화';

    /* ─────────────────────────────────────────
       대화 제목 관리
    ───────────────────────────────────────── */
    function updateChatTitle(query) {
      // 첫 검색어를 기반으로 제목 생성 (최대 20자, 말줄임표 제거)
      let title = query.trim().substring(0, 20);
      currentChatTitle = title || '새 대화';
      document.getElementById('chatTitleText').textContent = currentChatTitle;
    }

    /* ─────────────────────────────────────────
       사이드바 토글 (모바일)
    ───────────────────────────────────────── */
    function toggleSidebar() {
      const sidebar = document.querySelector('.app-sidebar');
      sidebar.classList.toggle('sidebar-open');
    }

    /* ─────────────────────────────────────────
       뷰 전환
    ───────────────────────────────────────── */
    function showView(name) {
      document.querySelectorAll('.main-view').forEach(v => v.classList.remove('active'));
      document.getElementById(name + 'View').classList.add('active');
    }

    /* ─────────────────────────────────────────
       환영 화면
    ───────────────────────────────────────── */
    function startFromWelcome() {
      const q = document.getElementById('welcomeInput').value.trim();
      if (!q) return;
      document.getElementById('searchInput').value = q;
      document.getElementById('welcomeInput').value = '';
      showView('chat');
      doSearch();
    }

    function welcomeChip(btn) {
      document.getElementById('welcomeInput').value = btn.textContent;
      startFromWelcome();
    }

    /* ─────────────────────────────────────────
       새 대화
    ───────────────────────────────────────── */
    function newChat() {
      document.getElementById('chatArea').innerHTML = '';
      document.getElementById('searchInput').value = '';
      document.querySelectorAll('.conv-item').forEach(i => i.classList.remove('active'));
      selectedCats.clear();
      document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('selected'));
      const allChip = document.querySelector('.cat-chip[data-cat=""]');
      if (allChip) allChip.classList.add('selected');
      showView('welcome');
      setTimeout(() => document.getElementById('welcomeInput')?.focus(), 50);
    }

    /* ─────────────────────────────────────────
       최근 업데이트 문서 로드
    ───────────────────────────────────────── */
    async function loadRecentDocs() {
      try {
        // 최근 커밋 3개 조회
        const commitsRes = await fetch(
          `https://api.github.com/repos/${REPO}/commits?per_page=10`
        );
        if (!commitsRes.ok) return;
        const commits = await commitsRes.json();

        // 각 커밋에서 .md 파일 추출 (병렬)
        const detailResults = await Promise.all(
          commits.slice(0, 5).map(c =>
            fetch(`https://api.github.com/repos/${REPO}/commits/${c.sha}`)
              .then(r => r.ok ? r.json() : null)
              .then(d => d ? { date: c.commit.committer.date, files: d.files || [] } : null)
              .catch(() => null)
          )
        );

        // 중복 없이 최근 .md 파일 최대 3개 추출 (README 제외)
        const seen = new Set();
        const recent = [];
        for (const detail of detailResults) {
          if (!detail) continue;
          for (const file of detail.files) {
            if (!file.filename.endsWith('.md')) continue;
            if (file.filename.toLowerCase().endsWith('readme.md')) continue; // README 제외
            if (seen.has(file.filename)) continue;
            seen.add(file.filename);
            recent.push({ path: file.filename, date: detail.date });
            if (recent.length >= 3) break;
          }
          if (recent.length >= 3) break;
        }

        if (recent.length === 0) return;

        const list = document.getElementById('recentDocsList');
        list.innerHTML = recent.map(item => {
          const name = item.path.split('/').pop().replace(/\.md$/, '');
          const cat  = item.path.split('/')[0] || '';
          const date = new Date(item.date);
          const dateStr = `${date.getFullYear()}.${String(date.getMonth()+1).padStart(2,'0')}.${String(date.getDate()).padStart(2,'0')}`;
          return `
            <div class="recent-doc-item" data-path="${item.path}" onclick="openRecentDoc('${item.path}')">
              <span class="recent-doc-icon">${catIcon(cat)}</span>
              <div class="recent-doc-info">
                <div class="recent-doc-name">${escHtml(name)}</div>
                <div class="recent-doc-meta">${escHtml(cat)} · ${dateStr} 업데이트</div>
              </div>
            </div>`;
        }).join('');

        document.getElementById('recentDocsWrap').style.display = '';
      } catch { /* 조용히 실패 */ }
    }

    function openRecentDoc(path) {
      const treeFile = document.querySelector(`.tree-file[data-path="${path}"]`);
      if (treeFile) openFile(treeFile);
      else openFile(path);
    }

    /* ─────────────────────────────────────────
       트리 데이터 로드
    ───────────────────────────────────────── */
    let treeData = null;

    async function loadTree() {
      const ts = parseInt(localStorage.getItem(LS_TREE_TS) || '0');
      if (Date.now() - ts < TREE_TTL) {
        const cached = localStorage.getItem(LS_TREE);
        if (cached) { treeData = JSON.parse(cached); renderTree(); return; }
      }

      try {
        const res = await fetch(TREE_API);
        if (!res.ok) throw new Error();
        const json = await res.json();

        const cats = {};
        (json.tree || [])
          .filter(f => f.type === 'blob' && f.path.endsWith('.md') && f.path.includes('/'))
          .forEach(f => {
            const parts = f.path.split('/');
            const cat = parts.length > 1 ? parts[0] : '기타';
            const name = parts[parts.length - 1].replace(/\.md$/, '');
            if (!cats[cat]) cats[cat] = [];
            cats[cat].push({ name, path: f.path });
          });

        treeData = { categories: cats };
        localStorage.setItem(LS_TREE, JSON.stringify(treeData));
        localStorage.setItem(LS_TREE_TS, String(Date.now()));
        renderTree();
        buildCatFilter(Object.keys(cats));
      } catch {
        document.getElementById('treePanel').innerHTML =
          '<div class="tree-empty">문서 목록을 불러오지<br>못했습니다.</div>';
      }
    }

    function renderTree() {
      const panel = document.getElementById('treePanel');
      const cats  = treeData.categories;
      const names = Object.keys(cats);

      if (names.length === 0) {
        panel.innerHTML = '<div class="tree-empty">등록된 문서가 없습니다.</div>';
        return;
      }

      panel.innerHTML = names.map(cat => `
        <div class="tree-category">
          <div class="tree-cat-header" onclick="toggleCatTree(this)">
            <span class="arrow">▶</span>
            <span>${catIcon(cat)} ${cat}</span>
            <span style="margin-left:auto;font-size:10px;opacity:.4">${cats[cat].length}</span>
          </div>
          <div class="tree-files">
            ${cats[cat].map(f => `
              <div class="tree-file" data-path="${f.path}" onclick="openFile(this)" title="${f.name}">
                <span style="font-size:11px">📄</span>
                <span style="overflow:hidden;text-overflow:ellipsis">${f.name}</span>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');

      const firstHeader = panel.querySelector('.tree-cat-header');
      if (firstHeader) toggleCatTree(firstHeader);
    }

    function catIcon(name) {
      return { '교육법규': '⚖️', '교육과정': '📘', '실무지침': '📋', '교육청계획': '🏫' }[name] || '📁';
    }

    function toggleCatTree(header) {
      header.classList.toggle('open');
      const files = header.nextElementSibling;
      if (files) files.classList.toggle('open');
    }

    /* ─────────────────────────────────────────
       파일 열기 (문서 화면)
    ───────────────────────────────────────── */
    let currentPath = null;

    async function openFile(el) {
      const path = typeof el === 'string' ? el : el.dataset.path;
      if (currentPath === path && document.getElementById('docView').classList.contains('active')) return;
      currentPath = path;

      document.querySelectorAll('.tree-file').forEach(f => f.classList.remove('active'));
      if (typeof el !== 'string') el.classList.add('active');

      const filename = path.split('/').pop().replace(/\.md$/, '');
      document.getElementById('docTitleText').textContent = filename;
      document.getElementById('docContent').innerHTML = `
        <div style="text-align:center;padding:40px 0;color:var(--fg-muted)">
          <div style="width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 8px"></div>
          불러오는 중...
        </div>`;

      showView('doc');

      try {
        const res = await fetch(`${RAW_BASE}/${path}`);
        if (!res.ok) throw new Error();
        const text = await res.text();

        currentDocContent = text;
        document.getElementById('docContent').innerHTML = marked.parse(text);
        document.getElementById('docOpenBtn').onclick = () => openMdEditor(text, path.split('/').pop());

        // 텍스트 선택 이벤트
        document.getElementById('docBody').addEventListener('mouseup', () => {
          const selected = window.getSelection().toString().trim();
          if (selected.length > 0) {
            const range = window.getSelection().getRangeAt(0);
            const rect = range.getBoundingClientRect();
            showSelectionPopup(rect.left + window.scrollX, rect.bottom + window.scrollY);
          } else {
            hideSelectionPopup();
          }
        });
      } catch {
        document.getElementById('docContent').innerHTML = '<p style="color:var(--fg-muted)">파일을 불러오지 못했습니다.</p>';
      }
    }

    /* ─────────────────────────────────────────
       카테고리 필터
    ───────────────────────────────────────── */
    let selectedCats = new Set();

    function buildCatFilter(catNames) {
      const filter = document.getElementById('catFilter');
      catNames.forEach(name => {
        const btn = document.createElement('button');
        btn.className = 'cat-chip';
        btn.dataset.cat = name;
        btn.textContent = catIcon(name) + ' ' + name;
        btn.onclick = () => toggleCat(btn);
        filter.appendChild(btn);
      });
    }

    function toggleCat(btn) {
      const cat = btn.dataset.cat;
      if (cat === '') {
        selectedCats.clear();
        document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('selected'));
        btn.classList.add('selected');
      } else {
        document.querySelector('.cat-chip[data-cat=""]').classList.remove('selected');
        if (selectedCats.has(cat)) { selectedCats.delete(cat); btn.classList.remove('selected'); }
        else { selectedCats.add(cat); btn.classList.add('selected'); }
        if (selectedCats.size === 0) document.querySelector('.cat-chip[data-cat=""]').classList.add('selected');
      }
    }

    /* ─────────────────────────────────────────
       검색 (RAG)
    ───────────────────────────────────────── */
    let isSearching = false;

    async function doSearch() {
      if (isSearching) return;
      const input = document.getElementById('searchInput');
      const query = input.value.trim();
      if (!query) return;

      console.log('🔍 [search] Starting search:', { query: query.substring(0, 50) });
      showView('chat');
      updateChatTitle(query);  // 대화 제목 업데이트
      isSearching = true;
      const btn = document.getElementById('searchBtn');
      btn.disabled = true;

      appendUserMsg(query);
      const thinkingEl = appendThinking();
      input.value = '';

      try {
        console.log('📤 [search] Sending request to API');
        const startTime = performance.now();

        const res = await fetch('/.netlify/functions/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query, categories: Array.from(selectedCats) }),
        });

        const elapsed = (performance.now() - startTime).toFixed(0);
        console.log('📊 [search] Response received:', { status: res.status, ok: res.ok, elapsed: elapsed + 'ms' });

        if (!res.ok) {
          const errText = await res.text();
          console.error('❌ [search] Server error:', { status: res.status, message: errText });
          throw new Error(`API Error: ${res.status} - ${errText}`);
        }

        const data = await res.json();
        console.log('✅ [search] Response parsed successfully:', { answerLength: data.answer?.length, sources: data.sources?.length, allProvided: data.allProvided });

        thinkingEl.remove();
        appendAiMsg(query, data.answer, data.sources || [], data.allProvided);
        saveHistory(query, data.answer, data.sources || []);
        console.log('🎉 [search] Search completed successfully');
      } catch (err) {
        console.error('❌ [search] Error occurred:', { name: err.name, message: err.message, stack: err.stack });
        thinkingEl.remove();
        const errorMsg = `검색 중 오류가 발생했습니다. 콘솔을 확인해주세요.\n[${err.message}]`;
        appendAiMsg(query, errorMsg, []);
      } finally {
        isSearching = false;
        btn.disabled = false;
      }
    }

    function appendUserMsg(text) {
      const area = document.getElementById('chatArea');
      const el = document.createElement('div');
      el.className = 'chat-turn';
      el.innerHTML = `<div class="chat-user">${escHtml(text)}</div>`;
      area.appendChild(el);
      el.scrollIntoView({ behavior: 'smooth', block: 'end' });
      return el;
    }

    function appendThinking() {
      const area = document.getElementById('chatArea');
      const el = document.createElement('div');
      el.className = 'chat-thinking';
      el.innerHTML = `<div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div><span>검색 중...</span>`;
      area.appendChild(el);
      el.scrollIntoView({ behavior: 'smooth', block: 'end' });
      return el;
    }

    function appendAiMsg(query, answer, sources, allProvided = false) {
      const area = document.getElementById('chatArea');
      const el = document.createElement('div');
      el.className = 'chat-ai';

      // 모든 문서를 참조했으면 참조 섹션 표시 안 함
      const showSources = sources.length > 0 && !allProvided;
      const sourceHtml = showSources ? `
        <div class="chat-sources">
          <div class="chat-sources-label">📎 참조 문서</div>
          ${sources.map(s => `<span class="source-chip" onclick="openFile('${s}')" style="cursor: pointer;">${s.split('/').pop().replace(/\.md$/, '')}</span>`).join('')}
        </div>` : '';

      const answerJson = JSON.stringify(answer);
      const queryJson  = JSON.stringify(query);
      const srcJson    = JSON.stringify(sources);

      el.innerHTML = `
        <div class="chat-ai-card">
          <div class="chat-ai-body"></div>
          ${sourceHtml}
        </div>
        <div class="chat-actions">
          <button class="chat-action-btn" onclick='copyAnswer(this, ${answerJson})'>복사</button>
          <button class="chat-action-btn" onclick='shareAnswer(${queryJson}, ${answerJson}, ${srcJson})'>MD Editor로 공유</button>
        </div>`;

      el.querySelector('.chat-ai-body').innerHTML = marked.parse(answer);
      area.appendChild(el);
      el.scrollIntoView({ behavior: 'smooth', block: 'end' });
      return el;
    }

    /* ─────────────────────────────────────────
       액션
    ───────────────────────────────────────── */
    function copyAnswer(btn, answer) {
      navigator.clipboard.writeText(answer).then(() => {
        const orig = btn.textContent;
        btn.textContent = '복사됨!';
        setTimeout(() => btn.textContent = orig, 1500);
      });
    }

    function shareAnswer(query, answer, sources) {
      const md = `# 검색 결과\n\n**질문:** ${query}\n\n${answer}${
        sources.length ? `\n\n---\n**참조 문서**\n${sources.map(s => `- ${s}`).join('\n')}` : ''}`;
      openMdEditor(md, '검색결과.md');
    }

    function openMdEditor(content, filename) {
      let safeContent = content;
      if (new Blob([content]).size > 7500) {
        safeContent = content.slice(0, 7000) + '\n\n*(내용이 잘렸습니다.)*';
      }
      const payload = JSON.stringify({ data: { content: safeContent, filename }, permission: 'clone' });
      const encoded = btoa(encodeURIComponent(payload)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
      window.open(`/md-editor/#share=${encoded}`, '_blank');
    }

    /* ─────────────────────────────────────────
       localStorage 이력
    ───────────────────────────────────────── */
    function saveHistory(query, answer, sources) {
      const list = getHistory();
      list.unshift({ id: Date.now(), query, answer, sources, ts: Date.now() });
      if (list.length > 50) list.length = 50;
      localStorage.setItem(LS_HISTORY, JSON.stringify(list));
      renderConvList();
    }

    function getHistory() {
      try { return JSON.parse(localStorage.getItem(LS_HISTORY) || '[]'); } catch { return []; }
    }

    function renderConvList() {
      const list = getHistory().slice(0, 20);
      const container = document.getElementById('convList');
      if (list.length === 0) {
        container.innerHTML = '<div class="conv-item-empty">대화 없음</div>';
        return;
      }
      container.innerHTML = list.map(item =>
        `<div class="conv-item" data-id="${item.id}" onclick="loadConv(${item.id})">${escHtml(item.query)}</div>`
      ).join('');
    }

    function loadConv(id) {
      const list = getHistory();
      const item = list.find(i => i.id === id);
      if (!item) return;

      document.querySelectorAll('.conv-item').forEach(i => {
        i.classList.toggle('active', +i.dataset.id === id);
      });

      document.getElementById('chatArea').innerHTML = '';
      appendUserMsg(item.query);
      appendAiMsg(item.query, item.answer, item.sources || []);
      showView('chat');
    }

    function clearHistory() {
      if (!confirm('대화 이력을 모두 지울까요?')) return;
      localStorage.removeItem(LS_HISTORY);
      renderConvList();
      newChat();
    }

    /* ─────────────────────────────────────────
       공유
    ───────────────────────────────────────── */
    function shareCurrentPage() {
      const url = window.location.href;
      navigator.clipboard.writeText(url).then(() => showToast('링크를 복사했습니다'));
    }

    /* ─────────────────────────────────────────
       문서 AI 질문/요약 (토큰 절약 버전)
    ───────────────────────────────────────── */
    let currentDocContent = '';

    function summarizeDoc() {
      if (!currentDocContent || !currentPath) return;

      // 이미 채팅 화면이면 전환 안 함
      const chatView = document.getElementById('chatView');
      if (!chatView.classList.contains('active')) {
        showView('chat');
      }

      const docName = currentPath.split('/').pop();
      appendUserMsg(`📄 [${docName}] 문서 요약 생성 중...`);
      const thinkingEl = appendThinking();

      sendDocumentRequest('summarize', currentPath, thinkingEl);
    }

    function askAboutDoc() {
      if (!currentDocContent || !currentPath) return;

      const q = prompt('이 문서에 대해 무엇을 알고 싶으신가요?');
      if (!q) return;

      // 이미 채팅 화면이면 전환 안 함
      const chatView = document.getElementById('chatView');
      if (!chatView.classList.contains('active')) {
        showView('chat');
      }

      const docName = currentPath.split('/').pop();
      appendUserMsg(`❓ [${docName}] ${q}`);
      const thinkingEl = appendThinking();

      sendDocumentRequest('question', currentPath, thinkingEl, q);
    }

    function askAboutSelection() {
      const selected = window.getSelection().toString().trim();
      if (!selected) return;
      hideSelectionPopup();
      showView('chat');
      appendUserMsg(`선택한 텍스트에 대해 설명 중...`);
      const thinkingEl = appendThinking();
      const query = `다음 텍스트에 대해 설명해 주세요:\n\n"${selected}"`;

      // 선택 부분은 기존 방식 (전체 문서로 처리)
      document.getElementById('searchInput').value = query;
      setTimeout(() => { thinkingEl.remove(); doSearch(); }, 100);
    }

    async function sendDocumentRequest(type, docPath, thinkingEl, question = null) {
      try {
        console.log(`📤 [doc-request] Sending ${type} request for:`, docPath);

        const payload = {
          type: type,  // 'summarize' or 'question'
          documentPath: docPath,
          query: question || '문서를 분석하고 요약해 주세요.',
          categories: []  // 문서 요청에서는 카테고리 불필요
        };

        const startTime = performance.now();
        const res = await fetch('/.netlify/functions/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const elapsed = (performance.now() - startTime).toFixed(0);
        console.log(`📊 [doc-request] Response received:`, { status: res.status, elapsed: elapsed + 'ms' });

        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error(`HTTP ${res.status}: ${errData.error || '요청 실패'}`);
        }

        const data = await res.json();
        console.log('✅ [doc-request] Request completed successfully');

        thinkingEl.remove();
        const label = type === 'summarize' ? `📄 [요약] ${docPath}` : `❓ [질문] ${docPath}`;
        appendAiMsg(label, data.answer, data.sources || []);
        saveHistory(label, data.answer, data.sources || []);
      } catch (err) {
        console.error('❌ [doc-request] Error:', err.message);
        thinkingEl.remove();
        appendAiMsg('문서 요청', `오류 발생: ${err.message}`, []);
      }
    }

    function askDocQuestion(query, label) {
      // 이전 호환성 유지 (선택 부분 설명 등)
      showView('chat');
      appendUserMsg(label);
      const thinkingEl = appendThinking();
      document.getElementById('searchInput').value = query;
      setTimeout(() => { thinkingEl.remove(); doSearch(); }, 100);
    }

    function showSelectionPopup(x, y) {
      const popup = document.getElementById('selectionPopup');
      popup.classList.add('active');
      popup.style.left = (x + 5) + 'px';
      popup.style.top = (y + 5) + 'px';
    }

    function hideSelectionPopup() {
      document.getElementById('selectionPopup').classList.remove('active');
    }

    /* ─────────────────────────────────────────
       유틸
    ───────────────────────────────────────── */
    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function showToast(msg) {
      const t = document.createElement('div');
      t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--fg);color:var(--bg);padding:8px 16px;border-radius:8px;font-size:13px;z-index:9999;pointer-events:none';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2000);
    }

    /* ─────────────────────────────────────────
       초기화
    ───────────────────────────────────────── */
    loadTree();
    renderConvList();
    loadRecentDocs();
  </script>
</body>
</html>
