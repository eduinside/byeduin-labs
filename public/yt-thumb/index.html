<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YT Thumbnail — byeduin</title>
  <link rel="stylesheet" href="/common/hero-theme.css">
  <script src="/common/theme.js"></script>
  <script src="/common/init.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');

    body {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 1rem 4rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,106,247,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,106,247,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
    }

    .app-card {
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
      min-height: auto;
    }

    /* ── 탭 (숨김) ── */
    .tab-row { display: none; }
    .tab-btn { display: none; }
    .tab-pane { display: none; }

    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.625rem; margin-top: 0.75rem; }

    /* ── 듀얼 모드 탭 ── */
    .dual-tab-btn {
      transition: all 0.2s;
    }
    .dual-tab-btn:hover {
      border-color: var(--primary);
      opacity: 0.9;
    }
    .dual-tab-active {
      background: var(--primary) !important;
      color: #fff !important;
      border-color: var(--primary) !important;
    }

    /* ── 단일/재생목록 UI ── */
    #single-ui,
    #playlist-ui {
      margin-top: 1.5rem;
    }

    /* ── 결과 영역 (단일) ── */
    #result { margin-top: 1.25rem; display: none; }

    .thumb-item { margin-bottom: 1rem; }
    .thumb-label { font-size: 0.75rem; font-weight: 600; color: var(--fg-muted); margin-bottom: 0.375rem; }

    .thumb-preview {
      width: 100%;
      border-radius: 0.625rem;
      border: 1px solid var(--border);
      overflow: hidden;
      background: #000;
      margin-bottom: 0.5rem;
      aspect-ratio: 16/9;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .thumb-preview img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .thumb-url-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 0.625rem;
      padding: 0.5rem 0.75rem;
    }

    .thumb-url {
      flex: 1;
      font-size: 0.72rem;
      font-family: monospace;
      color: var(--primary);
      word-break: break-all;
      text-decoration: none;
    }

    .thumb-url:hover { text-decoration: underline; }

    .btn-copy {
      background: none; border: none; cursor: pointer;
      color: var(--fg-muted); padding: 4px; border-radius: 0.375rem;
      transition: color 0.15s, background 0.15s; flex-shrink: 0;
      min-width: 28px; min-height: 28px;
      display: flex; align-items: center; justify-content: center;
    }

    .btn-copy:hover { color: var(--primary); background: var(--border); }

    /* ── 에러 ── */
    .error-box {
      background: rgba(243,18,96,0.08);
      border: 1px solid rgba(243,18,96,0.3);
      border-radius: 0.625rem;
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      color: var(--danger);
    }

    /* ── 히스토리 ── */
    .history-section {
      margin-top: 1.25rem;
      padding-top: 0;
      display: block;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .history-header span { font-size: 0.9rem; font-weight: 700; }
    .btn-clear-h { font-size: 0.75rem; color: var(--danger); background: none; border: none; cursor: pointer; font-family: inherit; }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 0.5rem 0.625rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .history-item:hover { border-color: var(--primary); background: var(--bg-hover); }

    .history-thumb {
      width: 64px; height: 40px;
      object-fit: cover; border-radius: 0.375rem;
      flex-shrink: 0; background: #000;
    }

    .history-info { flex: 1; min-width: 0; }
    .history-title { font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-time { font-size: 0.75rem; color: var(--fg-muted); margin-top: 2px; }
    .history-links { display: flex; gap: 0.625rem; margin-top: 2px; }
    .history-links a { font-size: 0.7rem; color: var(--fg-muted); text-decoration: none; }
    .history-links a:hover { color: var(--primary); text-decoration: underline; }

    /* 히스토리 펄스 애니메이션 */
    @keyframes pulse-subtle {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .history-section.pulse {
      animation: pulse-subtle 0.6s ease-in-out 2;
    }

    .btn-del-h {
      background: none; border: none; color: var(--fg-muted);
      cursor: pointer; padding: 4px; font-size: 0.875rem;
      min-width: 24px; min-height: 24px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .btn-del-h:hover { color: var(--danger); }

    /* ── 플레이리스트 탭 ── */
    .pl-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--fg-muted);
      margin-bottom: 0.375rem;
      display: block;
    }

    #plResult { margin-top: 1.25rem; }

    /* ── 플레이리스트 결과 확장 ── */
    #playlist-ui {
      display: flex;
      flex-direction: column;
    }
    #plResult {
      max-width: 800px;
      align-self: center;
      width: 100%;
    }

    .pl-header {
      margin-bottom: 1rem;
    }

    .pl-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      word-break: break-word;
    }

    .pl-meta {
      font-size: 0.78rem;
      color: var(--fg-muted);
    }

    .pl-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .pl-list {
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
      max-height: 420px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .pl-item {
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 0.625rem 0.75rem;
    }

    .pl-num {
      font-size: 0.7rem;
      font-family: monospace;
      font-weight: 700;
      color: var(--fg-muted);
      flex-shrink: 0;
      min-width: 24px;
      padding-top: 2px;
    }

    .pl-thumb {
      width: 96px;
      height: 60px;
      object-fit: cover;
      border-radius: 0.375rem;
      flex-shrink: 0;
      background: #000;
    }

    .pl-info { flex: 1; min-width: 0; }

    .pl-vtitle {
      font-size: 0.82rem;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 0.25rem;
      word-break: break-word;
    }

    .pl-vdesc {
      font-size: 0.72rem;
      color: var(--fg-muted);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .pl-vlink {
      font-size: 0.7rem;
      color: var(--primary);
      text-decoration: none;
      margin-top: 0.25rem;
      display: inline-block;
    }

    .pl-vlink:hover { text-decoration: underline; }

    /* 로딩 */
    .loading-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      padding: 2rem 1rem;
      color: var(--fg-muted);
      font-size: 0.85rem;
    }

    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 통합 URL 입력 ── */
    .url-input-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 1rem;
    }
    .url-input-row .hero-input { flex: 1; }
    .btn-analyze {
      width: 42px; height: 42px;
      border-radius: 0.625rem;
      border: none;
      background: var(--primary);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    .btn-analyze:hover { opacity: 0.85; }

    /* 프로그레스 */
    .progress-wrap {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 0.625rem;
      padding: 0.75rem 1rem;
      margin-top: 0.75rem;
      font-size: 0.8rem;
    }

    .progress-bar-bg {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 0.5rem;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 3px;
      transition: width 0.3s;
    }
  </style>
</head>
<body>
<div class="wrap">

  <div class="app-header">
    <div class="app-badge">◆ Creative</div>
    <h1 class="app-title">YT <span>Thumbnail</span></h1>
    <p class="app-desc">영상 주소를 입력하면 썸네일을 추출하고, 재생목록 주소를 입력하면 전체 영상 정보와 썸네일을 수집합니다.</p>
  </div>

  <div class="app-card">

    <!-- 통합 URL 입력 -->
    <div class="url-input-row">
      <input type="url" id="youtubeUrl" class="hero-input"
             placeholder="YouTube 영상 또는 재생목록 URL"
             onkeyup="if(event.key==='Enter')analyzeUrl()">
      <button class="btn-analyze" onclick="analyzeUrl()" title="분석 시작">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>
    </div>

    <!-- 듀얼 모드 탭 (영상+재생목록 동시) -->
    <div id="dual-mode-tabs" style="display:none; margin-top:1rem; margin-bottom:1rem;">
      <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:0.5rem;">
        <button onclick="switchDualModeTab('thumbnail')" id="tab-thumbnail" class="dual-tab-btn dual-tab-active" style="padding:0.5rem; border-radius:0.5rem; border:1px solid var(--border); background:var(--primary); color:#fff; cursor:pointer; font-weight:600; font-size:0.875rem; transition:all 0.2s;">썸네일</button>
        <button onclick="switchDualModeTab('playlist')" id="tab-playlist" class="dual-tab-btn" style="padding:0.5rem; border-radius:0.5rem; border:1px solid var(--border); background:transparent; color:var(--fg); cursor:pointer; font-weight:600; font-size:0.875rem; transition:all 0.2s;">재생목록</button>
        <button onclick="switchDualModeTab('history')" id="tab-history" class="dual-tab-btn" style="padding:0.5rem; border-radius:0.5rem; border:1px solid var(--border); background:transparent; color:var(--fg); cursor:pointer; font-weight:600; font-size:0.875rem; transition:all 0.2s;">히스토리</button>
      </div>
    </div>

    <!-- 단일영상 UI -->
    <div id="single-ui" style="display:none; margin-top:1rem;">
      <div id="result"></div>
    </div>

    <!-- 재생목록 UI -->
    <div id="playlist-ui" style="display:none; margin-top:1rem;">
      <button onclick="showApiKeyModal()" class="hero-btn hero-btn-ghost" id="plApiKeyBtn" style="display:none;width:100%;margin-top:0.5rem;font-size:0.8rem;">⚙️ API 키 설정</button>
      <div id="plResult" class="pl-result-wide"></div>
    </div>

    <!-- 통합 히스토리 -->
    <div class="history-section" id="historySection" style="margin-top:1.5rem;">
      <div class="history-header">
        <span>최근 검색</span>
        <button class="btn-clear-h" onclick="clearAllHistory()">전체 삭제</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>

  </div>
</div>

<!-- 좌상단: 홈 -->
<div class="top-overlay-left">
  <a href="/" class="overlay-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    <span>Home</span>
  </a>
</div>
<!-- 우상단: 보기모드 + 공유 -->
<div class="top-overlay">
  <button id="themeToggleBtn" class="overlay-btn" onclick="cycleTheme()" title="보기 모드">💻</button>
  <button id="shareBtn" class="overlay-btn" onclick="shareCurrentPage()" title="공유">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
      <polyline points="16 6 12 2 8 6"/>
      <line x1="12" x2="12" y1="2" y2="15"/>
    </svg>
    <span>공유</span>
  </button>
</div>

<script>
  // ── 초기화 ──
  let currentMode = null; // 'video', 'playlist', 'dual'

  document.addEventListener('DOMContentLoaded', () => {
    renderUnifiedHistory();
  });

  /* ─────────────────────── URL 분석 + 모드 전환 ─────────────────────── */
  function analyzeUrl() {
    const url = document.getElementById('youtubeUrl').value.trim();
    if (!url) { showError('URL을 입력해주세요.'); return; }
    const isVideo = YT_REGEX.test(url);
    const isList = PL_REGEX.test(url);

    if (!isVideo && !isList) {
      showError('유효하지 않은 유튜브 URL입니다.');
      document.getElementById('dual-mode-tabs').style.display = 'none';
      return;
    }

    // 모든 탭 활성화 상태 초기화
    const playlistBtn = document.getElementById('tab-playlist');
    const thumbnailBtn = document.getElementById('tab-thumbnail');

    // 듀얼 URL 처리: 영상과 재생목록 ID가 모두 있는 경우 (탭 모드)
    if (isVideo && isList) {
      currentMode = 'dual';
      document.getElementById('dual-mode-tabs').style.display = 'block';
      playlistBtn.disabled = false;
      playlistBtn.style.opacity = '1';
      playlistBtn.style.cursor = 'pointer';
      thumbnailBtn.disabled = false;
      thumbnailBtn.style.opacity = '1';
      thumbnailBtn.style.cursor = 'pointer';
      switchDualModeTab('thumbnail');
      renderUnifiedHistory();
    } else if (isVideo) {
      currentMode = 'video';
      document.getElementById('dual-mode-tabs').style.display = 'block';
      thumbnailBtn.disabled = false;
      thumbnailBtn.style.opacity = '1';
      thumbnailBtn.style.cursor = 'pointer';
      playlistBtn.disabled = true;
      playlistBtn.style.opacity = '0.5';
      playlistBtn.style.cursor = 'not-allowed';
      switchDualModeTab('thumbnail');
      renderUnifiedHistory();
    } else if (isList) {
      currentMode = 'playlist';
      document.getElementById('dual-mode-tabs').style.display = 'block';
      playlistBtn.disabled = false;
      playlistBtn.style.opacity = '1';
      playlistBtn.style.cursor = 'pointer';
      thumbnailBtn.disabled = true;
      thumbnailBtn.style.opacity = '0.5';
      thumbnailBtn.style.cursor = 'not-allowed';
      // 플레이리스트 탭을 약간 지연시켜서 활성화 (DOM 업데이트 이후)
      setTimeout(() => switchDualModeTab('playlist'), 50);
      renderUnifiedHistory();
    }
  }

  // 듀얼 모드 탭 전환
  function switchDualModeTab(tab) {
    const thumbnailBtn = document.getElementById('tab-thumbnail');
    const playlistBtn = document.getElementById('tab-playlist');
    const historyBtn = document.getElementById('tab-history');
    const singleUi = document.getElementById('single-ui');
    const playlistUi = document.getElementById('playlist-ui');
    const historySection = document.getElementById('historySection');

    // 모든 탭 버튼 비활성화 상태 초기화 (disabled 상태는 유지)
    thumbnailBtn.classList.remove('dual-tab-active');
    playlistBtn.classList.remove('dual-tab-active');
    historyBtn.classList.remove('dual-tab-active');
    if (!thumbnailBtn.disabled) {
      thumbnailBtn.style.background = 'transparent';
      thumbnailBtn.style.color = 'var(--fg)';
      thumbnailBtn.style.borderColor = 'var(--border)';
    }
    if (!playlistBtn.disabled) {
      playlistBtn.style.background = 'transparent';
      playlistBtn.style.color = 'var(--fg)';
      playlistBtn.style.borderColor = 'var(--border)';
    }
    historyBtn.style.background = 'transparent';
    historyBtn.style.color = 'var(--fg)';
    historyBtn.style.borderColor = 'var(--border)';

    // 모든 콘텐츠 숨김
    singleUi.style.display = 'none';
    playlistUi.style.display = 'none';
    historySection.style.display = 'none';

    // 선택된 탭 활성화
    if (tab === 'thumbnail' && !thumbnailBtn.disabled) {
      thumbnailBtn.classList.add('dual-tab-active');
      thumbnailBtn.style.background = 'var(--primary)';
      thumbnailBtn.style.color = '#fff';
      thumbnailBtn.style.borderColor = 'var(--primary)';
      singleUi.style.display = 'block';
      extractThumbnail();
    } else if (tab === 'playlist' && !playlistBtn.disabled) {
      playlistBtn.classList.add('dual-tab-active');
      playlistBtn.style.background = 'var(--primary)';
      playlistBtn.style.color = '#fff';
      playlistBtn.style.borderColor = 'var(--primary)';
      playlistUi.style.display = 'block';
      fetchPlaylist();
    } else if (tab === 'history') {
      historyBtn.classList.add('dual-tab-active');
      historyBtn.style.background = 'var(--primary)';
      historyBtn.style.color = '#fff';
      historyBtn.style.borderColor = 'var(--primary)';
      historySection.style.display = 'block';
    }
  }

  /* ───────────────────────── 단일 영상 ───────────────────────── */
  const HISTORY_KEY = 'youtube_thumbnail_history_v2';
  const YT_REGEX = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:[^\/\n\s]+\/\S+\/|(?:v|e(?:mbed)?|shorts|live)\/|\S*?[?&]v=)|youtu\.be\/)([a-zA-Z0-9_-]{11})/;

  async function extractThumbnail() {
    const url = document.getElementById('youtubeUrl').value.trim();
    const result = document.getElementById('result');
    if (!url) { showError('URL을 입력해주세요.'); return; }
    const match = url.match(YT_REGEX);
    if (match && match[1]) {
      const videoId = match[1];
      saveToHistory(videoId);

      // 영상 제목 조회
      try {
        const res = await fetch('/api/yt-video-info', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ videoId }),
        });
        const data = await res.json();
        const videoData = {
          videoId,
          title: data.title || 'Unknown Title',
          author: data.author || 'Unknown Channel',
        };
        saveToUnifiedHistory('video', videoData);
      } catch (e) {
        // 실패 시 ID만 저장
        saveToUnifiedHistory('video', { videoId, title: 'Unknown Title', author: '' });
      }

      displayResult(videoId);
      renderUnifiedHistory();
    } else {
      showError('유효하지 않은 유튜브 URL입니다.');
    }
  }

  function displayResult(videoId) {
    const result = document.getElementById('result');
    const maxRes = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
    const hq     = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;

    result.style.display = 'block';
    result.innerHTML = `
      <div class="thumb-item">
        <div class="thumb-label">최대 해상도 (maxresdefault)</div>
        <div class="thumb-preview">
          <img src="${maxRes}" alt="maxres thumbnail"
               onerror="this.parentElement.innerHTML='<span style=&quot;color:#888;font-size:0.8rem&quot;>이미지 없음 (1080p 미지원 영상)</span>'">
        </div>
        <div class="thumb-url-row">
          <a href="${maxRes}" target="_blank" class="thumb-url" rel="noopener">${maxRes}</a>
          <button class="btn-copy" onclick="copyUrl(this,'${maxRes}')" title="복사">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

  // ── 통합 히스토리 ──
  const UNIFIED_HISTORY_KEY = 'youtube_unified_history';

  function saveToUnifiedHistory(type, data) {
    let hist = JSON.parse(localStorage.getItem(UNIFIED_HISTORY_KEY) || '[]');
    const item = { type, data, timestamp: new Date().toISOString() };
    // 중복 제거
    hist = hist.filter(h => {
      if (h.type !== type) return true;
      if (type === 'video') {
        const hId = typeof h.data === 'object' ? h.data.videoId : h.data;
        const newId = typeof data === 'object' ? data.videoId : data;
        return hId !== newId;
      }
      if (type === 'playlist') {
        const hUrl = typeof h.data === 'object' ? h.data.url : h.data;
        const newUrl = typeof data === 'object' ? data.url : data;
        return hUrl !== newUrl;
      }
      return true;
    });
    hist.unshift(item);
    localStorage.setItem(UNIFIED_HISTORY_KEY, JSON.stringify(hist.slice(0, 30)));
  }

  function renderUnifiedHistory() {
    const list = document.getElementById('historyList');
    const hist = JSON.parse(localStorage.getItem(UNIFIED_HISTORY_KEY) || '[]');
    if (!hist.length) {
      list.innerHTML = '<p style="text-align:center;color:var(--fg-muted);font-size:0.8rem;padding:1rem">기록이 없습니다.</p>';
      return;
    }
    list.innerHTML = hist.map((item, idx) => {
      if (item.type === 'video') {
        const dateStr = new Date(item.timestamp).toLocaleDateString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });

        // item.data가 객체일 수도 있고 문자열(ID)일 수도 있음 (하위호환성)
        const isNewFormat = typeof item.data === 'object' && item.data.videoId;
        const videoId = isNewFormat ? item.data.videoId : item.data;
        const videoTitle = isNewFormat ? item.data.title : 'Unknown Title';

        return `
          <div class="history-item" onclick="applyFromUnifiedHistory('video', '${videoId}')">
            <img class="history-thumb" src="https://img.youtube.com/vi/${videoId}/mqdefault.jpg" alt="">
            <div class="history-info">
              <div class="history-title">${escHtml(videoTitle)}</div>
              <div class="history-time">${dateStr} · 영상</div>
            </div>
            <button class="btn-del-h" onclick="event.stopPropagation(); deleteFromUnifiedHistory('${item.type}', ${isNewFormat ? "'" + videoId.replace(/'/g, "\\'") + "'" : "'" + item.data.replace(/'/g, "\\'") + "'"})">✕</button>
          </div>
        `;
      } else if (item.type === 'playlist') {
        const dateStr = new Date(item.timestamp).toLocaleDateString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });

        // item.data가 객체일 수도 있고 문자열(URL)일 수도 있음 (하위호환성)
        const isNewFormat = typeof item.data === 'object' && item.data.url;
        const playlistUrl = isNewFormat ? item.data.url : item.data;
        const firstVideoId = isNewFormat ? item.data.firstVideoId : null;
        const firstVideoTitle = isNewFormat ? item.data.firstVideoTitle : null;
        const playlistTitle = isNewFormat ? item.data.title : null;

        const thumbUrl = firstVideoId
          ? `https://img.youtube.com/vi/${firstVideoId}/mqdefault.jpg`
          : 'https://img.youtube.com/vi/dQw4w9WgXcQ/mqdefault.jpg';

        const displayTitle = playlistTitle || '재생목록';

        return `
          <div class="history-item" onclick="applyFromUnifiedHistory('playlist', '${playlistUrl.replace(/'/g, "\\'")}')">
            <img class="history-thumb" src="${thumbUrl}" alt="">
            <div class="history-info">
              <div class="history-title">${escHtml(displayTitle)}</div>
              <div class="history-time">${dateStr} · 재생목록</div>
            </div>
            <button class="btn-del-h" onclick="event.stopPropagation(); deleteFromUnifiedHistory('${item.type}', ${typeof item.data === 'object' ? "'" + item.data.url.replace(/'/g, "\\'") + "'" : "'" + item.data.replace(/'/g, "\\'") + "'"})">✕</button>
          </div>
        `;
      }
    }).join('');
  }

  function applyFromUnifiedHistory(type, data) {
    if (type === 'video') {
      // data가 객체일 수도 있고 문자열(ID)일 수도 있음 (하위호환성)
      const videoId = typeof data === 'object' ? data.videoId : data;
      document.getElementById('youtubeUrl').value = `https://www.youtube.com/watch?v=${videoId}`;

      // 썸네일 탭으로 전환
      currentMode = 'video';
      document.getElementById('dual-mode-tabs').style.display = 'block';
      const thumbnailBtn = document.getElementById('tab-thumbnail');
      const playlistBtn = document.getElementById('tab-playlist');
      thumbnailBtn.disabled = false;
      thumbnailBtn.style.opacity = '1';
      thumbnailBtn.style.cursor = 'pointer';
      playlistBtn.disabled = true;
      playlistBtn.style.opacity = '0.5';
      playlistBtn.style.cursor = 'not-allowed';
      switchDualModeTab('thumbnail');

      displayResult(videoId);
    } else if (type === 'playlist') {
      // data가 객체일 수도 있고 문자열(URL)일 수도 있음 (하위호환성)
      const playlistUrl = typeof data === 'object' ? data.url : data;
      document.getElementById('youtubeUrl').value = playlistUrl;
      analyzeUrl();
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function deleteFromUnifiedHistory(type, data) {
    let hist = JSON.parse(localStorage.getItem(UNIFIED_HISTORY_KEY) || '[]');
    hist = hist.filter(h => {
      if (h.type !== type) return true;
      // video는 ID를 비교 (객체든 문자열이든)
      if (type === 'video') {
        const hId = typeof h.data === 'object' ? h.data.videoId : h.data;
        return hId !== data;
      }
      // playlist는 URL을 비교 (객체든 문자열이든)
      if (type === 'playlist') {
        const hUrl = typeof h.data === 'object' ? h.data.url : h.data;
        return hUrl !== data;
      }
      return true;
    });
    localStorage.setItem(UNIFIED_HISTORY_KEY, JSON.stringify(hist));
    renderUnifiedHistory();
  }

  function clearAllHistory() {
    if (confirm('모든 기록을 삭제하시겠습니까?')) {
      localStorage.removeItem(UNIFIED_HISTORY_KEY);

  function scrollToHistory() {

    if (!section) return;

    // 펄스 애니메이션 추가
    section.classList.add('pulse');

  /* ───────────────────────── 플레이리스트 ───────────────────────── */
  const PL_REGEX = /[?&]list=([A-Za-z0-9_-]+)/;
  const PL_HISTORY_KEY = 'youtube_playlist_history';
  const API_KEY_STORAGE = 'yt_api_key_custom';

  let plItems = [];       // 전체 영상 목록
  let plTitle = '';       // 플레이리스트 제목
  let plUrl = '';         // 원본 URL

  async function fetchPlaylist() {
    const url = document.getElementById('youtubeUrl').value.trim();
    if (!url) { showPlError('URL을 입력해주세요.'); return; }

    const match = url.match(PL_REGEX);
    if (!match) { showPlError('유효하지 않은 플레이리스트 URL입니다.'); return; }

    const playlistId = match[1];
    plUrl = url;
    plItems = [];
    plTitle = '';

    const plFetchBtn = document.getElementById('plFetchBtn');
    if (plFetchBtn) plFetchBtn.disabled = true;
    showPlLoading('플레이리스트 불러오는 중…');

    try {
      let pageToken = null;
      let isFirst = true;
      let totalFetched = 0;
      let usingCustomKey = false;

      // 먼저 Netlify Function으로 시도
      let useCustomKey = false;
      do {
        const body = { playlistId };
        if (pageToken) body.pageToken = pageToken;

        let res, data;

        if (useCustomKey) {
          // 사용자 정의 API 키 사용
          const customKey = localStorage.getItem(API_KEY_STORAGE);
          if (!customKey) { showPlError('API 키가 설정되지 않았습니다.'); return; }
          res = await fetchWithCustomKey(playlistId, pageToken, customKey);
          data = res;
          usingCustomKey = true;
        } else {
          // Netlify Function 사용
          res = await fetch('/api/yt-playlist', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          data = await res.json();
        }

        // Netlify Function 실패 시 API 키 설정 안내
        if (!useCustomKey && (res?.status === 403 || res?.status === 400) && data?.error?.includes?.('referer')) {
          const saved = localStorage.getItem(API_KEY_STORAGE);
          if (saved) {
            useCustomKey = true;
            continue;
          } else {
            showPlError('API 키 설정이 필요합니다. ⚙️ 설정 버튼을 클릭해주세요.');
            document.getElementById('plApiKeyBtn').style.display = 'inline-flex';
            return;
          }
        }

        if (!useCustomKey && !res?.ok) {
          showPlError(data?.error ?? '불러오기 실패');
          return;
        }

        if (isFirst && data.playlistTitle) plTitle = data.playlistTitle;
        plItems = plItems.concat(data.items ?? []);
        totalFetched = plItems.length;
        pageToken = data.nextPageToken;
        isFirst = false;

        if (pageToken) {
          showPlLoading(`불러오는 중… (${totalFetched}개 완료)`);
        }
      } while (pageToken);

      renderPlaylist();
      savePLToHistory(plUrl);
      // 첫 영상 정보를 포함하여 히스토리에 저장
      const firstVideo = plItems[0];
      const playlistData = {
        url: plUrl,
        title: plTitle,
        firstVideoId: firstVideo?.videoId,
        firstVideoTitle: firstVideo?.title
      };
      saveToUnifiedHistory('playlist', playlistData);
      renderUnifiedHistory();
    } catch (e) {
      showPlError('네트워크 오류가 발생했습니다. API 키 설정을 확인해주세요.');
    } finally {
      if (plFetchBtn) plFetchBtn.disabled = false;
    }
  }

  async function fetchWithCustomKey(playlistId, pageToken, apiKey) {
    const BASE = 'https://www.googleapis.com/youtube/v3';

    let playlistTitle = null;
    if (!pageToken) {
      const plRes = await fetch(
        `${BASE}/playlists?part=snippet&id=${playlistId}&key=${apiKey}`
      );
      const plData = await plRes.json();
      playlistTitle = plData.items?.[0]?.snippet?.title ?? '플레이리스트';
    }

    let itemsUrl = `${BASE}/playlistItems?part=snippet&playlistId=${playlistId}&maxResults=50&key=${apiKey}`;
    if (pageToken) itemsUrl += `&pageToken=${encodeURIComponent(pageToken)}`;

    const itemsRes = await fetch(itemsUrl);
    const itemsData = await itemsRes.json();

    return {
      playlistTitle,
      items: (itemsData.items ?? [])
        .filter(it => it.snippet?.resourceId?.videoId)
        .map(it => ({
          videoId: it.snippet.resourceId.videoId,
          title: it.snippet.title ?? '',
          description: it.snippet.description ?? '',
          thumbnailUrl: it.snippet.thumbnails?.high?.url ??
            it.snippet.thumbnails?.medium?.url ??
            `https://img.youtube.com/vi/${it.snippet.resourceId.videoId}/hqdefault.jpg`,
        })),
      nextPageToken: itemsData.nextPageToken ?? null,
    };
  }

  function showApiKeyModal() {
    const saved = localStorage.getItem(API_KEY_STORAGE) || '';
    const key = prompt('YouTube API 키를 입력해주세요:\n(Google Cloud Console에서 생성할 수 있습니다)', saved);
    if (key !== null) {
      localStorage.setItem(API_KEY_STORAGE, key.trim());
      showPlError('API 키가 저장되었습니다. 다시 시도해주세요.');
    }
  }

  function renderPlaylist() {
    if (!plItems.length) {
      showPlError('영상이 없는 플레이리스트입니다.');
      return;
    }

    const container = document.getElementById('plResult');
    container.innerHTML = `
      <div class="pl-header">
        <div class="pl-title">${escHtml(plTitle)}</div>
        <div class="pl-meta">총 ${plItems.length}개 영상</div>
      </div>
      <div class="pl-actions">
        <button class="hero-btn" onclick="openInMdEditor()">📋 MD로 정리</button>
        <button class="hero-btn hero-btn-ghost" id="zipBtn" onclick="downloadZip()">📦 다운로드(ZIP)</button>
      </div>
      <div class="pl-list">
        ${plItems.map((item, i) => `
          <div class="pl-item">
            <div class="pl-num">${String(i + 1).padStart(2, '0')}</div>
            <img class="pl-thumb"
                 src="/api/yt-thumb-img?id=${item.videoId}&q=mq"
                 onerror="this.src='https://img.youtube.com/vi/${item.videoId}/mqdefault.jpg'"
                 alt="">
            <div class="pl-info">
              <div class="pl-vtitle">${escHtml(item.title)}</div>
              ${item.description ? `<div class="pl-vdesc">${escHtml(item.description)}</div>` : ''}
              <a class="pl-vlink" href="https://youtu.be/${item.videoId}" target="_blank" rel="noopener">youtu.be/${item.videoId}</a>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }

  function openInMdEditor() {
    const md = buildMarkdown();
    const payload = JSON.stringify({
      data: { content: md, filename: `${plTitle || 'playlist'}.md` },
      permission: 'clone',
    });
    const encoded = btoa(encodeURIComponent(payload))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
    window.open(`/md-editor/#share=${encoded}`, '_blank');
  }

  async function downloadZip() {
    const btn = document.getElementById('zipBtn');
    btn.disabled = true;

    const zip = new JSZip();
    const folder = zip.folder(sanitizeFilename(plTitle || 'playlist'));

    // MD 파일 포함
    folder.file('playlist.md', buildMarkdown());

    // 썸네일 이미지 다운로드
    const progress = document.createElement('div');
    progress.className = 'progress-wrap';
    progress.innerHTML = `
      <div id="zipProgressText">썸네일 다운로드 중 (0 / ${plItems.length})</div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="zipProgressBar" style="width:0%"></div>
      </div>
    `;
    document.getElementById('plResult').appendChild(progress);

    let done = 0;
    await Promise.all(plItems.map(async (item, i) => {
      try {
        const res = await fetch(
          `/.netlify/functions/yt-thumb-img?id=${item.videoId}&q=hq`
        );
        if (res.ok) {
          const blob = await res.blob();
          const num = String(i + 1).padStart(2, '0');
          folder.file(`${num}_${item.videoId}.jpg`, blob);
        }
      } catch { /* 개별 실패는 무시 */ }
      done++;
      const pct = Math.round((done / plItems.length) * 100);
      const el = document.getElementById('zipProgressText');
      const bar = document.getElementById('zipProgressBar');
      if (el) el.textContent = `썸네일 다운로드 중 (${done} / ${plItems.length})`;
      if (bar) bar.style.width = `${pct}%`;
    }));

    const blob = await zip.generateAsync({ type: 'blob' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${sanitizeFilename(plTitle || 'playlist')}.zip`;
    a.click();
    URL.revokeObjectURL(a.href);

    progress.remove();
    btn.disabled = false;
  }

  function buildMarkdown() {
    const lines = [
      `# ${plTitle || '플레이리스트'}`,
      `> 총 ${plItems.length}개 영상 | [플레이리스트 열기](${plUrl})`,
      '',
      '---',
      '',
    ];

    plItems.forEach((item, i) => {
      lines.push(`## ${i + 1}. ${item.title}`);
      lines.push('');
      lines.push(`[![thumbnail](https://img.youtube.com/vi/${item.videoId}/hqdefault.jpg)](https://youtu.be/${item.videoId})`);
      lines.push('');
      if (item.description && item.description.trim()) {
        lines.push(item.description.trim());
        lines.push('');
      }
      lines.push('---');
      lines.push('');
    });

    return lines.join('\n');
  }

  function savePLToHistory(url) {
    let plHistory = [];
    try {
      const raw = localStorage.getItem(PL_HISTORY_KEY);
      if (raw) plHistory = JSON.parse(raw);
    } catch { plHistory = []; }

    // 중복 제거 및 최신순으로 정렬
    plHistory = plHistory.filter(u => u !== url);
    plHistory.unshift(url);

    // 최대 30개만 유지
    plHistory = plHistory.slice(0, 30);

    localStorage.setItem(PL_HISTORY_KEY, JSON.stringify(plHistory));
  }

  function renderPLHistory() {
    let plHistory = [];
    try {
      const raw = localStorage.getItem(PL_HISTORY_KEY);
      if (raw) plHistory = JSON.parse(raw);
    } catch { plHistory = []; }

    if (plHistory.length === 0) return;

    let historySection = document.getElementById('plHistorySection');
    if (!historySection) {
      historySection = document.createElement('div');
      historySection.id = 'plHistorySection';
      historySection.style.marginTop = '1.5rem';
      const plResult = document.getElementById('plResult');
      if (plResult.parentNode) {
        plResult.parentNode.insertBefore(historySection, plResult.nextSibling);
      }
    }

    historySection.innerHTML = `
      <div style="margin-bottom:0.75rem; font-size:0.85rem; font-weight:600; color:var(--fg-muted); text-transform:uppercase;">히스토리</div>
      <ul style="list-style:none; padding:0; margin:0;">
        ${plHistory.map(url => `
          <li style="padding:0.5rem; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
            <button onclick="applyFromPLHistory('${url.replace(/'/g, "\\'")}')"
              title="${url}"
              style="flex:1; text-align:left; background:none; border:none; color:var(--primary); cursor:pointer; padding:0; font-size:0.875rem;">
              ${escHtml(url.substring(0, 50))}${url.length > 50 ? '...' : ''}
            </button>
            <button class="del-btn" onclick="deleteFromPLHistory('${url.replace(/'/g, "\\'")}')"
              style="padding:0.25rem 0.5rem; font-size:0.75rem; background:none; border:1px solid var(--border); cursor:pointer; border-radius:0.25rem;">×</button>
          </li>
        `).join('')}
      </ul>
    `;
  }

  function applyFromPLHistory(url) {
    document.getElementById('youtubeUrl').value = url;
    fetchPlaylist();
  }

  function deleteFromPLHistory(url) {
    let plHistory = [];
    try {
      const raw = localStorage.getItem(PL_HISTORY_KEY);
      if (raw) plHistory = JSON.parse(raw);
    } catch { plHistory = []; }

    plHistory = plHistory.filter(u => u !== url);
    localStorage.setItem(PL_HISTORY_KEY, JSON.stringify(plHistory));

    renderPLHistory();
  }

  function togglePLHistory() {
    const historySection = document.getElementById('plHistorySection');
    if (historySection) {
      historySection.style.display = historySection.style.display === 'none' ? 'block' : 'none';
    }
  }

  function showPlLoading(msg) {
    document.getElementById('plResult').innerHTML = `
      <div class="loading-box">
        <div class="spinner"></div>
        <span>${msg}</span>
      </div>
    `;
  }

  function showPlError(msg) {
    document.getElementById('plResult').innerHTML = `<div class="error-box">${escHtml(msg)}</div>`;
  }

  /* ───────────────────────── 유틸 ───────────────────────── */
  function escHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function sanitizeFilename(name) {
    return name.replace(/[\\/:*?"<>|]/g, '_').trim().slice(0, 60) || 'playlist';
  }
</script>
</body>
</html>
