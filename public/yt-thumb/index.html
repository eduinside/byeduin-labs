<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YT Thumbnail — byeduin</title>
  <link rel="stylesheet" href="/common/hero-theme.css">
  <script src="/common/theme.js"></script>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 1rem 1rem 4rem;
    }

    .wrap {
      width: 100%;
      max-width: 480px;
      margin-top: 3.5rem;
    }

    .app-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 1.25rem;
      padding: 1.75rem;
    }

    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.625rem; margin-top: 0.75rem; }

    /* 결과 영역 */
    #result {
      margin-top: 1.25rem;
      display: none;
    }

    .thumb-item {
      margin-bottom: 1rem;
    }

    .thumb-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--fg-muted);
      margin-bottom: 0.375rem;
    }

    /* 썸네일 미리보기 */
    .thumb-preview {
      width: 100%;
      border-radius: 0.625rem;
      border: 1px solid var(--border);
      overflow: hidden;
      background: #000;
      margin-bottom: 0.5rem;
      aspect-ratio: 16/9;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .thumb-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumb-url-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 0.625rem;
      padding: 0.5rem 0.75rem;
    }

    .thumb-url {
      flex: 1;
      font-size: 0.72rem;
      font-family: monospace;
      color: var(--primary);
      word-break: break-all;
      text-decoration: none;
    }

    .thumb-url:hover { text-decoration: underline; }

    .btn-copy {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--fg-muted);
      padding: 4px;
      border-radius: 0.375rem;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
      min-width: 28px;
      min-height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-copy:hover { color: var(--primary); background: var(--border); }

    /* 에러 */
    .error-box {
      background: rgba(243,18,96,0.08);
      border: 1px solid rgba(243,18,96,0.3);
      border-radius: 0.625rem;
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      color: var(--danger);
    }

    /* 히스토리 */
    .history-section {
      margin-top: 1.25rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
      display: none;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .history-header span { font-size: 0.9rem; font-weight: 700; }
    .btn-clear-h { font-size: 0.75rem; color: var(--danger); background: none; border: none; cursor: pointer; font-family: inherit; }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-height: 220px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 0.5rem 0.625rem;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .history-item:hover { border-color: var(--primary); }

    .history-thumb {
      width: 64px;
      height: 40px;
      object-fit: cover;
      border-radius: 0.375rem;
      flex-shrink: 0;
      background: #000;
    }

    .history-info { flex: 1; min-width: 0; }
    .history-vid  { font-size: 0.78rem; font-family: monospace; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-links { display: flex; gap: 0.625rem; margin-top: 2px; }
    .history-links a { font-size: 0.7rem; color: var(--fg-muted); text-decoration: none; }
    .history-links a:hover { color: var(--primary); text-decoration: underline; }

    .btn-del-h {
      background: none; border: none; color: var(--fg-muted);
      cursor: pointer; padding: 4px; font-size: 0.875rem;
      min-width: 24px; min-height: 24px; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0;
    }
    .btn-del-h:hover { color: var(--danger); }
  </style>
</head>
<body>
<div class="wrap">
  <div class="app-card">

    <div class="app-header">
      <div class="app-badge">Creative</div>
      <h1 class="app-title">YT <span>Thumbnail</span></h1>
      <p class="app-desc">유튜브 URL을 입력하면 썸네일을 미리보기하고 링크를 복사할 수 있습니다.</p>
    </div>

    <label style="display:block;font-size:0.78rem;font-weight:600;color:var(--fg-muted);margin-bottom:0.375rem;">
      유튜브 URL
    </label>
    <input type="url" id="youtubeUrl" class="hero-input"
           placeholder="https://www.youtube.com/watch?v=..."
           onkeyup="if(event.key==='Enter')extractThumbnail()">

    <div class="btn-row">
      <button onclick="extractThumbnail()" class="hero-btn">추출하기</button>
      <button onclick="toggleHistory()" class="hero-btn hero-btn-ghost">히스토리</button>
    </div>

    <!-- 결과 -->
    <div id="result"></div>

    <!-- 히스토리 -->
    <div class="history-section" id="historySection">
      <div class="history-header">
        <span>검색 히스토리</span>
        <button class="btn-clear-h" onclick="clearHistory()">전체 삭제</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>

  </div>
</div>

<!-- 우상단 오버레이 -->
<div class="top-overlay">
  <button id="themeToggleBtn" class="overlay-btn" onclick="cycleTheme()" title="테마 변경">💻</button>
  <a href="/" class="overlay-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    <span>Home</span>
  </a>
</div>

<script>
  const HISTORY_KEY = 'youtube_thumbnail_history_v2';
  const YT_REGEX = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:[^\/\n\s]+\/\S+\/|(?:v|e(?:mbed)?|shorts|live)\/|\S*?[?&]v=)|youtu\.be\/)([a-zA-Z0-9_-]{11})/;

  function extractThumbnail() {
    const url = document.getElementById('youtubeUrl').value.trim();
    const result = document.getElementById('result');
    if (!url) { showError('URL을 입력해주세요.'); return; }
    const match = url.match(YT_REGEX);
    if (match && match[1]) {
      saveToHistory(match[1]);
      displayResult(match[1]);
      if (!document.getElementById('historySection').style.display || document.getElementById('historySection').style.display !== 'none') {
        renderHistory();
      }
    } else {
      showError('유효하지 않은 유튜브 URL입니다.');
    }
  }

  function displayResult(videoId) {
    const result = document.getElementById('result');
    const maxRes = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
    const hq     = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;

    result.style.display = 'block';
    result.innerHTML = `
      <div class="thumb-item">
        <div class="thumb-label">최대 해상도 (maxresdefault)</div>
        <div class="thumb-preview">
          <img src="${maxRes}" alt="maxres thumbnail"
               onerror="this.parentElement.innerHTML='<span style=&quot;color:#888;font-size:0.8rem&quot;>이미지 없음 (1080p 미지원 영상)</span>'">
        </div>
        <div class="thumb-url-row">
          <a href="${maxRes}" target="_blank" class="thumb-url" rel="noopener">${maxRes}</a>
          <button class="btn-copy" onclick="copyUrl(this,'${maxRes}')" title="복사">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="thumb-item">
        <div class="thumb-label">고화질 (hqdefault)</div>
        <div class="thumb-preview">
          <img src="${hq}" alt="hq thumbnail">
        </div>
        <div class="thumb-url-row">
          <a href="${hq}" target="_blank" class="thumb-url" rel="noopener">${hq}</a>
          <button class="btn-copy" onclick="copyUrl(this,'${hq}')" title="복사">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
          </button>
        </div>
      </div>
    `;
  }

  function showError(msg) {
    const result = document.getElementById('result');
    result.style.display = 'block';
    result.innerHTML = `<div class="error-box">${msg}</div>`;
  }

  function copyUrl(btn, url) {
    navigator.clipboard.writeText(url).then(() => {
      btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
      setTimeout(() => {
        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
      }, 1500);
    }).catch(() => alert('복사 실패'));
  }

  function saveToHistory(videoId) {
    let h = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    h = h.filter(id => id !== videoId);
    h.unshift(videoId);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(h.slice(0, 30)));
  }

  function toggleHistory() {
    const sec = document.getElementById('historySection');
    const hidden = sec.style.display === 'none' || !sec.style.display;
    sec.style.display = hidden ? 'block' : 'none';
    if (hidden) renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    const h = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    if (!h.length) { list.innerHTML = '<p style="text-align:center;color:var(--fg-muted);font-size:0.8rem;padding:1rem">기록이 없습니다.</p>'; return; }
    list.innerHTML = h.map(id => `
      <div class="history-item" onclick="applyFromHistory('${id}')">
        <img class="history-thumb" src="https://img.youtube.com/vi/${id}/mqdefault.jpg" alt="">
        <div class="history-info">
          <div class="history-vid">${id}</div>
          <div class="history-links">
            <a href="https://www.youtube.com/watch?v=${id}" target="_blank" rel="noopener" onclick="event.stopPropagation()">영상 보기</a>
          </div>
        </div>
        <button class="btn-del-h" onclick="event.stopPropagation();deleteFromHistory('${id}')">✕</button>
      </div>
    `).join('');
  }

  function applyFromHistory(videoId) {
    document.getElementById('youtubeUrl').value = `https://www.youtube.com/watch?v=${videoId}`;
    displayResult(videoId);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function deleteFromHistory(videoId) {
    let h = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]').filter(id => id !== videoId);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
    renderHistory();
  }

  function clearHistory() {
    if (confirm('모든 기록을 삭제하시겠습니까?')) {
      localStorage.removeItem(HISTORY_KEY);
      renderHistory();
    }
  }
</script>
</body>
</html>
