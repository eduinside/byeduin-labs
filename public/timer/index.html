<!DOCTYPE html>
<html lang="ko-KR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timer — byeduin</title>
  <link rel="stylesheet" href="/common/hero-theme.css">
  <script src="/common/theme.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem 1rem 7rem;
    }

    /* 시계 */
    .clock-section {
      text-align: center;
      margin-top: 3.5rem;
      margin-bottom: 1.5rem;
    }
    #main-clock {
      font-size: clamp(2.8rem, 10vw, 4.5rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    #main-date {
      font-size: 0.95rem;
      color: var(--fg-muted);
      margin-top: 0.375rem;
    }

    /* 메인 카드 */
    .main-card {
      width: 100%;
      max-width: 500px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      padding: 1.25rem;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      margin-bottom: 6rem;
    }

    /* 탭 바 */
    .tab-bar {
      display: flex;
      overflow-x: auto;
      gap: 6px;
      padding-bottom: 0.75rem;
      margin-bottom: 0.875rem;
      border-bottom: 1px solid var(--border);
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .tab-bar::-webkit-scrollbar { display: none; }

    .tab-item {
      padding: 6px 14px;
      border-radius: 9999px;
      font-size: 0.82rem;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      background: var(--bg);
      color: var(--fg-muted);
      border: 1px solid var(--border);
      transition: background 0.15s, color 0.15s;
      min-height: 34px;
      display: flex;
      align-items: center;
      font-family: inherit;
    }
    .tab-item.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* 알람 목록 */
    .alarm-list { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 0.625rem; }

    .alarm-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 0.875rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: fadeSlide 0.25s ease;
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .alarm-info .name { font-size: 0.8rem; color: var(--fg-muted); margin-bottom: 2px; }
    .alarm-info .time { font-size: 1.5rem; font-weight: 700; line-height: 1.2; }
    .alarm-info .days { font-size: 0.72rem; color: var(--primary); font-weight: 600; margin-top: 2px; }

    .item-actions { display: flex; gap: 4px; }
    .action-btn {
      background: none;
      border: none;
      padding: 8px;
      cursor: pointer;
      border-radius: 50%;
      color: var(--fg-muted);
      transition: background 0.15s, color 0.15s;
      min-width: 36px;
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .action-btn:hover { background: var(--border); }
    .action-btn.edit:hover  { color: var(--primary); }
    .action-btn.delete:hover { color: var(--danger); }

    /* 빈 상태 */
    .empty-state {
      text-align: center;
      color: var(--fg-muted);
      padding: 2.5rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.9rem;
    }

    /* 하단 컨트롤 바 */
    .control-bar {
      position: fixed;
      bottom: 20px;
      width: calc(100% - 2rem);
      max-width: 500px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 1.25rem;
      padding: 0.5rem;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
      z-index: 500;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .icon-btn {
      background: none;
      border: none;
      color: var(--fg);
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      padding: 0.5rem 0;
      border-radius: 0.875rem;
      transition: background 0.15s;
      gap: 3px;
      min-height: 52px;
      font-family: inherit;
    }
    .icon-btn:hover { background: var(--border); }
    .icon-btn span { font-size: 0.6rem; font-weight: 600; color: var(--fg-muted); }

    /* 모달 */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(4px);
      display: none;
      justify-content: center;
      align-items: flex-end;
      z-index: 1000;
      padding: 1rem;
    }
    .modal.open { display: flex; }

    .modal-content {
      background: var(--bg);
      border: 1px solid var(--border);
      width: 100%;
      max-width: 420px;
      border-radius: 1.5rem;
      padding: 1.5rem;
      box-shadow: var(--shadow);
      margin-bottom: env(safe-area-inset-bottom, 0);
    }

    .modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.25rem; }

    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--fg-muted); margin-bottom: 0.375rem; }

    .day-selector { display: flex; gap: 5px; justify-content: space-between; }
    .day-checkbox { display: none; }
    .day-label {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: 1px solid var(--border);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 0.78rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      font-weight: 600;
      background: var(--bg);
    }
    .day-checkbox:checked + .day-label { background: var(--primary); color: #fff; border-color: var(--primary); }

    .modal-footer { display: flex; gap: 0.5rem; margin-top: 0.25rem; }
    .btn-cancel { background: var(--card-bg); color: var(--fg); border: 1px solid var(--border); border-radius: 0.75rem; padding: 0.75rem 1rem; font-size: 0.9rem; cursor: pointer; flex: 1; font-family: inherit; min-height: 44px; }
    .btn-cancel:hover { border-color: var(--primary); }

    /* 알람 오버레이 */
    #alarm-overlay {
      position: fixed;
      inset: 0;
      background: var(--primary);
      color: #fff;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 2000;
      gap: 0.5rem;
      text-align: center;
      padding: 2rem;
    }
    #alarm-overlay.show { display: flex; }
    #alarm-overlay h1 { font-size: clamp(3rem, 15vw, 5rem); font-weight: 800; margin: 0.5rem 0; }
    #alarm-overlay p  { font-size: 1.2rem; opacity: 0.9; }
    #stop-alarm {
      margin-top: 2rem;
      padding: 1rem 3rem;
      border-radius: 9999px;
      border: 2px solid rgba(255,255,255,0.8);
      background: transparent;
      color: #fff;
      font-size: 1.2rem;
      font-weight: 800;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      font-family: inherit;
      min-height: 56px;
    }
    #stop-alarm:hover { background: #fff; color: var(--primary); }

    /* 로그 */
    .log-list { max-height: 220px; overflow-y: auto; margin-bottom: 1rem; }
    .log-item { padding: 0.625rem 0; border-bottom: 1px solid var(--border); font-size: 0.8rem; }
    .log-item .log-name { font-weight: 600; }
    .log-item .log-date { color: var(--fg-muted); font-size: 0.72rem; margin-top: 2px; }
  </style>
</head>
<body>

  <div class="clock-section">
    <div id="main-date">...</div>
    <div id="main-clock">00:00:00</div>
  </div>

  <div class="main-card">
    <div class="tab-bar" id="tab-bar">
      <button class="tab-item active" onclick="setTab('all')">전체</button>
      <button class="tab-item" onclick="setTab(1)">월</button>
      <button class="tab-item" onclick="setTab(2)">화</button>
      <button class="tab-item" onclick="setTab(3)">수</button>
      <button class="tab-item" onclick="setTab(4)">목</button>
      <button class="tab-item" onclick="setTab(5)">금</button>
      <button class="tab-item" onclick="setTab(6)">토</button>
      <button class="tab-item" onclick="setTab(0)">일</button>
    </div>
    <div id="alarm-list" class="alarm-list"></div>
  </div>

  <!-- 하단 컨트롤 바 -->
  <div class="control-bar">
    <button class="icon-btn" onclick="openAddModal()">
      <i data-lucide="plus-circle"></i><span>추가</span>
    </button>
    <button class="icon-btn" onclick="testAlarm()">
      <i data-lucide="bell-ring"></i><span>테스트</span>
    </button>
    <button class="icon-btn" onclick="exportAlarms()">
      <i data-lucide="download"></i><span>백업</span>
    </button>
    <button class="icon-btn" onclick="triggerImport()">
      <i data-lucide="upload"></i><span>복구</span>
    </button>
    <button class="icon-btn" onclick="openModal('logModal')">
      <i data-lucide="history"></i><span>기록</span>
    </button>
  </div>

  <!-- 알람 추가/수정 모달 -->
  <div id="alarmModal" class="modal" onclick="if(event.target===this)closeModal('alarmModal')">
    <div class="modal-content">
      <div class="modal-title" id="modalTitle">알람 추가</div>
      <input type="hidden" id="editId">

      <div class="form-group">
        <label class="form-label">알람 이름</label>
        <input type="text" id="alarmName" class="hero-input" placeholder="예: 약 먹기, 출근">
      </div>
      <div class="form-group">
        <label class="form-label">시간 설정</label>
        <input type="time" id="alarmTime" class="hero-input">
      </div>
      <div class="form-group">
        <label class="form-label">반복 요일</label>
        <div class="day-selector">
          <input type="checkbox" id="d0" class="day-checkbox" value="0"><label for="d0" class="day-label">일</label>
          <input type="checkbox" id="d1" class="day-checkbox" value="1" checked><label for="d1" class="day-label">월</label>
          <input type="checkbox" id="d2" class="day-checkbox" value="2" checked><label for="d2" class="day-label">화</label>
          <input type="checkbox" id="d3" class="day-checkbox" value="3" checked><label for="d3" class="day-label">수</label>
          <input type="checkbox" id="d4" class="day-checkbox" value="4" checked><label for="d4" class="day-label">목</label>
          <input type="checkbox" id="d5" class="day-checkbox" value="5" checked><label for="d5" class="day-label">금</label>
          <input type="checkbox" id="d6" class="day-checkbox" value="6"><label for="d6" class="day-label">토</label>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal('alarmModal')">취소</button>
        <button class="hero-btn" style="flex:2" id="saveBtn" onclick="saveAlarm()">저장하기</button>
      </div>
    </div>
  </div>

  <!-- 로그 모달 -->
  <div id="logModal" class="modal" onclick="if(event.target===this)closeModal('logModal')">
    <div class="modal-content">
      <div class="modal-title">알람 실행 기록</div>
      <div class="log-list" id="log-list"></div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="clearLogs()">기록 삭제</button>
        <button class="hero-btn" style="flex:2" onclick="closeModal('logModal')">닫기</button>
      </div>
    </div>
  </div>

  <!-- 알람 오버레이 -->
  <div id="alarm-overlay">
    <i data-lucide="alarm-clock" style="width:80px;height:80px;"></i>
    <p id="active-alarm-name">알람</p>
    <h1 id="active-alarm-time">00:00</h1>
    <button id="stop-alarm" onclick="stopAlarm()">그만 울리기</button>
  </div>

  <input type="file" id="importInput" style="display:none" accept=".json" onchange="importAlarms(event)">

  <!-- 우상단 오버레이: 테마 + 홈 -->
  <div class="top-overlay">
    <button id="themeToggleBtn" class="overlay-btn" onclick="cycleTheme()" title="테마 변경">💻</button>
    <a href="/" class="overlay-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Home</span>
    </a>
  </div>

  <script>
    // Web Worker (백그라운드 tick)
    const worker = new Worker(URL.createObjectURL(new Blob([
      'setInterval(()=>postMessage("tick"),1000);'
    ], { type: 'application/javascript' })));

    let alarms = JSON.parse(localStorage.getItem('alarms') || '[]');
    let logs   = JSON.parse(localStorage.getItem('alarm_logs') || '[]');
    let audioCtx, isAlarmPlaying = false, currentTab = 'all', wakeLock = null;

    lucide.createIcons();

    if (window.Notification && Notification.permission !== 'granted') Notification.requestPermission();

    async function requestWakeLock() {
      try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch {}
    }
    requestWakeLock();

    worker.onmessage = () => {
      const now = new Date();
      document.getElementById('main-clock').textContent =
        now.toLocaleTimeString('ko-KR', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
      document.getElementById('main-date').textContent =
        now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
      checkAlarms(now);
    };

    function setTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-item').forEach(el => {
        const match = tab === 'all' ? el.textContent === '전체'
          : el.textContent === ['일','월','화','수','목','금','토'][tab];
        el.classList.toggle('active', match);
      });
      renderAlarms();
    }

    function checkAlarms(now) {
      if (isAlarmPlaying) return;
      const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds(), d = now.getDay();
      alarms.forEach(a => {
        const [ah, am] = a.time.split(':').map(Number);
        if (ah === h && am === m && s === 0 && a.days.includes(d)) triggerAlarm(a);
      });
    }

    function triggerAlarm(alarm) {
      isAlarmPlaying = true;
      document.getElementById('active-alarm-time').textContent = alarm.time;
      document.getElementById('active-alarm-name').textContent = alarm.name;
      document.getElementById('alarm-overlay').classList.add('show');
      logs.unshift({ name: alarm.name, time: alarm.time, date: new Date().toLocaleString() });
      localStorage.setItem('alarm_logs', JSON.stringify(logs));
      playAlarmSound();
      if (window.Notification && Notification.permission === 'granted') {
        const n = new Notification('VIVES Timer', { body: `${alarm.name} (${alarm.time})` });
        n.onclick = () => { window.focus(); stopAlarm(); };
      }
    }

    function stopAlarm() {
      isAlarmPlaying = false;
      document.getElementById('alarm-overlay').classList.remove('show');
      if (audioCtx) audioCtx.close();
    }

    function playAlarmSound() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const note = (f, t, d) => {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = 'sine'; o.frequency.setValueAtTime(f, t);
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.2, t + 0.1);
        g.gain.exponentialRampToValueAtTime(0.001, t + d);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(t); o.stop(t + d);
      };
      const seq = () => {
        if (!isAlarmPlaying) return;
        const t = audioCtx.currentTime;
        note(523.25, t, 2); note(659.25, t + 0.5, 2); note(783.99, t + 1.0, 2);
        setTimeout(seq, 3000);
      };
      seq();
    }

    function testAlarm() {
      if (Notification.permission !== 'granted') Notification.requestPermission();
      triggerAlarm({ name: '테스트 알람', time: 'TEST' });
    }

    function openAddModal() {
      const now = new Date();
      document.getElementById('modalTitle').textContent = '알람 추가';
      document.getElementById('saveBtn').textContent = '저장하기';
      document.getElementById('editId').value = '';
      document.getElementById('alarmName').value = '';
      document.getElementById('alarmTime').value =
        `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      openModal('alarmModal');
    }

    function openEditModal(id) {
      const a = alarms.find(x => x.id === id);
      if (!a) return;
      document.getElementById('modalTitle').textContent = '알람 수정';
      document.getElementById('saveBtn').textContent = '수정 완료';
      document.getElementById('editId').value = id;
      document.getElementById('alarmName').value = a.name;
      document.getElementById('alarmTime').value = a.time;
      for (let i = 0; i < 7; i++) document.getElementById(`d${i}`).checked = a.days.includes(i);
      openModal('alarmModal');
    }

    function saveAlarm() {
      const id   = document.getElementById('editId').value;
      const name = document.getElementById('alarmName').value || '알람';
      const time = document.getElementById('alarmTime').value;
      const days = Array.from({length:7}, (_,i) => document.getElementById(`d${i}`).checked ? i : -1).filter(i => i >= 0);
      if (!time) return alert('시간을 선택해 주세요.');
      if (!days.length) return alert('반복할 요일을 선택해 주세요.');
      if (id) {
        const idx = alarms.findIndex(a => a.id == id);
        alarms[idx] = { ...alarms[idx], name, time, days };
      } else {
        alarms.push({ id: Date.now(), name, time, days });
      }
      localStorage.setItem('alarms', JSON.stringify(alarms));
      renderAlarms();
      closeModal('alarmModal');
    }

    function deleteAlarm(id) {
      alarms = alarms.filter(a => a.id !== id);
      localStorage.setItem('alarms', JSON.stringify(alarms));
      renderAlarms();
    }

    function renderAlarms() {
      const list = document.getElementById('alarm-list');
      list.innerHTML = '';
      const filtered = currentTab === 'all' ? alarms : alarms.filter(a => a.days.includes(currentTab));
      if (!filtered.length) {
        list.innerHTML = `<div class="empty-state"><i data-lucide="calendar-x"></i><p>설정된 알람이 없습니다.</p></div>`;
        lucide.createIcons(); return;
      }
      const dayNames = ['일','월','화','수','목','금','토'];
      filtered.sort((a,b) => a.time.localeCompare(b.time)).forEach(alarm => {
        const dayStr = alarm.days.length === 7 ? '매일' : alarm.days.map(d => dayNames[d]).join(', ');
        const div = document.createElement('div');
        div.className = 'alarm-item';
        div.innerHTML = `
          <div class="alarm-info">
            <div class="name">${alarm.name}</div>
            <div class="time">${alarm.time}</div>
            <div class="days">${dayStr}</div>
          </div>
          <div class="item-actions">
            <button class="action-btn edit" onclick="openEditModal(${alarm.id})"><i data-lucide="pencil" style="width:16px"></i></button>
            <button class="action-btn delete" onclick="deleteAlarm(${alarm.id})"><i data-lucide="trash-2" style="width:16px"></i></button>
          </div>`;
        list.appendChild(div);
      });
      lucide.createIcons();
    }

    function exportAlarms() {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([JSON.stringify({ alarms, logs })], { type: 'application/json' }));
      a.download = 'timer_backup.json'; a.click();
    }
    function triggerImport() { document.getElementById('importInput').click(); }
    function importAlarms(e) {
      const reader = new FileReader();
      reader.onload = ev => {
        const data = JSON.parse(ev.target.result);
        alarms = data.alarms || []; logs = data.logs || [];
        localStorage.setItem('alarms', JSON.stringify(alarms));
        renderAlarms(); alert('불러오기 완료!');
      };
      reader.readAsText(e.target.files[0]);
    }

    function renderLogs() {
      const c = document.getElementById('log-list');
      if (!logs.length) { c.innerHTML = '<p style="text-align:center;color:var(--fg-muted);padding:1rem">기록이 없습니다.</p>'; return; }
      c.innerHTML = logs.slice(0, 30).map(l => `
        <div class="log-item">
          <div class="log-name">${l.name} (${l.time})</div>
          <div class="log-date">${l.date}</div>
        </div>`).join('');
    }
    function clearLogs() { logs = []; localStorage.setItem('alarm_logs', '[]'); renderLogs(); }
    function openModal(id)  { document.getElementById(id).classList.add('open'); if (id === 'logModal') renderLogs(); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    renderAlarms();
  </script>
</body>
</html>
