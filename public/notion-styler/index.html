<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Styler — byeduin</title>
    <link rel="stylesheet" href="/common/hero-theme.css">
    <script src="/common/theme.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- KaTeX CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel (for JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- KaTeX JS -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
            background: var(--bg);
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(124,106,247,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124,106,247,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none; z-index: 0;
        }
        #root { position: relative; z-index: 1; }

        /* ── Notion Styler 전용 클래스 ── */
        .ns-wrap {
            width: 100%; max-width: 1080px;
            margin: 0 auto; padding: 48px 20px 80px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto 1fr;
            column-gap: 20px;
            align-items: stretch;
        }
        .ns-full {
            grid-column: 1 / -1;
        }
        .ns-col-left,
        .ns-col-right {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        /* 텍스트 입력 카드 = 높이 유동 확장 */
        .ns-col-left > .ns-card:first-child {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .ns-col-left > .ns-card:first-child .ns-textarea {
            flex: 1;
            min-height: 120px;
        }
        /* 미리보기 카드 = 높이 맞춤 확장 */
        .ns-col-right > .ns-card:first-child {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .ns-col-right > .ns-card:first-child .ns-preview {
            flex: 1;
            min-height: 160px;
        }
        @media (max-width: 760px) {
            .ns-wrap { grid-template-columns: 1fr; }
            .ns-full { grid-column: 1; }
        }
        .ns-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 12px; padding: 24px;
        }
        .ns-card-title {
            font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
            text-transform: uppercase; color: var(--fg-muted); margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px;
        }
        .ns-card-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        .ns-label { display: block; font-size: 13px; font-weight: 500; color: var(--fg-muted); margin-bottom: 8px; }
        .ns-label-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .ns-align-btns { display: flex; gap: 3px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 3px; }
        .ns-align-btn { padding: 5px; border: none; background: none; cursor: pointer; color: var(--fg-muted); border-radius: 5px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
        .ns-align-btn.active { background: var(--primary); color: #fff; }
        .ns-textarea {
            width: 100%; background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; padding: 12px 14px; font-size: 16px;
            color: var(--fg); outline: none; transition: border-color 0.2s; resize: vertical;
            min-height: 100px; font-family: inherit;
        }
        .ns-textarea:focus { border-color: var(--primary); }
        .ns-tab-group { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
        .ns-tab {
            flex: 1; padding: 8px 10px; background: var(--bg);
            border: 1px solid var(--border); border-radius: 8px;
            color: var(--fg-muted); font-size: 12px; font-family: inherit;
            cursor: pointer; transition: all 0.15s; text-align: center;
            display: flex; align-items: center; justify-content: center; gap: 5px; white-space: nowrap;
        }
        .ns-tab.active { background: rgba(0,111,238,0.1); border-color: var(--primary); color: var(--primary); font-weight: 700; }
        .ns-color-grid { display: flex; flex-wrap: wrap; gap: 5px; padding: 6px 0; align-content: flex-start; }
        .ns-swatch {
            width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.15s; border: 2px solid transparent; outline: none;
            flex-shrink: 0;
        }
        .ns-swatch:hover { transform: scale(1.15); }
        .ns-swatch.selected { outline: 2px solid var(--primary); outline-offset: 2px; transform: scale(1.15); }
        .ns-swatch-transparent { background: white; border: 1px solid var(--border); position: relative; overflow: hidden; }
        .ns-swatch-transparent::before { content: ''; position: absolute; width: 140%; height: 2px; background: #f31260; transform: rotate(-45deg); }
        .ns-custom-color { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; border-radius: 50%; overflow: hidden; }
        .ns-color-input { position: absolute; width: 200%; height: 200%; opacity: 0; cursor: pointer; }
        .ns-color-preview { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); }
        .ns-font-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .ns-font-btn {
            padding: 8px 4px; font-size: 11px; background: var(--bg);
            border: 1px solid var(--border); border-radius: 8px;
            color: var(--fg-muted); cursor: pointer; font-family: inherit;
            transition: all 0.15s; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .ns-font-btn.active { background: rgba(0,111,238,0.1); border-color: var(--primary); color: var(--primary); font-weight: 700; }
        .ns-preview {
            background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
            padding: 24px; min-height: 100px; display: flex; align-items: center; justify-content: center; overflow-x: auto;
        }
        .ns-code-wrap { position: relative; margin-bottom: 10px; }
        .ns-code {
            width: 100%; padding: 14px 48px 14px 14px;
            background: #12121e; color: #e2e8f0;
            border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 12px;
            overflow-x: auto; white-space: pre-wrap; word-break: break-all;
            border: 1px solid #252535; margin: 0;
        }
        .ns-copy-btn {
            position: absolute; right: 8px; top: 8px;
            padding: 7px; background: rgba(255,255,255,0.08); border: none;
            border-radius: 6px; cursor: pointer; color: #94a3b8;
            display: flex; align-items: center; transition: all 0.15s;
        }
        .ns-copy-btn:hover { background: rgba(255,255,255,0.18); color: #fff; }
        .ns-copy-btn.copied { background: #17c964; color: #fff; }
        .ns-hint { font-size: 11.5px; color: var(--fg-muted); display: flex; align-items: center; gap: 5px; }
        .ns-hint code { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; background: var(--border); padding: 1px 5px; border-radius: 4px; color: var(--fg); }
        .ns-actions { display: flex; gap: 8px; }
        .ns-action-btn {
            flex: 1; padding: 13px; background: var(--card-bg);
            border: 1px solid var(--border); border-radius: 10px;
            color: var(--fg-muted); font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.15s;
            display: flex; align-items: center; justify-content: center; gap: 6px; font-family: inherit;
        }
        .ns-action-btn:hover { border-color: var(--primary); color: var(--primary); background: rgba(0,111,238,0.06); }

        /* ── 색상 스와치 Tailwind 다크모드 보정 ── */
        [data-theme="dark"] .ns-swatch.bg-gray-200  { background-color: #3f3f46 !important; }
        [data-theme="dark"] .ns-swatch.bg-white     { background-color: #27272a !important; border-color: #3f3f46 !important; }
        [data-theme="dark"] .ns-swatch-transparent  { background-color: #27272a !important; border-color: #3f3f46 !important; }

        /* ── 색상 탭 (글자색/배경색) 토글 ── */
        .ns-tab-group .ns-tab { min-height: 38px; }

        /* ── 크기 탭 균등 배분 ── */
        .ns-tab-group.size-tabs .ns-tab { flex: 1; }

        /* ── 글꼴 스타일 그리드 호버 ── */
        .ns-font-btn:hover:not(.active) {
            background: rgba(0,111,238,0.06);
            border-color: var(--primary);
            color: var(--primary);
        }

        /* ── 정렬 버튼 호버 ── */
        .ns-align-btn:hover:not(.active) {
            background: var(--bg-sec);
            color: var(--fg);
        }

        /* ── 미리보기 영역 다크모드 배경 ── */
        [data-theme="dark"] .ns-preview { background: #18181b; }

        /* ── 코드 블록 다크모드 ── */
        [data-theme="dark"] .ns-code { background: #0d0d1a; border-color: #1e1e30; }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Inline Icons (Lucide Style) to prevent CDN errors ---
        const IconBase = ({ children, size = 24, className = "" }) => (
            <svg
                xmlns="http://www.w3.org/2000/svg"
                width={size}
                height={size}
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                strokeWidth="2"
                strokeLinecap="round"
                strokeLinejoin="round"
                className={className}
            >
                {children}
            </svg>
        );

        const Copy = (props) => (
            <IconBase {...props}>
                <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
                <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
            </IconBase>
        );

        const Check = (props) => (
            <IconBase {...props}>
                <polyline points="20 6 9 17 4 12" />
            </IconBase>
        );

        const Palette = (props) => (
            <IconBase {...props}>
                <circle cx="13.5" cy="6.5" r=".5" fill="currentColor" />
                <circle cx="17.5" cy="10.5" r=".5" fill="currentColor" />
                <circle cx="8.5" cy="7.5" r=".5" fill="currentColor" />
                <circle cx="6.5" cy="12.5" r=".5" fill="currentColor" />
                <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.6 0 1-.4 1-1 0-.6-.4-1-1-1-2 0-2-4 2-4 2 0 3-1 3-3 0-2-3-3-5-3z" />
            </IconBase>
        );

        const Type = (props) => (
            <IconBase {...props}>
                <polyline points="4 7 4 4 20 4 20 7" />
                <line x1="9" x2="15" y1="20" y2="20" />
                <line x1="12" x2="12" y1="4" y2="20" />
            </IconBase>
        );

        const RefreshCcw = (props) => (
            <IconBase {...props}>
                <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                <path d="M3 3v5h5" />
                <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />
                <path d="M16 16h5v5" />
            </IconBase>
        );

        const Info = (props) => (
            <IconBase {...props}>
                <circle cx="12" cy="12" r="10" />
                <path d="M12 16v-4" />
                <path d="M12 8h.01" />
            </IconBase>
        );

        const CaseUpper = (props) => (
            <IconBase {...props}>
                <path d="m3 15 4-8 4 8" />
                <path d="M4 13h6" />
                <circle cx="18" cy="12" r="3" />
                <path d="M21 9v6" />
            </IconBase>
        );

        const AlignLeft = (props) => (
            <IconBase {...props}>
                <line x1="21" x2="3" y1="6" y2="6" />
                <line x1="15" x2="3" y1="12" y2="12" />
                <line x1="17" x2="3" y1="18" y2="18" />
            </IconBase>
        );

        const AlignCenter = (props) => (
            <IconBase {...props}>
                <line x1="21" x2="3" y1="6" y2="6" />
                <line x1="17" x2="7" y1="12" y2="12" />
                <line x1="19" x2="5" y1="18" y2="18" />
            </IconBase>
        );

        const AlignRight = (props) => (
            <IconBase {...props}>
                <line x1="21" x2="3" y1="6" y2="6" />
                <line x1="21" x2="9" y1="12" y2="12" />
                <line x1="21" x2="7" y1="18" y2="18" />
            </IconBase>
        );

        const PaintBucket = (props) => (
            <IconBase {...props}>
                <path d="m19 11-8-8-8.6 8.6a2 2 0 0 0 0 2.8l5.2 5.2c.8.8 2 .8 2.8 0L19 11Z" />
                <path d="m5 2 5 5" />
                <path d="M2 13h15" />
                <path d="M22 20a2 2 0 1 1-4 0c0-1.6 1.7-2.4 2-4 .3 1.6 2 2.4 2 4Z" />
            </IconBase>
        );

        const Shuffle = (props) => (
            <IconBase {...props}>
                <path d="M16 3h5v5" />
                <path d="M4 20L21 3" />
                <path d="M21 16v5h-5" />
                <path d="M15 15l6 6" />
                <path d="M4 4l5 5" />
            </IconBase>
        );

        // --- Main App ---

        const NotionFormulaGenerator = () => {
            const [text, setText] = useState("Hello Notion!");

            // Text Color State
            const [textColor, setTextColor] = useState("default");
            const [customTextColor, setCustomTextColor] = useState("#000000");

            // Background Color State
            const [bgColor, setBgColor] = useState("transparent");
            const [customBgColor, setCustomBgColor] = useState("#f0f0f0");
            const [colorMode, setColorMode] = useState("text"); // 'text' or 'background'

            const [size, setSize] = useState("normalsize");
            const [fontStyle, setFontStyle] = useState("text");
            const [alignment, setAlignment] = useState("c");
            const [isCopied, setIsCopied] = useState(false);
            const previewRef = useRef(null);

            // Colors
            const colors = [
                { name: 'Default', value: 'default', class: 'bg-gray-200 text-black', bgClass: 'bg-white border border-gray-200' },
                { name: 'Gray', value: 'gray', class: 'bg-gray-400 text-white', bgClass: 'bg-gray-400' },
                { name: 'Brown', value: 'brown', class: 'bg-amber-700 text-white', bgClass: 'bg-amber-700' },
                { name: 'Orange', value: 'orange', class: 'bg-orange-500 text-white', bgClass: 'bg-orange-500' },
                { name: 'Yellow', value: 'gold', class: 'bg-yellow-400 text-black', bgClass: 'bg-yellow-400' },
                { name: 'Green', value: 'green', class: 'bg-green-500 text-white', bgClass: 'bg-green-500' },
                { name: 'Blue', value: 'blue', class: 'bg-blue-500 text-white', bgClass: 'bg-blue-500' },
                { name: 'Purple', value: 'purple', class: 'bg-purple-500 text-white', bgClass: 'bg-purple-500' },
                { name: 'Pink', value: 'magenta', class: 'bg-pink-500 text-white', bgClass: 'bg-pink-500' },
                { name: 'Red', value: 'red', class: 'bg-red-500 text-white', bgClass: 'bg-red-500' },
                { name: 'Custom', value: 'custom', class: 'bg-white border border-gray-300', bgClass: 'bg-white border border-dashed border-gray-400' },
            ];

            // Sizes
            const sizes = [
                { name: 'Tiny', value: 'tiny' },
                { name: 'Small', value: 'small' },
                { name: 'Normal', value: 'normalsize' },
                { name: 'Large', value: 'large' },
                { name: 'Huge', value: 'huge' },
            ];

            // Styles
            const fontStyles = [
                { name: '기본 (Normal)', value: 'text', cmd: '\\text' },
                { name: '굵게 (Bold)', value: 'textbf', cmd: '\\textbf' },
                { name: '기울임 (Italic)', value: 'textit', cmd: '\\textit' },
                { name: '고딕 (Sans)', value: 'textsf', cmd: '\\textsf' },
                { name: '타자기 (Mono)', value: 'texttt', cmd: '\\texttt' },
                { name: '수식 (Math)', value: 'math', cmd: '' },
                { name: '칠판 (Bb)', value: 'mathbb', cmd: '\\mathbb', note: '대문자 전용' },
                { name: '필기체 (Cal)', value: 'mathcal', cmd: '\\mathcal', note: '대문자 전용' },
                { name: '프락투어 (Frak)', value: 'mathfrak', cmd: '\\mathfrak', note: '영문 전용' },
                { name: '세리프 (Serif)', value: 'mathrm', cmd: '\\textrm' },
            ];

            useEffect(() => {
                renderMath();
            }, [text, textColor, customTextColor, bgColor, customBgColor, size, fontStyle, alignment]);

            const generateLatex = () => {
                if (!text) return "";

                const currentStyle = fontStyles.find(s => s.value === fontStyle);
                const cmd = currentStyle ? currentStyle.cmd : '\\text';

                // Process Lines
                const lines = text.split('\n');
                const styledLines = lines.map(line => {
                    if (fontStyle === 'math') return line;

                    // 빈 줄 처리 (빈 줄이 array를 깨지 않도록 ~ 추가)
                    if (!line.trim()) return `${cmd}{~}`;

                    // Special handling for math fonts that ignore spaces (Bb, Cal, Frak)
                    if (['mathbb', 'mathcal', 'mathfrak'].includes(fontStyle)) {
                        const processedLine = line.split(' ').join('~');
                        return `${cmd}{${processedLine}}`;
                    }

                    return `${cmd}{${line}}`;
                });
                const innerContent = styledLines.join(' \\\\ ');
                const alignedContent = `\\begin{array}{${alignment}}${innerContent}\\end{array}`;

                // Apply Text Color
                let colorCmd = "";
                if (textColor !== 'default') {
                    const c = textColor === 'custom' ? customTextColor : textColor;
                    colorCmd = `\\color{${c}} `;
                }

                // Apply Size
                let sizeCmd = "";
                if (size !== 'normalsize') {
                    sizeCmd = `\\${size} `;
                }

                // Combine inner content with size and text color
                let contentBlock = `{ ${colorCmd}${sizeCmd}${alignedContent} }`;

                // Apply Background Color (Wrap everything in colorbox)
                if (bgColor !== 'transparent') {
                    const bg = bgColor === 'custom' ? customBgColor : bgColor;
                    return `\\colorbox{${bg}}{$\\displaystyle ${contentBlock}$}`;
                }

                return contentBlock;
            };

            const renderMath = () => {
                if (window.katex && previewRef.current) {
                    const latex = generateLatex();
                    try {
                        window.katex.render(latex, previewRef.current, {
                            throwOnError: false,
                            displayMode: true,
                        });
                    } catch (e) {
                        // console.error(e);
                    }
                }
            };

            const handleCopy = () => {
                const latex = generateLatex();
                try {
                    const textArea = document.createElement("textarea");
                    textArea.value = latex;
                    textArea.style.position = "fixed";
                    textArea.style.left = "-9999px";
                    textArea.style.top = "0";
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    const successful = document.execCommand('copy');
                    document.body.removeChild(textArea);
                    if (successful) {
                        setIsCopied(true);
                        setTimeout(() => setIsCopied(false), 2000);
                        return;
                    }
                } catch (err) {
                    console.warn("Fallback copy failed", err);
                }

                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(latex)
                        .then(() => {
                            setIsCopied(true);
                            setTimeout(() => setIsCopied(false), 2000);
                        })
                        .catch(err => {
                            alert("복사에 실패했습니다.");
                        });
                } else {
                    alert("복사 기능을 사용할 수 없습니다.");
                }
            };

            const handleRandomize = () => {
                const validColors = colors.filter(c => c.value !== 'custom');
                const randomTextColor = validColors[Math.floor(Math.random() * validColors.length)];
                setTextColor(randomTextColor.value);

                if (Math.random() < 0.15) {
                    const randomBg = validColors[Math.floor(Math.random() * validColors.length)];
                    setBgColor(randomBg.value);
                } else {
                    setBgColor('transparent');
                }

                const randomSize = sizes[Math.floor(Math.random() * sizes.length)];
                setSize(randomSize.value);

                const randomStyle = fontStyles[Math.floor(Math.random() * fontStyles.length)];
                setFontStyle(randomStyle.value);

                setColorMode('text');
            };

            const currentLatex = generateLatex();

            return (
                <div className="ns-wrap">

                    {/* 헤더 — 전체 너비 */}
                    <div className="app-header ns-full" style={{marginBottom:'8px'}}>
                        <div className="app-badge">Notion Tool</div>
                        <h1 className="app-title">노션 <span>수식 스타일러</span></h1>
                        <p className="app-desc">LaTeX 수식을 노션 인라인 블록에 바로 붙여넣을 수 있도록 생성합니다.</p>
                    </div>

                    {/* 왼쪽 열 — 설정 */}
                    <div className="ns-col-left">

                        {/* 텍스트 입력 카드 */}
                        <div className="ns-card">
                            <div className="ns-card-title">텍스트 입력</div>
                            <div className="ns-label-row">
                                <label className="ns-label" style={{margin:0}}>입력</label>
                                <div className="ns-align-btns">
                                    <button onClick={() => setAlignment('l')} className={`ns-align-btn ${alignment === 'l' ? 'active' : ''}`} title="왼쪽"><AlignLeft size={14}/></button>
                                    <button onClick={() => setAlignment('c')} className={`ns-align-btn ${alignment === 'c' ? 'active' : ''}`} title="가운데"><AlignCenter size={14}/></button>
                                    <button onClick={() => setAlignment('r')} className={`ns-align-btn ${alignment === 'r' ? 'active' : ''}`} title="오른쪽"><AlignRight size={14}/></button>
                                </div>
                            </div>
                            <textarea
                                value={text}
                                onChange={(e) => setText(e.target.value)}
                                placeholder="여기에 텍스트를 입력하세요..."
                                className="ns-textarea"
                            />
                        </div>

                        {/* 스타일 설정 카드 */}
                        <div className="ns-card">
                            <div className="ns-card-title">스타일 설정</div>

                            {/* 색상 */}
                            <label className="ns-label">색상</label>
                            <div className="ns-tab-group" style={{marginBottom:'10px'}}>
                                <button onClick={() => setColorMode('text')} className={`ns-tab ${colorMode === 'text' ? 'active' : ''}`}>
                                    <Type size={13}/> 글자색
                                </button>
                                <button onClick={() => setColorMode('background')} className={`ns-tab ${colorMode === 'background' ? 'active' : ''}`}>
                                    <PaintBucket size={13}/> 배경색
                                </button>
                            </div>
                            <div className="ns-color-grid">
                                {colorMode === 'background' && (
                                    <button onClick={() => setBgColor('transparent')} className={`ns-swatch ns-swatch-transparent ${bgColor === 'transparent' ? 'selected' : ''}`} title="투명"/>
                                )}
                                {colors.map((c) => {
                                    const isActive = colorMode === 'text' ? textColor === c.value : bgColor === c.value;
                                    const setFn = colorMode === 'text' ? setTextColor : setBgColor;
                                    const displayClass = colorMode === 'text' ? c.class : c.bgClass;
                                    if (colorMode === 'background' && c.value === 'default') return null;
                                    return (
                                        <button key={c.value} onClick={() => setFn(c.value)}
                                            className={`ns-swatch ${displayClass} ${isActive ? 'selected' : ''}`} title={c.name}>
                                            {c.value === 'custom' && (
                                                <div className="ns-custom-color">
                                                    <input type="color" className="ns-color-input"
                                                        value={colorMode === 'text' ? customTextColor : customBgColor}
                                                        onChange={(e) => {
                                                            if (colorMode === 'text') { setCustomTextColor(e.target.value); setTextColor('custom'); }
                                                            else { setCustomBgColor(e.target.value); setBgColor('custom'); }
                                                        }}
                                                    />
                                                    <span className="ns-color-preview" style={{backgroundColor: colorMode === 'text' ? customTextColor : customBgColor}}/>
                                                </div>
                                            )}
                                            {isActive && c.value !== 'custom' && (
                                                <Check size={13} style={{color: ['default','gold'].includes(c.value) ? '#000' : '#fff'}}/>
                                            )}
                                        </button>
                                    );
                                })}
                            </div>

                            {/* 크기 */}
                            <label className="ns-label" style={{marginTop:'16px'}}>크기 (Size)</label>
                            <div className="ns-tab-group">
                                {sizes.map(s => (
                                    <button key={s.value} onClick={() => setSize(s.value)} className={`ns-tab ${size === s.value ? 'active' : ''}`}>{s.name}</button>
                                ))}
                            </div>

                            {/* 글꼴 스타일 */}
                            <label className="ns-label" style={{marginTop:'16px'}}>글꼴 스타일</label>
                            <div className="ns-font-grid">
                                {fontStyles.map(style => (
                                    <button key={style.value} onClick={() => setFontStyle(style.value)}
                                        className={`ns-font-btn ${fontStyle === style.value ? 'active' : ''}`}
                                        title={style.note || style.name}>
                                        {style.name}
                                    </button>
                                ))}
                            </div>
                        </div>

                    </div>{/* /ns-col-left */}

                    {/* 오른쪽 열 — 미리보기 & 코드 */}
                    <div className="ns-col-right">

                        {/* 미리보기 카드 */}
                        <div className="ns-card">
                            <div className="ns-card-title">미리보기</div>
                            <div className="ns-preview">
                                <div ref={previewRef}></div>
                            </div>
                        </div>

                        {/* 코드 출력 카드 */}
                        <div className="ns-card">
                            <div className="ns-card-title">생성된 코드 (Notion용)</div>
                            <div className="ns-code-wrap">
                                <pre className="ns-code">{currentLatex}</pre>
                                <button onClick={handleCopy} className={`ns-copy-btn ${isCopied ? 'copied' : ''}`} title="복사">
                                    {isCopied ? <Check size={16}/> : <Copy size={16}/>}
                                </button>
                            </div>
                            <p className="ns-hint"><Info size={12}/> 노션에서 <code>/수식</code> 또는 <code>/math</code> 입력 후 붙여넣으세요.</p>
                        </div>

                        {/* 액션 버튼 */}
                        <div className="ns-actions">
                            <button onClick={handleRandomize} className="ns-action-btn"><Shuffle size={15}/> 랜덤 스타일</button>
                            <button onClick={() => { setText("Hello Notion!"); setTextColor("default"); setBgColor("transparent"); setSize("normalsize"); setFontStyle("text"); setAlignment("c"); setColorMode("text"); }}
                                className="ns-action-btn"><RefreshCcw size={15}/> 초기화</button>
                        </div>

                    </div>{/* /ns-col-right */}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<NotionFormulaGenerator />);
    </script>
    <!-- 좌상단: 홈 -->
    <div class="top-overlay-left">
      <a href="/" class="overlay-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>Home</span>
      </a>
    </div>
    <!-- 우상단: 보기모드 + 공유 -->
    <div class="top-overlay">
      <button id="themeToggleBtn" class="overlay-btn" onclick="cycleTheme()" title="보기 모드">💻</button>
      <button id="shareBtn" class="overlay-btn" onclick="shareCurrentPage()" title="공유">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
          <polyline points="16 6 12 2 8 6"/>
          <line x1="12" x2="12" y1="2" y2="15"/>
        </svg>
        <span>공유</span>
      </button>
    </div>
</body>

</html>
