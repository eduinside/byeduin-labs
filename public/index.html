<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>byeduin VIVES</title>
  <link rel="icon" href="/logo.jpg" type="image/jpeg" />
  <link rel="stylesheet" href="/common/hero-theme.css" />
  <script src="/common/theme.js"></script>
  <style>
    body {
      min-height: 100vh;
    }

    .site-header {
      padding: 2rem 1.5rem 1rem;
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .logo-group {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-group img {
      width: 32px;
      height: 32px;
    }

    .logo-title {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .logo-title span {
      color: var(--primary);
    }

    .logo-sub {
      font-size: 0.8rem;
      color: var(--fg-muted);
      margin-top: 1px;
    }

    main {
      padding: 0 1.5rem 5rem;
      max-width: 860px;
      margin: 0 auto;
    }

    /* 카테고리 섹션 */
    .category-section {
      margin-bottom: 2.5rem;
    }

    .category-header {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .category-label {
      font-size: 1rem;
      font-weight: 700;
    }

    .category-desc {
      font-size: 0.8rem;
      color: var(--fg-muted);
    }

    /* 카드 그리드 */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.875rem;
    }

    @media (max-width: 640px) {
      .card-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 400px) {
      .card-grid {
        grid-template-columns: 1fr;
      }
    }

    /* 앱 카드 */
    .app-card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1.25rem;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      position: relative;
    }

    .app-card:hover {
      border-color: rgba(0, 111, 238, 0.4);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0, 111, 238, 0.1);
    }

    .card-emoji {
      font-size: 1.5rem;
      margin-bottom: 0.625rem;
    }

    .card-title {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 0.25rem;
    }

    .card-desc {
      font-size: 0.8rem;
      color: var(--fg-muted);
      line-height: 1.4;
    }

    /* 외부 링크 뱃지 */
    .external-badge {
      position: absolute;
      top: 0.625rem;
      right: 0.75rem;
      font-size: 0.7rem;
      color: var(--fg-muted);
      opacity: 0.6;
    }

    footer {
      text-align: center;
      font-size: 0.75rem;
      color: var(--fg-muted);
      padding: 1.5rem;
      border-top: 1px solid var(--border);
    }

    /* 모달 */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-backdrop.open { opacity: 1; pointer-events: auto; }
    .modal-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 1.25rem;
      padding: 1.75rem;
      max-width: 420px;
      width: 100%;
      transform: translateY(12px);
      transition: transform 0.2s;
    }
    .modal-backdrop.open .modal-box { transform: translateY(0); }
    .modal-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(0,111,238,0.1); border: 1px solid rgba(0,111,238,0.25);
      color: var(--primary); font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 3px 9px; border-radius: 99px; margin-bottom: 12px;
    }
    .modal-badge::before { content: '◆'; font-size: 7px; }
    .modal-title {
      font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px;
    }
    .modal-desc {
      font-size: 0.85rem; color: var(--fg-muted); line-height: 1.65; margin-bottom: 16px;
    }
    .modal-features {
      list-style: none; padding: 0; margin: 0 0 20px;
      display: flex; flex-direction: column; gap: 7px;
    }
    .modal-features li {
      font-size: 0.82rem; color: var(--fg-muted);
      display: flex; align-items: flex-start; gap: 7px;
    }
    .modal-features li::before {
      content: '✓'; color: var(--primary); font-weight: 700; flex-shrink: 0; margin-top: 1px;
    }
    .modal-actions {
      display: flex; gap: 8px; flex-direction: column;
    }
    .modal-btn-primary {
      display: block; text-align: center; text-decoration: none;
      background: var(--primary); color: #fff;
      border: none; border-radius: 0.75rem;
      padding: 12px 16px; font-size: 0.9rem; font-weight: 700;
      cursor: pointer; transition: background 0.15s;
    }
    .modal-btn-primary:hover { background: var(--primary-h); }
    .modal-btn-ghost {
      display: block; text-align: center;
      background: none; color: var(--fg-muted);
      border: 1px solid var(--border); border-radius: 0.75rem;
      padding: 10px 16px; font-size: 0.85rem; font-weight: 500;
      cursor: pointer; transition: border-color 0.15s;
    }
    .modal-btn-ghost:hover { border-color: var(--fg-muted); }

    /* 모달 타입 카드 — 클릭 커서만 다름 */
    .app-card.modal-card { cursor: pointer; }
  </style>
</head>

<body>

  <header class="site-header">
    <div>
      <div class="logo-group">
        <img src="/logo.jpg" alt="logo" />
        <span class="logo-title">byeduin <span>VIVES</span></span>
      </div>
      <div class="logo-sub" style="margin-left:44px;">바이브 코딩으로 만든 작은 앱 모음</div>
    </div>
  </header>

  <main id="main"></main>

  <footer>byeduin · built with vibe coding</footer>

  <!-- 모달 -->
  <div class="modal-backdrop" id="appModal" onclick="closeModal(event)">
    <div class="modal-box">
      <div class="modal-badge" id="modalBadge"></div>
      <div class="modal-title" id="modalTitle"></div>
      <p class="modal-desc" id="modalDesc"></p>
      <ul class="modal-features" id="modalFeatures"></ul>
      <div class="modal-actions">
        <a id="modalLink" href="#" class="modal-btn-primary" target="_blank" rel="noopener noreferrer"></a>
        <button class="modal-btn-ghost" onclick="document.getElementById('appModal').classList.remove('open')">닫기</button>
      </div>
    </div>
  </div>

  <!-- 우상단 테마 토글 + 공유 -->
  <div class="top-overlay">
    <button id="themeToggleBtn" class="overlay-btn" onclick="cycleTheme()" title="보기 모드">💻</button>
    <button id="shareBtn" class="overlay-btn" onclick="shareCurrentPage()" title="공유">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
        <polyline points="16 6 12 2 8 6"/>
        <line x1="12" x2="12" y1="2" y2="15"/>
      </svg>
      <span>공유</span>
    </button>
  </div>

  <script>
    /* =============================================
       앱 목록 — 여기에만 추가하면 됩니다.
       =============================================
       타입 A (내부 앱):
         { emoji, title, desc, href, category }

       타입 B (외부 링크):
         { type:"link", emoji, title, desc, href, external:true, category }
       ============================================= */
    const APPS = [
      // --- 유틸리티 ---
      {
        emoji: "📱",
        title: "QR Master",
        desc: "QR 코드 생성 및 읽기",
        href: "/qr/",
        category: "utility",
      },
      {
        emoji: "⏱️",
        title: "Smart Timer",
        desc: "반복 알람 스케줄 관리 시스템",
        href: "/timer/",
        category: "utility",
      },
      {
        type: "modal",
        emoji: "📎",
        title: "Content ID Viewer",
        desc: "에듀나비 콘텐츠 ID 조회 크롬 확장",
        href: "/chrome-extentions/content-id-viewer-for-edunavi.zip",
        linkLabel: "확장 프로그램 다운로드 ⬇",
        category: "utility",
        badge: "Chrome 확장",
        features: [
          '<a href="https://www.edunavi.kr/arc/main.do" target="_blank" rel="noopener" style="color:var(--primary);text-decoration:none">에듀나비 아카이브</a> 페이지 자동 감지',
          "콘텐츠 ID 오버레이 표시",
          "원클릭 ID 복사 지원",
        ],
        modalDesc: "에듀나비 아카이브 페이지에서 콘텐츠 ID를 간편하게 확인하고 복사할 수 있는 크롬 확장 프로그램입니다. 콘텐츠 관리 시 URL을 일일이 파싱하는 번거로움을 줄여줍니다.",
      },
      {
        type: "modal",
        emoji: "🔑",
        title: "Login Helper",
        desc: "에듀나비 교원업무지원 로그인 도우미",
        href: "https://www.eduin.info/31d48623-c7a0-8053-90ae-f20631f1c640",
        linkLabel: "설치 안내 페이지 보기 ↗",
        external: true,
        category: "utility",
        badge: "유틸리티",
        features: [
          '<a href="https://www.edunavi.kr/portal/ad/tw/no/selectNoticeList.do" target="_blank" rel="noopener" style="color:var(--primary);text-decoration:none">에듀나비 교원업무지원</a> 자동 로그인',
          "윈도우 시작 시 자동 실행",
          "시스템 트레이 버튼을 눌러 설정 변경",
        ],
        modalDesc: "에듀나비 교원업무지원 시스템의 로그인 과정을 단순화하는 프로그램입니다. 계정 정보를 PC에 저장하여 자동 로그인 기능과 매일 아침 자동실행 기능을 지원합니다.",
      },

      // --- 크리에이티브 ---
      {
        emoji: "⬛",
        title: "Grid Maker",
        desc: "이미지를 그리드로 분할 저장",
        href: "/grid-maker/",
        category: "creative",
      },
      {
        emoji: "🎬",
        title: "YT Thumbnail",
        desc: "유튜브 썸네일 추출기",
        href: "/yt-thumb/",
        category: "creative",
      },

      // --- 노션 도구 ---
      {
        emoji: "🖼️",
        title: "Notion Image DL",
        desc: "노션 DB 이미지 일괄 다운로드",
        href: "/notion-image-downloader/",
        category: "notion",
      },
      {
        emoji: "🎨",
        title: "Notion Styler",
        desc: "노션 수식 LaTeX 스타일러",
        href: "/notion-styler/",
        category: "notion",
      },

      // --- 교육 ---
      {
        emoji: "🔢",
        title: "Numberblocks",
        desc: "넘버블록스 에피소드 파인더",
        href: "/numberblocks/",
        category: "edu",
      },
      {
        emoji: "🌙",
        title: "Moon Phase",
        desc: "오늘의 달 위상 시뮬레이터",
        href: "/moon-phase/",
        category: "edu",
      },
    ];

    /* =============================================
       카테고리 정의 — 새 카테고리가 필요하면 추가
       ============================================= */
    const CATEGORIES = [
      { id: "utility", label: "🛠 유틸리티", desc: "일상에서 자주 쓰는 도구" },
      { id: "creative", label: "🎨 크리에이티브", desc: "미디어·콘텐츠 제작 보조" },
      { id: "notion", label: "📐 노션 도구", desc: "Notion 워크플로우 지원" },
      { id: "edu", label: "📚 교육", desc: "학습·교육용 앱" },
    ];

    /* =============================================
       렌더링 — 수정 불필요
       ============================================= */
    function render() {
      const main = document.getElementById('main');
      main.innerHTML = '';

      CATEGORIES.forEach(cat => {
        const items = APPS.filter(a => a.category === cat.id);
        if (items.length === 0) return;

        const section = document.createElement('section');
        section.className = 'category-section';
        section.innerHTML = `
          <div class="category-header">
            <span class="category-label">${cat.label}</span>
            <span class="category-desc">${cat.desc}</span>
          </div>
          <div class="card-grid" id="grid-${cat.id}"></div>
        `;
        main.appendChild(section);

        const grid = section.querySelector(`#grid-${cat.id}`);
        items.forEach(app => {
          const isModal = app.type === 'modal';
          const isExternal = !isModal && (app.type === 'link' || app.external);
          const a = document.createElement('a');
          a.className = 'app-card' + (isModal ? ' modal-card' : '');

          if (isModal) {
            a.href = '#';
            a.addEventListener('click', (e) => { e.preventDefault(); openModal(app); });
          } else {
            a.href = app.href;
            if (isExternal) { a.target = '_blank'; a.rel = 'noopener noreferrer'; }
          }

          a.innerHTML = `
            ${isExternal ? '<span class="external-badge">↗</span>' : ''}
            ${isModal ? '<span class="external-badge">ℹ</span>' : ''}
            <div class="card-emoji">${app.emoji}</div>
            <div class="card-title">${app.title}</div>
            <div class="card-desc">${app.desc}</div>
          `;
          grid.appendChild(a);
        });
      });
    }

    render();

    function openModal(app) {
      document.getElementById('modalBadge').textContent = app.badge || '';
      document.getElementById('modalTitle').textContent = app.emoji + ' ' + app.title;
      document.getElementById('modalDesc').textContent = app.modalDesc || app.desc;
      const ul = document.getElementById('modalFeatures');
      ul.innerHTML = (app.features || []).map(f => `<li><span>${f}</span></li>`).join('');
      const link = document.getElementById('modalLink');
      link.href = app.href;
      link.textContent = app.linkLabel || '바로가기';
      if (app.external) { link.target = '_blank'; link.rel = 'noopener noreferrer'; }
      else { link.removeAttribute('target'); link.removeAttribute('rel'); }
      document.getElementById('appModal').classList.add('open');
    }

    function closeModal(e) {
      if (e.target === document.getElementById('appModal')) {
        document.getElementById('appModal').classList.remove('open');
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') document.getElementById('appModal').classList.remove('open');
    });
  </script>

</body>

</html>
