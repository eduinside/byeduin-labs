<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Maskable background — fills entire canvas -->
  <rect width="512" height="512" fill="#0d0d0d"/>

  <!-- Safe zone content: centred at 256,256; all within inner ~410px radius -->
  <!-- Primary blue: #006fee -->

  <!-- Top-left corner bracket -->
  <path d="M144 144 h80 v16 h-64 v64 h-16 Z" fill="#006fee"/>
  <!-- Top-right corner bracket -->
  <path d="M368 144 h-80 v16 h64 v64 h16 Z" fill="#006fee"/>
  <!-- Bottom-left corner bracket -->
  <path d="M144 368 h80 v-16 h-64 v-64 h-16 Z" fill="#006fee"/>
  <!-- Bottom-right corner bracket -->
  <path d="M368 368 h-80 v-16 h64 v-64 h16 Z" fill="#006fee"/>

  <!-- Centre QR dot grid (3×3 sample dots) -->
  <rect x="220" y="220" width="24" height="24" rx="4" fill="#006fee"/>
  <rect x="256" y="220" width="24" height="24" rx="4" fill="#006fee"/>
  <rect x="220" y="256" width="24" height="24" rx="4" fill="#006fee"/>
  <rect x="268" y="268" width="24" height="24" rx="4" fill="#006fee"/>
</svg>
