<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Master — byeduin</title>
  <link rel="stylesheet" href="/common/hero-theme.css">
  <script src="/common/theme.js"></script>
  <!-- QRCode.js (생성용) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <!-- html5-qrcode (스캔용) -->
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 48px 1rem 5rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,106,247,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,106,247,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
    }

    /* 외부 카드 래퍼 */
    .qr-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      overflow: hidden;
    }

    /* 탭 */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1;
      padding: 1rem;
      font-size: 0.9rem;
      font-weight: 600;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--fg-muted);
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      min-height: 48px;
      font-family: inherit;
    }
    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    /* 카드 바디 */
    .card-body {
      padding: 1.5rem;
    }

    /* 탭 패널 — 두 패널이 항상 공간을 차지하여 높이 고정 */
    .tab-panels-wrap {
      display: grid;
      grid-template-columns: 1fr;
    }
    .tab-panel {
      grid-area: 1 / 1;
      visibility: hidden;
      pointer-events: none;
    }
    .tab-panel.active {
      visibility: visible;
      pointer-events: auto;
    }

    /* 스캔 입력 그리드 */
    .scan-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.625rem;
      margin-bottom: 1rem;
    }

    .scan-opt {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.375rem;
      padding: 0.875rem 0.5rem;
      background: var(--bg);
      border: 1.5px dashed var(--border);
      border-radius: 0.75rem;
      color: var(--fg-muted);
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 600;
      min-height: 72px;
      transition: border-color 0.2s, color 0.2s;
      font-family: inherit;
    }
    .scan-opt:hover { border-color: var(--primary); color: var(--primary); }
    .scan-opt svg { width: 22px; height: 22px; }

    /* 카메라 영역 */
    #cameraArea {
      display: none;
      position: relative;
      border-radius: 0.75rem;
      overflow: hidden;
      background: #000;
      margin-bottom: 1rem;
    }
    #reader { width: 100%; height: 240px; }
    #reader video { object-fit: cover; border-radius: 0; }
    .camera-close {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.85);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      z-index: 10;
    }

    /* QR 결과 */
    #genResultArea {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      margin-top: 1rem;
    }
    #genResultArea.show { display: flex; }

    #qrcode-wrap {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1rem;
    }
    #qrcode img, #qrcode canvas { margin: 0 auto; border-radius: 4px; }

    #genResultText {
      font-size: 0.75rem;
      color: var(--fg-muted);
      font-family: monospace;
      word-break: break-all;
      text-align: center;
    }

    /* 스캔 결과 */
    #scanResultArea {
      display: none;
      background: var(--bg);
      border: 1px solid var(--success);
      border-radius: 0.75rem;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    #scanResultArea.show { display: block; }

    .scan-result-header {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--success);
      margin-bottom: 0.5rem;
    }

    #scanResultText {
      font-size: 0.85rem;
      font-family: monospace;
      word-break: break-all;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.5rem 0.75rem;
      margin-bottom: 0.625rem;
      user-select: all;
    }

    .scan-actions { display: flex; gap: 0.5rem; }
    .scan-actions a, .scan-actions button {
      font-size: 0.8rem;
      padding: 0.4rem 0.875rem;
      border-radius: 0.5rem;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-family: inherit;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }
    .btn-copy-scan { background: var(--primary); color: #fff; }
    .btn-open-link { background: var(--card-bg); border: 1px solid var(--border) !important; color: var(--fg); display: none; }
    .btn-open-link.show { display: inline-flex; }

    /* 히스토리 */
    .history-section {
      margin-top: 1.25rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
    }
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }
    .history-header span { font-size: 0.85rem; font-weight: 700; }
    .btn-clear { font-size: 0.75rem; color: var(--danger); background: none; border: none; cursor: pointer; font-family: inherit; }

    #historyList { list-style: none; padding: 0; margin: 0; max-height: 180px; overflow-y: auto; display: flex; flex-direction: column; gap: 0.5rem; }

    .history-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 0.625rem;
      padding: 0.625rem 0.75rem;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .history-item:hover { border-color: var(--primary); }

    .history-icon {
      width: 28px; height: 28px;
      background: var(--card-bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 0.8rem;
    }

    .history-text { flex: 1; min-width: 0; }
    .history-text .main { font-size: 0.8rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-text .sub  { font-size: 0.7rem; color: var(--fg-muted); }

    .history-del {
      background: none;
      border: none;
      color: var(--fg-muted);
      cursor: pointer;
      padding: 4px;
      font-size: 1rem;
      line-height: 1;
      flex-shrink: 0;
      min-width: 24px;
      min-height: 24px;
    }
    .history-del:hover { color: var(--danger); }

    .history-empty { text-align: center; font-size: 0.8rem; color: var(--fg-muted); padding: 1.5rem 0; }

    /* 유틸 */
    .mt-1 { margin-top: 0.5rem; }
    .mt-2 { margin-top: 0.75rem; }
    .w-full { width: 100%; }
    .hint { font-size: 0.72rem; color: var(--fg-muted); text-align: center; margin-top: 0.375rem; }
  </style>
</head>
<body>
<div class="wrap">

  <div class="app-header">
    <div class="app-badge">◆ Utility</div>
    <h1 class="app-title">QR <span>Master</span></h1>
    <p class="app-desc">생성부터 스캔까지 한 번에</p>
  </div>

  <div class="qr-card">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('generate')" id="tabBtnGenerate">생성하기</button>
    <button class="tab-btn" onclick="switchTab('scan')" id="tabBtnScan">스캔하기</button>
  </div>

  <div class="card-body">

  <div class="tab-panels-wrap">
    <!-- 생성 탭 -->
    <div id="generateTab" class="tab-panel active">
      <label style="display:block;font-size:0.8rem;font-weight:600;color:var(--fg-muted);margin-bottom:0.4rem;">
        변환할 주소 (URL) 또는 텍스트
      </label>
      <input type="text" id="urlInput" class="hero-input"
             placeholder="https://example.com"
             onkeypress="if(event.key==='Enter')generateQR()">
      <button onclick="generateQR()" class="hero-btn w-full mt-2">QR 코드 생성</button>

      <div id="genResultArea">
        <div id="qrcode-wrap"><div id="qrcode"></div></div>
        <div id="genResultText"></div>
        <button onclick="downloadQR()" class="hero-btn hero-btn-ghost w-full" style="font-size:0.9rem;">
          ⬇ 이미지 저장
        </button>
      </div>
    </div>

    <!-- 스캔 탭 -->
    <div id="scanTab" class="tab-panel">
      <div class="scan-grid">
        <button class="scan-opt" onclick="startCamera()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 7l-7-5-7 5M23 7v10l-7 5-7-5V7"/><path d="M16 12l-7-5-7 5"/>
          </svg>
          카메라
        </button>
        <label class="scan-opt" for="qrInputFile">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
          파일
          <input type="file" id="qrInputFile" accept="image/*" class="hidden" style="display:none" onchange="handleFileUpload(this)">
        </label>
        <button class="scan-opt" onclick="handleClipboardPaste()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          붙여넣기
        </button>
      </div>
      <p class="hint">Ctrl+V로 이미지를 바로 붙여넣을 수 있습니다</p>

      <div id="cameraArea">
        <div id="reader"></div>
        <button class="camera-close" onclick="stopCamera()">✕</button>
      </div>

      <div id="scanResultArea">
        <div class="scan-result-header">✓ 스캔 성공!</div>
        <div id="scanResultText"></div>
        <div class="scan-actions">
          <button class="btn-copy-scan" onclick="copyScanResult()">복사</button>
          <a id="scanResultLink" class="btn-open-link" href="#" target="_blank" rel="noopener">↗ 이동</a>
        </div>
      </div>
    </div>
  </div><!-- /.tab-panels-wrap -->

    <!-- 공통 히스토리 -->
    <div class="history-section">
      <div class="history-header">
        <span>히스토리</span>
        <button class="btn-clear" onclick="clearHistory()">지우기</button>
      </div>
      <ul id="historyList"></ul>
    </div>
  </div>
  </div><!-- /.qr-card -->

</div>

<!-- 좌상단: 홈 -->
<div class="top-overlay-left">
  <a href="/" class="overlay-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    <span>Home</span>
  </a>
</div>
<!-- 우상단: 보기모드 + 공유 -->
<div class="top-overlay">
  <button id="themeToggleBtn" class="overlay-btn" onclick="cycleTheme()" title="보기 모드">💻</button>
  <button id="shareBtn" class="overlay-btn" onclick="shareCurrentPage()" title="공유">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
      <polyline points="16 6 12 2 8 6"/>
      <line x1="12" x2="12" y1="2" y2="15"/>
    </svg>
    <span>공유</span>
  </button>
</div>

<script>
  let html5QrCode = null;
  let isCameraRunning = false;

  document.addEventListener('DOMContentLoaded', () => {
    loadHistory();
    document.addEventListener('paste', handlePasteEvent);
  });

  function switchTab(tab) {
    const panels = { generate: document.getElementById('generateTab'), scan: document.getElementById('scanTab') };
    const btns   = { generate: document.getElementById('tabBtnGenerate'), scan: document.getElementById('tabBtnScan') };
    Object.keys(panels).forEach(k => {
      panels[k].classList.toggle('active', k === tab);
      btns[k].classList.toggle('active', k === tab);
    });
    if (tab !== 'scan') stopCamera();
  }

  /* ---- 생성 ---- */
  function generateQR(text) {
    const val = text || document.getElementById('urlInput').value.trim();
    if (!val) return alert('내용을 입력해주세요.');
    const container = document.getElementById('qrcode');
    container.innerHTML = '';
    new QRCode(container, { text: val, width: 180, height: 180, colorDark: '#000', colorLight: '#fff', correctLevel: QRCode.CorrectLevel.H });
    document.getElementById('genResultText').textContent = val;
    document.getElementById('genResultArea').classList.add('show');
    if (!text) document.getElementById('urlInput').value = val;
    addToHistory(val, 'gen');
  }

  function downloadQR() {
    const img = document.querySelector('#qrcode img');
    const cvs = document.querySelector('#qrcode canvas');
    const a = document.createElement('a');
    a.download = `qr_${Date.now()}.png`;
    if (img && img.src) a.href = img.src;
    else if (cvs) a.href = cvs.toDataURL('image/png');
    else return;
    a.click();
  }

  /* ---- 스캔 ---- */
  function startCamera() {
    if (isCameraRunning) return;
    document.getElementById('cameraArea').style.display = 'block';
    document.getElementById('scanResultArea').classList.remove('show');
    if (!html5QrCode) html5QrCode = new Html5Qrcode('reader');
    html5QrCode.start({ facingMode: 'environment' }, { fps: 10, qrbox: { width: 220, height: 220 } }, onScanSuccess, () => {})
      .then(() => { isCameraRunning = true; })
      .catch(() => {
        alert('카메라를 시작할 수 없습니다. 권한을 확인해주세요.');
        document.getElementById('cameraArea').style.display = 'none';
      });
  }

  function stopCamera() {
    if (html5QrCode && isCameraRunning) {
      html5QrCode.stop().then(() => {
        isCameraRunning = false;
        document.getElementById('cameraArea').style.display = 'none';
        html5QrCode.clear();
      }).catch(() => {});
    } else {
      document.getElementById('cameraArea').style.display = 'none';
    }
  }

  function handleFileUpload(input) {
    if (!input.files.length) return;
    scanImageFile(input.files[0]);
    input.value = '';
  }

  function scanImageFile(file) {
    if (!html5QrCode) html5QrCode = new Html5Qrcode('reader');
    switchTab('scan');
    html5QrCode.scanFile(file, true)
      .then(onScanSuccess)
      .catch(() => alert('QR 코드를 찾을 수 없습니다.'));
  }

  function handlePasteEvent(e) {
    for (const item of e.clipboardData.items) {
      if (item.type.startsWith('image/')) {
        scanImageFile(new File([item.getAsFile()], 'paste.png', { type: item.type }));
        return;
      }
    }
  }

  async function handleClipboardPaste() {
    try {
      const items = await navigator.clipboard.read();
      for (const item of items) {
        const t = item.types.find(t => t.startsWith('image/'));
        if (t) { scanImageFile(new File([await item.getType(t)], 'clip.png', { type: t })); return; }
      }
      alert('클립보드에 이미지가 없습니다.');
    } catch {
      alert('Ctrl+V (또는 Cmd+V)로 이미지를 붙여넣어 주세요.');
    }
  }

  function onScanSuccess(text) {
    if (isCameraRunning) stopCamera();
    document.getElementById('scanResultText').textContent = text;
    document.getElementById('scanResultArea').classList.add('show');
    const link = document.getElementById('scanResultLink');
    try { new URL(text); link.href = text; link.classList.add('show'); }
    catch { link.classList.remove('show'); }
    addToHistory(text, 'scan');
  }

  function copyScanResult() {
    const text = document.getElementById('scanResultText').textContent;
    navigator.clipboard.writeText(text).then(() => alert('복사되었습니다.')).catch(() => alert('복사 실패'));
  }

  /* ---- 히스토리 ---- */
  function addToHistory(text, type) {
    let h = JSON.parse(localStorage.getItem('qr_history') || '[]');
    h = h.filter(i => i.text !== text);
    h.unshift({ text, type, date: new Date().toLocaleDateString() });
    if (h.length > 30) h.pop();
    localStorage.setItem('qr_history', JSON.stringify(h));
    renderHistory(h);
  }

  function loadHistory() { renderHistory(JSON.parse(localStorage.getItem('qr_history') || '[]')); }

  function renderHistory(h) {
    const list = document.getElementById('historyList');
    list.innerHTML = '';
    if (!h.length) {
      list.innerHTML = '<li class="history-empty">기록이 없습니다.</li>';
      return;
    }
    h.forEach(item => {
      const li = document.createElement('li');
      li.className = 'history-item';
      li.onclick = () => { switchTab('generate'); generateQR(item.text); };
      li.innerHTML = `
        <div class="history-icon">${item.type === 'scan' ? '📷' : '⬜'}</div>
        <div class="history-text">
          <div class="main">${item.text}</div>
          <div class="sub">${item.type === 'scan' ? '스캔됨' : '생성됨'} · ${item.date}</div>
        </div>
        <button class="history-del" onclick="event.stopPropagation();deleteHistoryItem('${item.text.replace(/'/g,"\\'")}')">✕</button>
      `;
      list.appendChild(li);
    });
  }

  function deleteHistoryItem(text) {
    let h = JSON.parse(localStorage.getItem('qr_history') || '[]').filter(i => i.text !== text);
    localStorage.setItem('qr_history', JSON.stringify(h));
    renderHistory(h);
  }

  function clearHistory() {
    if (confirm('기록을 모두 삭제하시겠습니까?')) {
      localStorage.removeItem('qr_history');
      renderHistory([]);
    }
  }
</script>
</body>
</html>
