<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Master — byeduin</title>
  <link rel="manifest" href="/qr/manifest.json">
  <link rel="stylesheet" href="/common/hero-theme.css">
  <script src="/common/theme.js"></script>
  <!-- QRCode.js (생성용) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <!-- jsQR (스캔용 - 멀티 QR 지원) -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 48px 1rem 5rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,106,247,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,106,247,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
    }

    /* 외부 카드 래퍼 */
    .qr-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      overflow: hidden;
    }

    /* 탭 */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1;
      padding: 1rem;
      font-size: 0.9rem;
      font-weight: 600;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--fg-muted);
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      min-height: 48px;
      font-family: inherit;
    }
    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    /* 카드 바디 */
    .card-body {
      padding: 1.5rem;
    }

    /* 탭 패널 — 두 패널이 항상 공간을 차지하여 높이 고정 */
    .tab-panels-wrap {
      display: grid;
      grid-template-columns: 1fr;
    }
    .tab-panel {
      grid-area: 1 / 1;
      visibility: hidden;
      pointer-events: none;
    }
    .tab-panel.active {
      visibility: visible;
      pointer-events: auto;
    }

    /* 스캔 입력 그리드 */
    .scan-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.625rem;
      margin-bottom: 1rem;
    }

    .scan-opt {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.375rem;
      padding: 0.875rem 0.5rem;
      background: var(--bg);
      border: 1.5px dashed var(--border);
      border-radius: 0.75rem;
      color: var(--fg-muted);
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 600;
      min-height: 72px;
      transition: border-color 0.2s, color 0.2s;
      font-family: inherit;
    }
    .scan-opt:hover { border-color: var(--primary); color: var(--primary); }
    .scan-opt svg { width: 22px; height: 22px; }

    /* 카메라 영역 */
    #cameraArea {
      display: none;
      position: relative;
      border-radius: 0.75rem;
      overflow: hidden;
      background: #000;
      margin-bottom: 1rem;
    }
    #reader { width: 100%; height: 240px; display: flex; align-items: center; justify-content: center; }
    #qr-video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .camera-close {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.85);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      z-index: 10;
    }

    /* QR 결과 */
    #genResultArea {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      margin-top: 1rem;
    }
    #genResultArea.show { display: flex; }

    #qrcode-wrap {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1rem;
    }
    #qrcode img, #qrcode canvas { margin: 0 auto; border-radius: 4px; }

    #genResultText {
      font-size: 0.75rem;
      color: var(--fg-muted);
      font-family: monospace;
      word-break: break-all;
      text-align: center;
    }

    /* 스캔 결과 */
    #scanResultArea {
      display: none;
      background: var(--bg);
      border: 1px solid var(--success);
      border-radius: 0.75rem;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    #scanResultArea.show { display: block; }

    .scan-result-header {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--success);
      margin-bottom: 0.5rem;
    }

    #scanResultText {
      font-size: 0.85rem;
      font-family: monospace;
      word-break: break-all;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.5rem 0.75rem;
      margin-bottom: 0.625rem;
      user-select: all;
    }

    .scan-actions { display: flex; gap: 0.5rem; }
    .scan-actions a, .scan-actions button {
      font-size: 0.8rem;
      padding: 0.4rem 0.875rem;
      border-radius: 0.5rem;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-family: inherit;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }
    .btn-copy-scan { background: var(--primary); color: #fff; }
    .btn-open-link { background: var(--card-bg); border: 1px solid var(--border) !important; color: var(--fg); display: none; }
    .btn-open-link.show { display: inline-flex; }

    /* 히스토리 */
    .history-section {
      margin-top: 1.25rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
    }
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }
    .history-header span { font-size: 0.85rem; font-weight: 700; }
    .btn-clear { font-size: 0.75rem; color: var(--danger); background: none; border: none; cursor: pointer; font-family: inherit; }

    #historyList { list-style: none; padding: 0; margin: 0; max-height: 180px; overflow-y: auto; display: flex; flex-direction: column; gap: 0.5rem; }

    .history-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 0.625rem;
      padding: 0.625rem 0.75rem;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .history-item:hover { border-color: var(--primary); }

    .history-icon {
      width: 28px; height: 28px;
      background: var(--card-bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 0.8rem;
    }

    .history-text { flex: 1; min-width: 0; }
    .history-text .main { font-size: 0.8rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 0; }
    .history-text .sub  { font-size: 0.7rem; color: var(--fg-muted); margin: 0; }

    .history-del {
      background: none;
      border: none;
      color: var(--fg-muted);
      cursor: pointer;
      padding: 4px;
      font-size: 1rem;
      line-height: 1;
      flex-shrink: 0;
      min-width: 24px;
      min-height: 24px;
    }
    .history-del:hover { color: var(--danger); }

    .history-empty { text-align: center; font-size: 0.8rem; color: var(--fg-muted); padding: 1.5rem 0; }

    /* 멀티 스캔 누적 목록 */
    #multiListArea {
      display: none;
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }

    /* 유틸 */
    .mt-1 { margin-top: 0.5rem; }
    .mt-2 { margin-top: 0.75rem; }
    .w-full { width: 100%; }
    .hint { font-size: 0.72rem; color: var(--fg-muted); text-align: center; margin-top: 0.375rem; }

    /* 토스트 */
    #qr-toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--fg);
      color: var(--bg);
      padding: 0.5rem 1.25rem;
      border-radius: 2rem;
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 9999;
      white-space: nowrap;
    }
    #qr-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  </style>
</head>
<body>
<div class="wrap">

  <div class="app-header">
    <div class="app-badge">◆ Utility</div>
    <h1 class="app-title">QR <span>Master</span></h1>
    <p class="app-desc">생성부터 스캔까지 한 번에</p>
  </div>

  <div class="qr-card">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('generate')" id="tabBtnGenerate">생성하기</button>
    <button class="tab-btn" onclick="switchTab('scan')" id="tabBtnScan">스캔하기</button>
  </div>

  <div class="card-body">

  <div class="tab-panels-wrap">
    <!-- 생성 탭 -->
    <div id="generateTab" class="tab-panel active">
      <label style="display:block;font-size:0.8rem;font-weight:600;color:var(--fg-muted);margin-bottom:0.4rem;">
        변환할 주소 (URL) 또는 텍스트
      </label>
      <input type="text" id="urlInput" class="hero-input"
             placeholder="https://example.com"
             onkeypress="if(event.key==='Enter')generateQR()">
      <button onclick="generateQR()" class="hero-btn w-full mt-2">QR 코드 생성</button>

      <div id="genResultArea">
        <div id="qrcode-wrap"><div id="qrcode"></div></div>
        <div id="genResultText"></div>
        <button onclick="downloadQR()" class="hero-btn hero-btn-ghost w-full" style="font-size:0.9rem;">
          ⬇ 이미지 저장
        </button>
        <button id="btnShortenUrl" onclick="shortenGeneratedUrl()" class="hero-btn hero-btn-ghost w-full mt-1" style="font-size:0.9rem;display:none;">
          🔗 단축 URL 생성
        </button>
      </div>
    </div>

    <!-- 스캔 탭 -->
    <div id="scanTab" class="tab-panel">
      <div class="scan-grid">
        <button class="scan-opt" onclick="startCamera()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 7l-7-5-7 5M23 7v10l-7 5-7-5V7"/><path d="M16 12l-7-5-7 5"/>
          </svg>
          카메라
        </button>
        <label class="scan-opt" for="qrInputFile">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
          파일
          <input type="file" id="qrInputFile" accept="image/*" class="hidden" style="display:none" onchange="handleFileUpload(this)">
        </label>
        <button class="scan-opt" onclick="handleClipboardPaste()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          붙여넣기
        </button>
      </div>
      <p class="hint">Ctrl+V로 이미지를 바로 붙여넣을 수 있습니다</p>

      <div id="cameraArea">
        <div id="reader"></div>
        <button class="camera-close" onclick="stopCamera()">✕</button>
      </div>

      <div id="scanResultArea">
        <div class="scan-result-header">✓ 스캔 성공!</div>
        <div id="scanResultText"></div>
        <div class="scan-actions">
          <button class="btn-copy-scan" onclick="copyScanResult()">복사</button>
          <a id="scanResultLink" class="btn-open-link" href="#" target="_blank" rel="noopener">↗ 이동</a>
        </div>
        <!-- 이어서 스캔 유도 (단일 모드) -->
        <button id="btnStartMulti" onclick="startMultiMode()" class="hero-btn hero-btn-ghost w-full mt-1" style="font-size:0.85rem;display:none;">
          📷+ 이어서 스캔하기
        </button>
        <!-- 멀티 모드: 설명 입력 -->
        <div id="multiInputArea" style="display:none">
          <input type="text" id="multiDescInput" class="hero-input mt-1" placeholder="설명 추가 (선택)">
          <div class="scan-actions mt-1">
            <button onclick="addAndContinue()" class="hero-btn" style="flex:1;font-size:0.8rem;">📷+ 추가 후 계속</button>
            <button onclick="addAndFinish()" class="hero-btn hero-btn-ghost" style="flex:1;font-size:0.8rem;">✓ 완료</button>
          </div>
        </div>
      </div>

      <!-- 멀티 스캔 누적 목록 -->
      <div id="multiListArea">
        <div class="history-header">
          <span id="multiListCount"></span>
          <button onclick="clearMultiScans()" class="btn-clear">초기화</button>
        </div>
        <ul id="multiScanList" style="list-style:none;padding:0;margin:0;max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:0.5rem;"></ul>
        <button onclick="exportMultiMd()" class="hero-btn w-full mt-2" style="font-size:0.9rem;">
          📄 링크 정리 (MD Editor로)
        </button>
      </div>
    </div>

  </div><!-- /.tab-panels-wrap -->

    <!-- 공통 히스토리 -->
    <div class="history-section">
      <div class="history-header">
        <span>히스토리</span>
        <button class="btn-clear" onclick="clearHistory()">지우기</button>
      </div>
      <ul id="historyList"></ul>
    </div>
  </div>
  </div><!-- /.qr-card -->

</div>

<!-- 토스트 -->
<div id="qr-toast"></div>

<!-- 좌상단: 홈 -->
<div class="top-overlay-left">
  <a href="/" class="overlay-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    <span>Home</span>
  </a>
</div>
<!-- 우상단: 보기모드 + 공유 -->
<div class="top-overlay">
  <button id="themeToggleBtn" class="overlay-btn" onclick="cycleTheme()" title="보기 모드">💻</button>
  <button id="shareBtn" class="overlay-btn" onclick="shareCurrentPage()" title="공유">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
      <polyline points="16 6 12 2 8 6"/>
      <line x1="12" x2="12" y1="2" y2="15"/>
    </svg>
    <span>공유</span>
  </button>
</div>

<script>
  // ── Service Worker 등록 (PWA) ──
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/qr/sw.js').catch(() => {});
    });
  }

  // ── jsQR 글로벌 상태 ──
  let isCameraRunning = false;
  let videoElement = null;
  let canvasContext = null;
  let scannerAnimationId = null;
  let lastScannedCodes = new Set();

  // ── 멀티스캔 상태 ──
  let multiScans = [];
  let isMultiMode = false;
  let currentScanText = '';

  document.addEventListener('DOMContentLoaded', () => {
    loadHistory();
    document.addEventListener('paste', handlePasteEvent);
  });

  // ── 탭 전환 ──
  function switchTab(tab) {
    ['generate', 'scan'].forEach(k => {
      document.getElementById(k === 'generate' ? 'generateTab' : 'scanTab').classList.toggle('active', k === tab);
      document.getElementById(k === 'generate' ? 'tabBtnGenerate' : 'tabBtnScan').classList.toggle('active', k === tab);
    });
    if (tab !== 'scan') stopCamera();
  }

  // ── 토스트 ──
  let _toastTimer;
  function showToast(msg) {
    const el = document.getElementById('qr-toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
  }

  /* ---- 생성 ---- */
  function generateQR(text) {
    const val = text || document.getElementById('urlInput').value.trim();
    if (!val) return showToast('내용을 입력해주세요.');
    const container = document.getElementById('qrcode');
    container.innerHTML = '';
    new QRCode(container, { text: val, width: 180, height: 180, colorDark: '#000', colorLight: '#fff', correctLevel: QRCode.CorrectLevel.H });
    document.getElementById('genResultText').textContent = val;
    document.getElementById('genResultArea').classList.add('show');
    if (!text) document.getElementById('urlInput').value = val;
    addToHistory(val, 'gen');
    const isUrl = (() => { try { new URL(val); return true; } catch { return false; } })();
    document.getElementById('btnShortenUrl').style.display = isUrl ? '' : 'none';
  }

  function downloadQR() {
    const img = document.querySelector('#qrcode img');
    const cvs = document.querySelector('#qrcode canvas');
    const a = document.createElement('a');
    a.download = `qr_${Date.now()}.png`;
    if (img && img.src) a.href = img.src;
    else if (cvs) a.href = cvs.toDataURL('image/png');
    else return;
    a.click();
  }

  /* ---- 스캔 (jsQR) ---- */
  async function startCamera() {
    if (isCameraRunning) return;
    document.getElementById('cameraArea').style.display = 'block';
    document.getElementById('scanResultArea').classList.remove('show');

    if (typeof window.jsQR === 'undefined') {
      showToast('QR 스캔 라이브러리를 로드할 수 없습니다.');
      document.getElementById('cameraArea').style.display = 'none';
      return;
    }

    if (!videoElement) {
      videoElement = document.createElement('video');
      videoElement.id = 'qr-video';
      videoElement.style.cssText = 'width: 100%; height: 100%; object-fit: cover; display: block;';
      document.getElementById('reader').appendChild(videoElement);
    }

    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment' }
      });
      videoElement.srcObject = stream;
      videoElement.play();
      isCameraRunning = true;
      lastScannedCodes.clear();
      showToast('카메라가 시작되었습니다.');
      startScanLoop();
    } catch (err) {
      showToast('카메라를 시작할 수 없습니다. 권한을 확인해주세요.');
      document.getElementById('cameraArea').style.display = 'none';
    }
  }

  function stopCamera() {
    if (scannerAnimationId) {
      cancelAnimationFrame(scannerAnimationId);
      scannerAnimationId = null;
    }

    if (videoElement && videoElement.srcObject) {
      videoElement.srcObject.getTracks().forEach(track => track.stop());
    }

    isCameraRunning = false;
    document.getElementById('cameraArea').style.display = 'none';
    if (videoElement && videoElement.parentNode) {
      videoElement.remove();
      videoElement = null;
      canvasContext = null;
    }
  }

  function startScanLoop() {
    scanFrame();
  }

  function scanFrame() {
    if (!isCameraRunning || !videoElement) return;

    if (!canvasContext) {
      const canvas = document.createElement('canvas');
      canvas.width = videoElement.videoWidth;
      canvas.height = videoElement.videoHeight;
      canvasContext = canvas.getContext('2d');
    }

    if (videoElement.videoWidth > 0 && videoElement.videoHeight > 0) {
      canvasContext.canvas.width = videoElement.videoWidth;
      canvasContext.canvas.height = videoElement.videoHeight;
      canvasContext.drawImage(videoElement, 0, 0);

      const imageData = canvasContext.getImageData(0, 0, canvasContext.canvas.width, canvasContext.canvas.height);
      const result = window.jsQR(imageData.data, imageData.width, imageData.height);

      if (result) {
        onScanSuccess([{ rawData: result.data }]);
        return;
      }
    }

    scannerAnimationId = requestAnimationFrame(scanFrame);
  }

  function handleFileUpload(input) {
    if (!input.files.length) return;
    scanImageFile(input.files[0]);
    input.value = '';
  }

  function scanImageFile(file) {
    if (typeof window.jsQR === 'undefined') {
      showToast('QR 스캔 라이브러리를 로드할 수 없습니다.');
      return;
    }

    switchTab('scan');

    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const result = window.jsQR(imageData.data, imageData.width, imageData.height);

      if (result) {
        onScanSuccess([{ rawData: result.data }]);
      } else {
        showToast('QR 코드를 찾을 수 없습니다.');
      }
    };

    img.onerror = () => showToast('이미지를 불러올 수 없습니다.');
    img.src = URL.createObjectURL(file);
  }

  function handlePasteEvent(e) {
    for (const item of e.clipboardData.items) {
      if (item.type.startsWith('image/')) {
        scanImageFile(new File([item.getAsFile()], 'paste.png', { type: item.type }));
        return;
      }
    }
  }

  async function handleClipboardPaste() {
    try {
      const items = await navigator.clipboard.read();
      for (const item of items) {
        const t = item.types.find(t => t.startsWith('image/'));
        if (t) { scanImageFile(new File([await item.getType(t)], 'clip.png', { type: t })); return; }
      }
      showToast('클립보드에 이미지가 없습니다.');
    } catch {
      showToast('Ctrl+V (또는 Cmd+V)로 이미지를 붙여넣어 주세요.');
    }
  }

  function onScanSuccess(results) {
    if (!results || results.length === 0) return;

    // 중복 감지 방지
    const uniqueResults = results.filter(r => {
      const key = r.rawData;
      if (lastScannedCodes.has(key)) return false;
      lastScannedCodes.add(key);
      return true;
    });

    if (uniqueResults.length === 0) return;

    // 모든 감지된 QR을 자동으로 목록과 히스토리에 추가
    uniqueResults.forEach(result => {
      const code = result.rawData;
      multiScans.push({ url: code, desc: '', scannedAt: new Date().toISOString() });
      addToHistory(code, 'scan');
    });

    renderMultiList();
    showToast(`✓ ${uniqueResults.length}개 QR 코드가 추가되었습니다.`);
  }


  function copyScanResult() {
    const text = document.getElementById('scanResultText').textContent;
    navigator.clipboard.writeText(text)
      .then(() => showToast('복사되었습니다 ✓'))
      .catch(() => showToast('복사 실패'));
  }

  /* ---- Short.io 단축 URL ---- */
  async function shortenGeneratedUrl() {
    const text = document.getElementById('genResultText').textContent;
    if (!text) return;
    const btn = document.getElementById('btnShortenUrl');
    btn.disabled = true;
    btn.textContent = '처리 중...';
    try {
      const res = await fetch('/.netlify/functions/shorten', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: text }),
      });
      const data = await res.json();
      if (!res.ok || !data.shortURL) throw new Error();
      await navigator.clipboard.writeText(data.shortURL);
      showToast('단축 URL 복사됨 ✓ ' + data.shortURL);
    } catch {
      try {
        await navigator.clipboard.writeText(text);
        showToast('단축 실패 — 원본 URL 복사됨');
      } catch { showToast('복사에 실패했습니다.'); }
    } finally {
      btn.disabled = false;
      btn.textContent = '🔗 단축 URL 생성';
    }
  }

  // ── 멀티스캔 함수 ──
  function startMultiMode() {
    isMultiMode = true;
    document.getElementById('btnStartMulti').style.display = 'none';
    document.getElementById('multiDescInput').value = '';
    document.getElementById('multiInputArea').style.display = 'block';
  }

  function addAndContinue() {
    const desc = document.getElementById('multiDescInput').value.trim();
    multiScans.push({ url: currentScanText, desc, scannedAt: new Date().toISOString() });
    document.getElementById('multiInputArea').style.display = 'none';
    document.getElementById('scanResultArea').classList.remove('show');
    renderMultiList();
    showToast('✓ 추가되었습니다. 다음 QR을 스캔해주세요.');
    setTimeout(() => startCamera(), 200);
  }

  function addAndFinish() {
    const desc = document.getElementById('multiDescInput').value.trim();
    multiScans.push({ url: currentScanText, desc, scannedAt: new Date().toISOString() });
    isMultiMode = false;
    document.getElementById('multiInputArea').style.display = 'none';
    document.getElementById('scanResultArea').classList.remove('show');
    document.getElementById('btnStartMulti').style.display = 'none';
    renderMultiList();
    showToast('✓ ' + multiScans.length + '개 항목 수집됨');
  }

  function renderMultiList() {
    const listArea = document.getElementById('multiListArea');
    const ul = document.getElementById('multiScanList');
    if (!multiScans.length) { listArea.style.display = 'none'; return; }
    listArea.style.display = 'block';
    document.getElementById('multiListCount').textContent = multiScans.length + '개 항목';
    ul.innerHTML = '';
    multiScans.forEach((item, idx) => {
      const display = item.url.length > 44 ? item.url.slice(0, 44) + '...' : item.url;
      const li = document.createElement('li');
      li.className = 'history-item';
      li.innerHTML = `
        <div class="history-icon">📷</div>
        <div class="history-text">
          <div class="main">${display}</div>
          <div class="sub">${item.desc || '설명 없음'}</div>
        </div>
        <button class="history-del" onclick="deleteMultiScan(${idx})">✕</button>
      `;
      ul.appendChild(li);
    });
  }

  function deleteMultiScan(idx) {
    multiScans.splice(idx, 1);
    renderMultiList();
  }

  function clearMultiScans() {
    if (!confirm('멀티 스캔 목록을 모두 삭제하시겠습니까?')) return;
    multiScans = [];
    renderMultiList();
  }

  function exportMultiMd() {
    if (!multiScans.length) return;
    const today = new Date().toISOString().slice(0, 10);
    let md = `# QR 스캔 결과\n> ${today} · ${multiScans.length}개 항목\n\n`;
    multiScans.forEach((item, idx) => {
      const isUrl = (() => { try { new URL(item.url); return true; } catch { return false; } })();
      const title = item.url.length > 40 ? item.url.slice(0, 40) + '...' : item.url;
      const linkText = item.desc || title;
      md += `${idx + 1}. [${linkText}](${item.url})\n`;
    });

    const payload = JSON.stringify({ data: { content: md, filename: `qr-scan-${today}.md` }, permission: 'clone' });
    const encoded = btoa(encodeURIComponent(payload))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
    location.href = `/md-editor/#share=${encoded}`;
  }

  /* ---- 히스토리 ---- */
  function addToHistory(text, type) {
    let h = JSON.parse(localStorage.getItem('qr_history') || '[]');
    h = h.filter(i => i.text !== text);
    h.unshift({ text, type, date: new Date().toLocaleDateString() });
    if (h.length > 30) h.pop();
    localStorage.setItem('qr_history', JSON.stringify(h));
    renderHistory(h);
  }

  function loadHistory() { renderHistory(JSON.parse(localStorage.getItem('qr_history') || '[]')); }

  function renderHistory(h) {
    const list = document.getElementById('historyList');
    list.innerHTML = '';
    if (!h.length) {
      list.innerHTML = '<li class="history-empty">기록이 없습니다.</li>';
      return;
    }
    h.forEach(item => {
      const li = document.createElement('li');
      li.className = 'history-item';
      li.onclick = () => { switchTab('generate'); generateQR(item.text); };
      li.innerHTML = `
        <div class="history-icon">${item.type === 'scan' ? '📷' : '⬜'}</div>
        <div class="history-text">
          <div class="main">${item.text}</div>
          <div class="sub">${item.type === 'scan' ? '스캔됨' : '생성됨'} · ${item.date}</div>
        </div>
        <button class="history-del" onclick="event.stopPropagation();deleteHistoryItem('${item.text.replace(/'/g,"\\'")}')">✕</button>
      `;
      list.appendChild(li);
    });
  }

  function deleteHistoryItem(text) {
    let h = JSON.parse(localStorage.getItem('qr_history') || '[]').filter(i => i.text !== text);
    localStorage.setItem('qr_history', JSON.stringify(h));
    renderHistory(h);
  }

  function clearHistory() {
    if (confirm('기록을 모두 삭제하시겠습니까?')) {
      localStorage.removeItem('qr_history');
      renderHistory([]);
    }
  }
</script>
</body>
