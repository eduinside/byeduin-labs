<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Master вҖ” byeduin</title>
  <link rel="manifest" href="/qr/manifest.json">
  <link rel="stylesheet" href="/common/hero-theme.css">
  <script src="/common/theme.js"></script>
  <!-- QRCode.js (мғқм„ұмҡ©) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <!-- jsQR (мҠӨмә”мҡ©) -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 48px 1rem 5rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,106,247,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,106,247,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
    }

    /* мҷёл¶Җ м№ҙл“ң лһҳнҚј */
    .qr-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      overflow: hidden;
    }

    /* нғӯ */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1;
      padding: 1rem;
      font-size: 0.9rem;
      font-weight: 600;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--fg-muted);
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      min-height: 48px;
      font-family: inherit;
    }
    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    /* м№ҙл“ң л°”л”” */
    .card-body {
      padding: 1.5rem;
    }

    /* нғӯ нҢЁл„җ вҖ” л‘җ нҢЁл„җмқҙ н•ӯмғҒ кіөк°„мқ„ м°Ём§Җн•ҳм—¬ лҶ’мқҙ кі м • */
    .tab-panels-wrap {
      display: grid;
      grid-template-columns: 1fr;
    }
    .tab-panel {
      grid-area: 1 / 1;
      visibility: hidden;
      pointer-events: none;
    }
    .tab-panel.active {
      visibility: visible;
      pointer-events: auto;
    }

    /* мҠӨмә” мһ…л Ҙ к·ёлҰ¬л“ң */
    .scan-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.625rem;
      margin-bottom: 1rem;
    }

    .scan-opt {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.375rem;
      padding: 0.875rem 0.5rem;
      background: var(--bg);
      border: 1.5px dashed var(--border);
      border-radius: 0.75rem;
      color: var(--fg-muted);
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 600;
      min-height: 72px;
      transition: border-color 0.2s, color 0.2s;
      font-family: inherit;
    }
    .scan-opt:hover { border-color: var(--primary); color: var(--primary); }
    .scan-opt svg { width: 22px; height: 22px; }

    /* м№ҙл©”лқј мҳҒм—ӯ */
    #cameraArea {
      display: none;
      position: relative;
      border-radius: 0.75rem;
      overflow: hidden;
      background: #000;
      margin-bottom: 1rem;
    }
    #reader { width: 100%; height: 240px; display: flex; align-items: center; justify-content: center; }
    #qr-video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .camera-close {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.85);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      z-index: 10;
    }

    /* QR кІ°кіј */
    #genResultArea {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      margin-top: 1rem;
    }
    #genResultArea.show { display: flex; }

    #qrcode-wrap {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1rem;
    }
    #qrcode img, #qrcode canvas { margin: 0 auto; border-radius: 4px; }

    #genResultText {
      font-size: 0.75rem;
      color: var(--fg-muted);
      font-family: monospace;
      word-break: break-all;
      text-align: center;
    }

    /* мҠӨмә” кІ°кіј */
    #scanResultArea {
      display: none;
      background: var(--bg);
      border: 1px solid var(--success);
      border-radius: 0.75rem;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    #scanResultArea.show { display: block; }

    .scan-result-header {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--success);
      margin-bottom: 0.5rem;
      position: relative;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn-close-scan {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0;
      color: var(--fg-muted);
      transition: color 0.2s;
    }

    .btn-close-scan:hover {
      color: var(--fg);
    }

    #scanResultText {
      font-size: 0.85rem;
      font-family: monospace;
      word-break: break-all;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.5rem 0.75rem;
      margin-bottom: 0.625rem;
      user-select: all;
    }

    .scan-actions { display: flex; gap: 0.5rem; }
    .scan-actions a, .scan-actions button {
      font-size: 0.8rem;
      padding: 0.4rem 0.875rem;
      border-radius: 0.5rem;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-family: inherit;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }
    .btn-copy-scan { background: var(--primary); color: #fff; }
    .btn-open-link { background: var(--card-bg); border: 1px solid var(--border) !important; color: var(--fg); display: none; }
    .btn-open-link.show { display: inline-flex; }

    /* нһҲмҠӨнҶ лҰ¬ */
    .history-section {
      margin-top: 1.25rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
    }
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }
    .history-header span { font-size: 0.85rem; font-weight: 700; }
    .btn-clear { font-size: 0.75rem; color: var(--danger); background: none; border: none; cursor: pointer; font-family: inherit; }

    #historyList { list-style: none; padding: 0; margin: 0; max-height: 180px; overflow-y: auto; display: flex; flex-direction: column; gap: 0.5rem; }

    .history-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 0.625rem;
      padding: 0.625rem 0.75rem;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .history-item:hover { border-color: var(--primary); }

    .history-icon {
      width: 28px; height: 28px;
      background: var(--card-bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 0.8rem;
    }

    .history-text { flex: 1; min-width: 0; }
    .history-text .main { font-size: 0.8rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 0; }
    .history-text .sub  { font-size: 0.7rem; color: var(--fg-muted); margin: 0; }

    .history-del {
      background: none;
      border: none;
      color: var(--fg-muted);
      cursor: pointer;
      padding: 4px;
      font-size: 1rem;
      line-height: 1;
      flex-shrink: 0;
      min-width: 24px;
      min-height: 24px;
    }
    .history-del:hover { color: var(--danger); }

    .history-empty { text-align: center; font-size: 0.8rem; color: var(--fg-muted); padding: 1.5rem 0; }

    /* л©ҖнӢ° мҠӨмә” лҲ„м Ғ лӘ©лЎқ */
    #multiListArea {
      display: none;
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }

    /* мң нӢё */
    .mt-1 { margin-top: 0.5rem; }
    .mt-2 { margin-top: 0.75rem; }
    .w-full { width: 100%; }
    .hint { font-size: 0.72rem; color: var(--fg-muted); text-align: center; margin-top: 0.375rem; }

    /* нҶ мҠӨнҠё */
    #qr-toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--fg);
      color: var(--bg);
      padding: 0.5rem 1.25rem;
      border-radius: 2rem;
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 9999;
      white-space: nowrap;
    }
    #qr-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  </style>
</head>
<body>
<div class="wrap">

  <div class="app-header">
    <div class="app-badge">в—Ҷ Utility</div>
    <h1 class="app-title">QR <span>Master</span></h1>
    <p class="app-desc">мғқм„ұл¶Җн„° мҠӨмә”к№Ңм§Җ н•ң лІҲм—җ</p>
  </div>

  <div class="qr-card">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('generate')" id="tabBtnGenerate">мғқм„ұн•ҳкё°</button>
    <button class="tab-btn" onclick="switchTab('scan')" id="tabBtnScan">мҠӨмә”н•ҳкё°</button>
  </div>

  <div class="card-body">

  <div class="tab-panels-wrap">
    <!-- мғқм„ұ нғӯ -->
    <div id="generateTab" class="tab-panel active">
      <label style="display:block;font-size:0.8rem;font-weight:600;color:var(--fg-muted);margin-bottom:0.4rem;">
        ліҖнҷҳн•  мЈјмҶҢ (URL) лҳҗлҠ” н…ҚмҠӨнҠё
      </label>
      <input type="text" id="urlInput" class="hero-input"
             placeholder="https://example.com"
             onkeypress="if(event.key==='Enter')generateQR()">
      <button onclick="generateQR()" class="hero-btn w-full mt-2">QR мҪ”л“ң мғқм„ұ</button>

      <div id="genResultArea">
        <div id="qrcode-wrap"><div id="qrcode"></div></div>
        <div id="genResultText"></div>
        <button onclick="downloadQR()" class="hero-btn hero-btn-ghost w-full" style="font-size:0.9rem;">
          в¬Ү мқҙлҜём§Җ м ҖмһҘ
        </button>
        <button id="btnShortenUrl" onclick="shortenGeneratedUrl()" class="hero-btn hero-btn-ghost w-full mt-1" style="font-size:0.9rem;display:none;">
          рҹ”— лӢЁм¶• URL мғқм„ұ
        </button>
      </div>
    </div>

    <!-- мҠӨмә” нғӯ -->
    <div id="scanTab" class="tab-panel">
      <div class="scan-grid">
        <button class="scan-opt" onclick="startCamera()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 7l-7-5-7 5M23 7v10l-7 5-7-5V7"/><path d="M16 12l-7-5-7 5"/>
          </svg>
          м№ҙл©”лқј
        </button>
        <label class="scan-opt" for="qrInputFile">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
          нҢҢмқј
          <input type="file" id="qrInputFile" accept="image/*" class="hidden" style="display:none" onchange="handleFileUpload(this)">
        </label>
        <button class="scan-opt" onclick="handleClipboardPaste()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          л¶ҷм—¬л„Јкё°
        </button>
      </div>
      <p class="hint">Ctrl+VлЎң мқҙлҜём§ҖлҘј л°”лЎң л¶ҷм—¬л„Јмқ„ мҲҳ мһҲмҠөлӢҲлӢӨ</p>

      <div id="cameraArea">
        <div id="reader"></div>
        <button class="camera-close" onclick="stopCamera()">вң•</button>
      </div>

      <div id="scanResultArea">
        <div class="scan-result-header">
          <span>вң“ мҠӨмә” м„ұкіө!</span>
          <button class="btn-close-scan" onclick="closeScanResult()">вң•</button>
        </div>
        <div id="scanResultText"></div>
        <div class="scan-actions">
          <button class="btn-copy-scan" onclick="copyScanResult()">ліөмӮ¬</button>
          <a id="scanResultLink" class="btn-open-link" href="#" target="_blank" rel="noopener">вҶ— мқҙлҸҷ</a>
        </div>
        <!-- мқҙм–ҙм„ң мҠӨмә” мң лҸ„ (лӢЁмқј лӘЁл“ң) -->
        <button id="btnStartMulti" onclick="startMultiMode()" class="hero-btn hero-btn-ghost w-full mt-1" style="font-size:0.85rem;display:none;">
          рҹ“·+ мқҙм–ҙм„ң мҠӨмә”н•ҳкё°
        </button>
        <!-- л©ҖнӢ° лӘЁл“ң: м„ӨлӘ… мһ…л Ҙ -->
        <div id="multiInputArea" style="display:none">
          <input type="text" id="multiDescInput" class="hero-input mt-1" placeholder="м„ӨлӘ… м¶”к°Җ (м„ нғқ)">
          <div class="scan-actions mt-1">
            <button onclick="addAndContinue()" class="hero-btn" style="flex:1;font-size:0.8rem;">рҹ“·+ м¶”к°Җ нӣ„ кі„мҶҚ</button>
            <button onclick="addAndFinish()" class="hero-btn hero-btn-ghost" style="flex:1;font-size:0.8rem;">вң“ мҷ„лЈҢ</button>
          </div>
        </div>
      </div>

      <!-- л©ҖнӢ° мҠӨмә” лҲ„м Ғ лӘ©лЎқ -->
      <div id="multiListArea">
        <div class="history-header">
          <span id="multiListCount"></span>
          <button onclick="clearMultiScans()" class="btn-clear">м§Җмҡ°кё°</button>
        </div>
        <ul id="multiScanList" style="list-style:none;padding:0;margin:0;max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:0.5rem;"></ul>
        <button onclick="exportMultiMd()" class="hero-btn w-full mt-2" style="font-size:0.9rem;">
          рҹ“„ л§ҒнҒ¬ м •лҰ¬ (MD EditorлЎң)
        </button>
      </div>
    </div>

  </div><!-- /.tab-panels-wrap -->

    <!-- кіөнҶө нһҲмҠӨнҶ лҰ¬ -->
    <div class="history-section">
      <div class="history-header">
        <span>нһҲмҠӨнҶ лҰ¬</span>
        <button class="btn-clear" onclick="clearHistory()">м§Җмҡ°кё°</button>
      </div>
      <ul id="historyList"></ul>
    </div>
  </div>
  </div><!-- /.qr-card -->

</div>

<!-- нҶ мҠӨнҠё -->
<div id="qr-toast"></div>

<!-- мўҢмғҒлӢЁ: нҷҲ -->
<div class="top-overlay-left">
  <a href="/" class="overlay-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    <span>Home</span>
  </a>
</div>
<!-- мҡ°мғҒлӢЁ: ліҙкё°лӘЁл“ң + кіөмң  -->
<div class="top-overlay">
  <button id="themeToggleBtn" class="overlay-btn" onclick="cycleTheme()" title="ліҙкё° лӘЁл“ң">рҹ’»</button>
  <button id="shareBtn" class="overlay-btn" onclick="shareCurrentPage()" title="кіөмң ">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
      <polyline points="16 6 12 2 8 6"/>
      <line x1="12" x2="12" y1="2" y2="15"/>
    </svg>
    <span>кіөмң </span>
  </button>
</div>

<script>
  // в”Җв”Җ Service Worker л“ұлЎқ (PWA) в”Җв”Җ
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/qr/sw.js').catch(() => {});
    });
  }

  // в”Җв”Җ jsQR кёҖлЎңлІҢ мғҒнғң в”Җв”Җ
  let isCameraRunning = false;
  let videoElement = null;
  let canvasContext = null;
  let scannerAnimationId = null;
  let lastScannedCodes = new Set();
  let scanResultCloseTimer = null;

  // в”Җв”Җ л©ҖнӢ°мҠӨмә” мғҒнғң в”Җв”Җ
  let multiScans = [];
  let isMultiMode = false;
  let currentScanText = '';

  document.addEventListener('DOMContentLoaded', () => {
    loadHistory();
    document.addEventListener('paste', handlePasteEvent);
  });

  // в”Җв”Җ нғӯ м „нҷҳ в”Җв”Җ
  function switchTab(tab) {
    ['generate', 'scan'].forEach(k => {
      document.getElementById(k === 'generate' ? 'generateTab' : 'scanTab').classList.toggle('active', k === tab);
      document.getElementById(k === 'generate' ? 'tabBtnGenerate' : 'tabBtnScan').classList.toggle('active', k === tab);
    });
    if (tab !== 'scan') stopCamera();
  }

  // в”Җв”Җ нҶ мҠӨнҠё в”Җв”Җ
  let _toastTimer;
  function showToast(msg) {
    const el = document.getElementById('qr-toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
  }

  /* ---- мғқм„ұ ---- */
  function generateQR(text) {
    const val = text || document.getElementById('urlInput').value.trim();
    if (!val) return showToast('лӮҙмҡ©мқ„ мһ…л Ҙн•ҙмЈјм„ёмҡ”.');
    const container = document.getElementById('qrcode');
    container.innerHTML = '';
    new QRCode(container, { text: val, width: 180, height: 180, colorDark: '#000', colorLight: '#fff', correctLevel: QRCode.CorrectLevel.H });
    document.getElementById('genResultText').textContent = val;
    document.getElementById('genResultArea').classList.add('show');
    if (!text) document.getElementById('urlInput').value = val;
    addToHistory(val, 'generate');
    const isUrl = (() => { try { new URL(val); return true; } catch { return false; } })();
    document.getElementById('btnShortenUrl').style.display = isUrl ? '' : 'none';
  }

  function downloadQR() {
    const img = document.querySelector('#qrcode img');
    const cvs = document.querySelector('#qrcode canvas');
    const a = document.createElement('a');
    a.download = `qr_${Date.now()}.png`;
    if (img && img.src) a.href = img.src;
    else if (cvs) a.href = cvs.toDataURL('image/png');
    else return;
    a.click();
  }

  /* ---- мҠӨмә” (jsQR) ---- */
  async function startCamera() {
    if (isCameraRunning) return;
    document.getElementById('cameraArea').style.display = 'block';
    document.getElementById('scanResultArea').classList.remove('show');

    if (typeof window.jsQR === 'undefined') {
      showToast('QR мҠӨмә” лқјмқҙлёҢлҹ¬лҰ¬лҘј лЎңл“ңн•  мҲҳ м—ҶмҠөлӢҲлӢӨ.');
      document.getElementById('cameraArea').style.display = 'none';
      return;
    }

    if (!videoElement) {
      videoElement = document.createElement('video');
      videoElement.id = 'qr-video';
      videoElement.style.cssText = 'width: 100%; height: 100%; object-fit: cover; display: block;';
      document.getElementById('reader').appendChild(videoElement);
    }

    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment' }
      });
      videoElement.srcObject = stream;
      videoElement.play();
      isCameraRunning = true;
      lastScannedCodes.clear();
      showToast('м№ҙл©”лқјк°Җ мӢңмһ‘лҗҳм—ҲмҠөлӢҲлӢӨ.');
      startScanLoop();
    } catch (err) {
      showToast('м№ҙл©”лқјлҘј мӢңмһ‘н•  мҲҳ м—ҶмҠөлӢҲлӢӨ. к¶Ңн•ңмқ„ нҷ•мқён•ҙмЈјм„ёмҡ”.');
      document.getElementById('cameraArea').style.display = 'none';
    }
  }

  function stopCamera() {
    if (scannerAnimationId) {
      cancelAnimationFrame(scannerAnimationId);
      scannerAnimationId = null;
    }

    if (videoElement && videoElement.srcObject) {
      videoElement.srcObject.getTracks().forEach(track => track.stop());
    }

    isCameraRunning = false;
    document.getElementById('cameraArea').style.display = 'none';
    if (videoElement && videoElement.parentNode) {
      videoElement.remove();
      videoElement = null;
      canvasContext = null;
    }
  }

  function startScanLoop() {
    scanFrame();
  }

  function scanMultipleQRs(imageData) {
    const results = [];
    const { data, width, height } = imageData;
    const scanned = new Set();

    // м „мІҙ мқҙлҜём§Җ мҠӨмә”
    const result = window.jsQR(data, width, height);
    if (result && !scanned.has(result.data)) {
      results.push({ rawData: result.data });
      scanned.add(result.data);
    }

    // к·ёлҰ¬л“ңлЎң лӮҳлҲ„м–ҙ м¶”к°Җ мҠӨмә” (4к°ң мҳҒм—ӯ)
    const regions = [
      { x: 0, y: 0, w: width/2, h: height/2 },
      { x: width/2, y: 0, w: width/2, h: height/2 },
      { x: 0, y: height/2, w: width/2, h: height/2 },
      { x: width/2, y: height/2, w: width/2, h: height/2 }
    ];

    regions.forEach(region => {
      const regionData = new Uint8ClampedArray(region.w * region.h * 4);
      for (let y = 0; y < region.h; y++) {
        for (let x = 0; x < region.w; x++) {
          const srcIdx = ((region.y + y) * width + (region.x + x)) * 4;
          const dstIdx = (y * region.w + x) * 4;
          regionData[dstIdx] = data[srcIdx];
          regionData[dstIdx + 1] = data[srcIdx + 1];
          regionData[dstIdx + 2] = data[srcIdx + 2];
          regionData[dstIdx + 3] = data[srcIdx + 3];
        }
      }

      const regionImageData = new ImageData(regionData, region.w, region.h);
      const r = window.jsQR(regionImageData.data, regionImageData.width, regionImageData.height);
      if (r && !scanned.has(r.data)) {
        results.push({ rawData: r.data });
        scanned.add(r.data);
      }
    });

    return results;
  }

  function scanFrame() {
    if (!isCameraRunning || !videoElement) return;

    if (!canvasContext) {
      const canvas = document.createElement('canvas');
      canvas.width = videoElement.videoWidth;
      canvas.height = videoElement.videoHeight;
      canvasContext = canvas.getContext('2d');
    }

    if (videoElement.videoWidth > 0 && videoElement.videoHeight > 0) {
      canvasContext.canvas.width = videoElement.videoWidth;
      canvasContext.canvas.height = videoElement.videoHeight;
      canvasContext.drawImage(videoElement, 0, 0);

      const imageData = canvasContext.getImageData(0, 0, canvasContext.canvas.width, canvasContext.canvas.height);
      const results = scanMultipleQRs(imageData);

      if (results && results.length > 0) {
        onScanSuccess(results, 'camera');
      }
    }

    scannerAnimationId = requestAnimationFrame(scanFrame);
  }

  function handleFileUpload(input) {
    if (!input.files.length) return;
    scanImageFile(input.files[0]);
    input.value = '';
  }

  function scanImageFile(file, tool = 'file') {
    stopCamera();

    if (typeof window.jsQR === 'undefined') {
      showToast('QR мҠӨмә” лқјмқҙлёҢлҹ¬лҰ¬лҘј лЎңл“ңн•  мҲҳ м—ҶмҠөлӢҲлӢӨ.');
      return;
    }

    switchTab('scan');

    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const results = scanMultipleQRs(imageData);

      if (results && results.length > 0) {
        onScanSuccess(results, tool);
      } else {
        showToast('QR мҪ”л“ңлҘј м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ.');
      }
    };

    img.onerror = () => showToast('мқҙлҜём§ҖлҘј л¶Ҳлҹ¬мҳ¬ мҲҳ м—ҶмҠөлӢҲлӢӨ.');
    img.src = URL.createObjectURL(file);
  }

  function handlePasteEvent(e) {
    e.preventDefault();

    // мқҙлҜём§Җ мІҳлҰ¬ (лӘЁл“  нғӯм—җм„ң мқҙлҜём§ҖлҠ” мҠӨмә”н•ҳкё°лЎң)
    for (const item of e.clipboardData.items) {
      if (item.type.startsWith('image/')) {
        scanImageFile(new File([item.getAsFile()], 'paste.png', { type: item.type }), 'clipboard');
        return;
      }
    }

    // н…ҚмҠӨнҠё мІҳлҰ¬
    const text = e.clipboardData.getData('text/plain').trim();
    if (!text || text.length === 0) return;

    // нҳ„мһ¬ нҷңм„ұ нғӯ нҷ•мқё
    const isGenerateTabActive = document.getElementById('tabBtnGenerate').classList.contains('active');

    if (isGenerateTabActive) {
      // мғқм„ұн•ҳкё° нғӯ: н…ҚмҠӨнҠёлҘј мһ…л Ҙ н•„л“ңм—җ м¶”к°Җ
      document.getElementById('urlInput').value = text;
    } else {
      // мҠӨмә”н•ҳкё° нғӯ: URLмқҙл©ҙ л©ҖнӢ°мҠӨмә” лӘ©лЎқм—җ м¶”к°Җ
      try {
        new URL(text);
        if (!multiScans.some(item => item.url === text)) {
          multiScans.push({ url: text, desc: '', tool: 'clipboard', scannedAt: new Date().toISOString() });
          addToHistory(text, 'clipboard');
          renderMultiList();
          document.getElementById('scanResultText').textContent = text;
          const link = document.getElementById('scanResultLink');
          link.href = text;
          link.classList.add('show');
          document.getElementById('scanResultArea').classList.add('show');
          autoCloseScanResult();
          showToast('вң“ л§ҒнҒ¬к°Җ м¶”к°Җлҗҳм—ҲмҠөлӢҲлӢӨ.');
        } else {
          showToast('мқҙлҜё м¶”к°Җлҗң л§ҒнҒ¬мһ…лӢҲлӢӨ.');
        }
      } catch {
        // URLмқҙ м•„лӢҲл©ҙ л¬ҙмӢң
      }
    }
  }

  async function handleClipboardPaste() {
    try {
      const items = await navigator.clipboard.read();
      for (const item of items) {
        const t = item.types.find(t => t.startsWith('image/'));
        if (t) { scanImageFile(new File([await item.getType(t)], 'clip.png', { type: t }), 'clipboard'); return; }
      }
      showToast('нҒҙлҰҪліҙл“ңм—җ мқҙлҜём§Җк°Җ м—ҶмҠөлӢҲлӢӨ.');
    } catch {
      showToast('Ctrl+V (лҳҗлҠ” Cmd+V)лЎң мқҙлҜём§ҖлҘј л¶ҷм—¬л„Јм–ҙ мЈјм„ёмҡ”.');
    }
  }

  function onScanSuccess(results, tool = 'camera') {
    if (!results || results.length === 0) return;

    // к°ҷмқҖ кІ°кіј лӮҙм—җм„ңмқҳ мӨ‘ліө м ңкұ°
    const seenInFrame = new Set();
    const uniqueResults = results.filter(r => {
      const key = r.rawData;
      if (seenInFrame.has(key)) return false;
      seenInFrame.add(key);
      return true;
    });

    if (uniqueResults.length === 0) return;

    // лӘЁл“  к°җм§Җлҗң QRмқ„ мһҗлҸҷмңјлЎң лӘ©лЎқм—җ м¶”к°Җ
    let addedCount = 0;
    let lastAddedCode = null;
    let hasNewCode = false;
    uniqueResults.forEach(result => {
      const code = result.rawData;

      // лӘ©лЎқм—җм„ң мӨ‘ліө нҷ•мқё (мғҲлЎңмҡҙ мҪ”л“ңмқём§Җ нҷ•мқё)
      const isDuplicate = multiScans.some(item => item.url === code);
      if (isDuplicate) return;

      hasNewCode = true;

      // лӘ©лЎқм—җ м¶”к°Җ
      multiScans.push({ url: code, desc: '', tool, scannedAt: new Date().toISOString() });
      addedCount++;
      lastAddedCode = code;

      // URLмқҙл©ҙ нһҲмҠӨнҶ лҰ¬м—җ м¶”к°Җ
      try {
        new URL(code);
        addToHistory(code, tool);
      } catch {
        // URLмқҙ м•„лӢҢ лҚ°мқҙн„°лҠ” нһҲмҠӨнҶ лҰ¬м—җ м¶”к°Җ м•Ҳ н•Ё
      }
    });

    // мҠӨмә” м„ұкіө мғҒмһҗ м—…лҚ°мқҙнҠё (л§Ҳм§Җл§ү к°җм§Җлҗң QR)
    if (lastAddedCode) {
      document.getElementById('scanResultText').textContent = lastAddedCode;

      const link = document.getElementById('scanResultLink');
      try {
        new URL(lastAddedCode);
        link.href = lastAddedCode;
        link.classList.add('show');
      } catch {
        link.classList.remove('show');
      }

      document.getElementById('scanResultArea').classList.add('show');
      autoCloseScanResult();
    }

    renderMultiList();
    if (addedCount > 0) {
      showToast(`вң“ ${addedCount}к°ң QR мҪ”л“ңк°Җ м¶”к°Җлҗҳм—ҲмҠөлӢҲлӢӨ.`);
    }
  }


  function copyScanResult() {
    const text = document.getElementById('scanResultText').textContent;
    navigator.clipboard.writeText(text)
      .then(() => showToast('ліөмӮ¬лҗҳм—ҲмҠөлӢҲлӢӨ вң“'))
      .catch(() => showToast('ліөмӮ¬ мӢӨнҢЁ'));
  }

  function closeScanResult() {
    clearTimeout(scanResultCloseTimer);
    document.getElementById('scanResultArea').classList.remove('show');
  }

  function autoCloseScanResult() {
    clearTimeout(scanResultCloseTimer);
    scanResultCloseTimer = setTimeout(() => {
      document.getElementById('scanResultArea').classList.remove('show');
    }, 5000); // 5мҙҲ нӣ„ мһҗлҸҷ лӢ«кё°
  }

  /* ---- Short.io лӢЁм¶• URL ---- */
  async function shortenGeneratedUrl() {
    const text = document.getElementById('genResultText').textContent;
    if (!text) return;
    const btn = document.getElementById('btnShortenUrl');
    btn.disabled = true;
    btn.textContent = 'мІҳлҰ¬ мӨ‘...';
    try {
      const res = await fetch('/.netlify/functions/shorten', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: text }),
      });
      const data = await res.json();
      if (!res.ok || !data.shortURL) throw new Error();
      await navigator.clipboard.writeText(data.shortURL);
      showToast('лӢЁм¶• URL ліөмӮ¬лҗЁ вң“ ' + data.shortURL);
    } catch {
      try {
        await navigator.clipboard.writeText(text);
        showToast('лӢЁм¶• мӢӨнҢЁ вҖ” мӣҗліё URL ліөмӮ¬лҗЁ');
      } catch { showToast('ліөмӮ¬м—җ мӢӨнҢЁн–ҲмҠөлӢҲлӢӨ.'); }
    } finally {
      btn.disabled = false;
      btn.textContent = 'рҹ”— лӢЁм¶• URL мғқм„ұ';
    }
  }

  // в”Җв”Җ л©ҖнӢ°мҠӨмә” н•ЁмҲҳ в”Җв”Җ
  function startMultiMode() {
    isMultiMode = true;
    document.getElementById('btnStartMulti').style.display = 'none';
    document.getElementById('multiDescInput').value = '';
    document.getElementById('multiInputArea').style.display = 'block';
  }

  function addAndContinue() {
    const desc = document.getElementById('multiDescInput').value.trim();
    multiScans.push({ url: currentScanText, desc, scannedAt: new Date().toISOString() });
    document.getElementById('multiInputArea').style.display = 'none';
    document.getElementById('scanResultArea').classList.remove('show');
    renderMultiList();
    showToast('вң“ м¶”к°Җлҗҳм—ҲмҠөлӢҲлӢӨ. лӢӨмқҢ QRмқ„ мҠӨмә”н•ҙмЈјм„ёмҡ”.');
    setTimeout(() => startCamera(), 200);
  }

  function addAndFinish() {
    const desc = document.getElementById('multiDescInput').value.trim();
    multiScans.push({ url: currentScanText, desc, scannedAt: new Date().toISOString() });
    isMultiMode = false;
    document.getElementById('multiInputArea').style.display = 'none';
    document.getElementById('scanResultArea').classList.remove('show');
    document.getElementById('btnStartMulti').style.display = 'none';
    renderMultiList();
    showToast('вң“ ' + multiScans.length + 'к°ң н•ӯлӘ© мҲҳм§‘лҗЁ');
  }

  function renderMultiList() {
    const listArea = document.getElementById('multiListArea');
    const ul = document.getElementById('multiScanList');
    if (!multiScans.length) { listArea.style.display = 'none'; return; }
    listArea.style.display = 'block';
    document.getElementById('multiListCount').textContent = multiScans.length + 'к°ң н•ӯлӘ©';
    ul.innerHTML = '';

    const toolIcons = {
      'camera': 'рҹ“·',
      'file': 'рҹ“Ғ',
      'clipboard': 'рҹ“Ӣ',
      'generate': 'вңҸпёҸ'
    };

    // м—ӯмҲңмңјлЎң (мөңк·ј н•ӯлӘ©мқҙ л§Ё мң„)
    for (let idx = multiScans.length - 1; idx >= 0; idx--) {
      const item = multiScans[idx];
      const display = item.url.length > 44 ? item.url.slice(0, 44) + '...' : item.url;
      const icon = toolIcons[item.tool] || 'рҹ“·';
      const li = document.createElement('li');
      li.className = 'history-item';
      li.style.cursor = 'pointer';
      li.onclick = (e) => {
        if (e.target.classList.contains('history-del')) return;
        window.open(item.url, '_blank');
      };
      li.innerHTML = `
        <div class="history-icon">${icon}</div>
        <div class="history-text">
          <div class="main">${display}</div>
        </div>
        <button class="history-del" onclick="event.stopPropagation();deleteMultiScan(${idx})">вң•</button>
      `;
      ul.appendChild(li);
    }
  }

  function deleteMultiScan(idx) {
    multiScans.splice(idx, 1);
    renderMultiList();
  }

  function clearMultiScans() {
    if (!confirm('л©ҖнӢ° мҠӨмә” лӘ©лЎқмқ„ лӘЁл‘җ мӮӯм ңн•ҳмӢңкІ мҠөлӢҲк№Ң?')) return;
    multiScans = [];
    lastScannedCodes.clear();
    document.getElementById('scanResultArea').classList.remove('show');
    renderMultiList();
  }

  function exportMultiMd() {
    if (!multiScans.length) return;
    const today = new Date().toISOString().slice(0, 10);
    let md = `# QR мҠӨмә” кІ°кіј\n> ${today} В· ${multiScans.length}к°ң н•ӯлӘ©\n\n`;
    multiScans.forEach((item, idx) => {
      const isUrl = (() => { try { new URL(item.url); return true; } catch { return false; } })();
      const title = item.url.length > 40 ? item.url.slice(0, 40) + '...' : item.url;
      const linkText = item.desc || title;
      md += `${idx + 1}. [${linkText}](${item.url})\n`;
    });

    const payload = JSON.stringify({ data: { content: md, filename: `qr-scan-${today}.md` }, permission: 'clone' });
    const encoded = btoa(encodeURIComponent(payload))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
    location.href = `/md-editor/#share=${encoded}`;
  }

  /* ---- нһҲмҠӨнҶ лҰ¬ ---- */
  function addToHistory(text, tool) {
    let h = JSON.parse(localStorage.getItem('qr_history') || '[]');
    h = h.filter(i => i.text !== text);
    h.unshift({ text, tool, date: new Date().toLocaleDateString() });
    if (h.length > 30) h.pop();
    localStorage.setItem('qr_history', JSON.stringify(h));
    renderHistory(h);
  }

  function loadHistory() { renderHistory(JSON.parse(localStorage.getItem('qr_history') || '[]')); }

  function renderHistory(h) {
    const getToolInfo = (tool) => {
      const toolMap = {
        'camera': { icon: 'рҹ“·', label: 'м№ҙл©”лқј' },
        'file': { icon: 'рҹ“Ғ', label: 'нҢҢмқј' },
        'clipboard': { icon: 'рҹ“Ӣ', label: 'л¶ҷм—¬л„Јкё°' },
        'generate': { icon: 'вңҸпёҸ', label: 'мғқм„ұн•ҳкё°' }
      };
      return toolMap[tool] || { icon: 'вқ“', label: tool };
    };

    const list = document.getElementById('historyList');
    list.innerHTML = '';
    if (!h.length) {
      list.innerHTML = '<li class="history-empty">кё°лЎқмқҙ м—ҶмҠөлӢҲлӢӨ.</li>';
      return;
    }
    h.forEach(item => {
      const li = document.createElement('li');
      li.className = 'history-item';
      li.style.cursor = 'pointer';
      // toolм—җ л”°лқј лӢӨлҘё лҸҷмһ‘
      if (item.tool === 'generate') {
        li.onclick = () => { switchTab('generate'); generateQR(item.text); };
      } else {
        // camera, file, clipboard: мғҲ м°Ҫм—җм„ң м—ҙкё°
        li.onclick = () => { window.open(item.text, '_blank'); };
      }
      const toolInfo = getToolInfo(item.tool);
      li.innerHTML = `
        <div class="history-icon">${toolInfo.icon}</div>
        <div class="history-text">
          <div class="main">${item.text}</div>
          <div class="sub">${toolInfo.label} В· ${item.date}</div>
        </div>
        <button class="history-del" onclick="event.stopPropagation();deleteHistoryItem('${item.text.replace(/'/g,"\\'")}')">вң•</button>
      `;
      list.appendChild(li);
    });
  }

  function deleteHistoryItem(text) {
    let h = JSON.parse(localStorage.getItem('qr_history') || '[]').filter(i => i.text !== text);
    localStorage.setItem('qr_history', JSON.stringify(h));
    renderHistory(h);
  }

  function clearHistory() {
    if (confirm('кё°лЎқмқ„ лӘЁл‘җ мӮӯм ңн•ҳмӢңкІ мҠөлӢҲк№Ң?')) {
      localStorage.removeItem('qr_history');
      renderHistory([]);
    }
  }
</script>
