<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>넘버블럭스 파인더 — VIVES</title>
  <meta name="description" content="넘버블럭스 에피소드를 시즌별·수준별·태그별로 탐색하세요.">
  <link rel="icon" href="/logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="/common/hero-theme.css">
  <script src="/common/theme.js"></script>
  <script src="/common/init.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── 우상단 오버레이: 홈·테마·공유 ── -->
<div class="top-overlay">
  <a href="/" class="overlay-btn" aria-label="홈으로" title="홈">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.5"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
  </a>
  <button id="themeToggleBtn" class="overlay-btn" onclick="cycleTheme()" title="테마 변경">💻</button>
  <button class="overlay-btn" onclick="shareCurrentPage()" title="공유">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.5"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
      <polyline points="16 6 12 2 8 6"/>
      <line x1="12" x2="12" y1="2" y2="15"/>
    </svg>
    <span>공유</span>
  </button>
</div>

<!-- ════════════════════════════════════════
     LEFT SIDEBAR
════════════════════════════════════════ -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1 class="sidebar-title">🔢 넘버블럭스 파인더</h1>
    <button class="sidebar-close-btn" id="sidebarCloseBtn" aria-label="사이드바 닫기">✕</button>
  </div>

  <!-- 검색 -->
  <div class="sidebar-search">
    <input id="sidebarSearchInput" type="search" class="hero-input"
           placeholder="검색..." autocomplete="off" aria-label="에피소드 검색">
    <button id="sidebarAiBtn" class="sidebar-search-ai-btn" title="AI 검색">✦</button>
  </div>

  <!-- 필터 섹션 -->
  <nav class="sidebar-nav">

    <!-- 시즌별 -->
    <div class="filter-section">
      <button class="filter-section-toggle" data-section="season">
        <span class="filter-title">시즌별</span>
        <span class="toggle-icon">▼</span>
      </button>
      <div class="filter-options filter-options-collapsed" id="seasonFilters"></div>
    </div>

    <!-- 수준별 -->
    <div class="filter-section">
      <button class="filter-section-toggle" data-section="level">
        <span class="filter-title">수준별</span>
        <span class="toggle-icon">▼</span>
      </button>
      <div class="filter-options filter-options-collapsed" id="levelFilters"></div>
    </div>

    <!-- 태그별 -->
    <div class="filter-section">
      <button class="filter-section-toggle" data-section="tag">
        <span class="filter-title">태그별</span>
        <span class="toggle-icon">▼</span>
      </button>
      <div class="filter-options filter-options-collapsed" id="tagFilters"></div>
    </div>

    <!-- 즐겨찾기 -->
    <div class="filter-section">
      <label class="filter-checkbox">
        <input type="checkbox" id="favoritesCheckbox" aria-label="즐겨찾기만 보기">
        <span>⭐ 즐겨찾기만</span>
      </label>
    </div>

  </nav>

  <!-- MD 내보내기 -->
  <div class="sidebar-footer">
    <button id="sidebarMdBtn" class="sidebar-md-btn">📄 MD로 내보내기</button>
  </div>
</aside>

<!-- ════════════════════════════════════════
     MAIN CONTENT
════════════════════════════════════════ -->
<div class="main-wrapper">

  <!-- 모바일 헤더 (사이드바 토글) -->
  <header class="mobile-header">
    <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="메뉴">☰</button>
    <h1 class="mobile-header-title">넘버블럭스 파인더</h1>
    <div class="mobile-header-actions">
      <a href="/" class="mobile-header-btn" aria-label="홈으로">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </a>
      <button id="mobileThemeBtn" class="mobile-header-btn" onclick="cycleTheme()">💻</button>
      <button id="mobileShareBtn" class="mobile-header-btn" onclick="shareCurrentPage()">📤</button>
    </div>
  </header>

  <!-- AI 배너 -->
  <div id="geminiBanner" class="gemini-banner hidden" role="status">
    <span>✦ <span id="geminiBannerText"></span></span>
    <button id="geminiClearBtn" class="gemini-clear-btn">✕</button>
  </div>

  <!-- 메인 콘텐츠 -->
  <main class="main-content">

    <!-- 현재 필터 정보 헤더 -->
    <div class="content-header">
      <h2 id="contentTitle" class="content-title">모든 에피소드</h2>
      <p id="contentSubtitle" class="content-subtitle"></p>
    </div>

    <!-- 에피소드 그리드 -->
    <div id="episodeGrid" class="episode-grid">
      <!-- 카드 렌더 -->
    </div>

    <!-- 무한 스크롤 센티넬 -->
    <div id="scrollSentinel" class="scroll-sentinel"></div>

    <!-- 빈 상태 -->
    <div id="emptyState" class="empty-state hidden">
      <p class="empty-icon">😢</p>
      <p class="empty-title">에피소드가 없어요</p>
      <p class="empty-desc">다른 필터나 검색을 시도해보세요</p>
    </div>

  </main>

</div>

<!-- ════════════════════════════════════════
     TOAST
════════════════════════════════════════ -->
<div id="nbToast" class="nb-toast" role="status" aria-live="polite"></div>

<!-- ════════════════════════════════════════
     EPISODE DETAIL MODAL
════════════════════════════════════════ -->
<div id="episodeModal" class="modal-backdrop hidden" role="dialog" aria-modal="true">
  <div class="modal-box">

    <!-- 닫기 버튼 -->
    <button class="modal-close-btn" id="modalCloseBtn">✕</button>

    <!-- 영상 -->
    <div class="modal-video-section">
      <div class="modal-video-wrap" id="modalVideoWrap">
        <iframe id="modalIframe" class="modal-iframe"
                src="about:blank" title="YouTube video"
                allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                loading="lazy"></iframe>
      </div>
      <div class="modal-lang-toggle" id="modalLangToggle">
        <button class="modal-lang-btn active" id="btnLangKr" data-lang="kr">🇰🇷 한글</button>
        <button class="modal-lang-btn" id="btnLangEn" data-lang="en">🇬🇧 영문</button>
      </div>
    </div>

    <!-- 정보 -->
    <div class="modal-info">
      <h2 id="modalTitle" class="modal-title"></h2>
      <div id="modalBadges" class="modal-badges"></div>
      <p id="modalIdea" class="modal-idea"></p>
    </div>

    <!-- 액션 버튼 -->
    <div class="modal-actions">
      <a id="modalOrigLink" class="modal-btn modal-btn-ghost" target="_blank" rel="noopener">🔗 Blocksuniverse</a>
      <button id="modalFavBtn" class="modal-btn modal-btn-ghost">☆ 즐겨찾기</button>
      <button id="modalShareBtn" class="modal-btn modal-btn-primary">📤 공유</button>
    </div>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
