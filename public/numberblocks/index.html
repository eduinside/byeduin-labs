<body>

    <header>
        <div class="header-content">
            <a href="./" class="logo-container">
                <span class="logo-text">🔢 Numberblocks</span>
            </a>

            <nav class="filter-system">
                <!-- Desktop: Button-based navigation -->
                <div class="nav-modes">
                    <button class="nav-mode-btn active" data-mode="level">단계</button>
                    <button class="nav-mode-btn" data-mode="grade">학년</button>
                    <button class="nav-mode-btn" data-mode="domain">영역</button>
                </div>

                <div class="sub-filters" id="subFilters">
                    <!-- JS populates -->
                </div>

                <!-- Mobile: Dropdown-based navigation -->
                <select class="mobile-mode-select" id="mobileMode">
                    <option value="level">단계</option>
                    <option value="grade">학년</option>
                    <option value="domain">영역</option>
                </select>

                <select class="mobile-option-select" id="mobileOption">
                    <option value="all">전체</option>
                </select>
            </nav>

            <div class="header-actions">
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="검색...">
                    <button id="searchCloseBtn" class="search-close-btn">✕</button>
                    <button id="searchBtn">🔍</button>
                </div>
                <button id="themeToggleBtn" class="header-icon-btn" onclick="cycleTheme()" title="보기 모드">💻</button>
                <button id="shareBtn" class="header-icon-btn" onclick="shareCurrentPage()" title="공유">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
                        <polyline points="16 6 12 2 8 6"/>
                        <line x1="12" x2="12" y1="2" y2="15"/>
                    </svg>
                </button>
            </div>

        </div>
    </header>

    <main>
        <div id="resource-list" class="resource-grid">
            <!-- 자바스크립트로 리스트가 로드됩니다 -->
        </div>
        <div id="load-more-trigger" class="load-more-btn">
            더 보기
        </div>
    </main>
