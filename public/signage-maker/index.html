<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signage Maker — byeduin</title>
  <link rel="icon" href="/logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="/common/hero-theme.css">
  <script src="/common/theme.js"></script>
  <script src="/common/init.js"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      padding: 56px 1rem 5rem;
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,111,238,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,111,238,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }

    .fd-root { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; }

    .fd-view { display: none; }
    .fd-view.active { display: block; }

    .fd-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }
    .fd-section-title {
      font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--fg-muted); margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .fd-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .fd-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 18px; border-radius: 10px; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
      transition: all 0.15s; min-height: 40px; white-space: nowrap;
    }
    .fd-btn-primary { background: var(--primary); color: #fff; }
    .fd-btn-primary:hover { background: var(--primary-h); }
    .fd-btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .fd-btn-ghost {
      background: var(--card-bg); color: var(--fg-muted);
      border: 1px solid var(--border);
    }
    .fd-btn-ghost:hover { border-color: var(--primary); color: var(--primary); background: rgba(0,111,238,0.06); }
    .fd-btn-success { background: rgba(23,201,100,0.1); color: var(--success); border: 1px solid rgba(23,201,100,0.25); }
    .fd-btn-success:hover { background: rgba(23,201,100,0.2); }
    .fd-btn-danger { background: rgba(243,18,96,0.1); color: var(--danger); border: 1px solid rgba(243,18,96,0.2); }
    .fd-btn-danger:hover { background: rgba(243,18,96,0.18); }
    .fd-btn-sm { padding: 6px 12px; font-size: 12px; min-height: 32px; border-radius: 8px; }

    .fd-input, .fd-select {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px; font-size: 14px;
      color: var(--fg); outline: none; transition: border-color 0.2s;
      font-family: inherit;
    }
    .fd-input:focus, .fd-select:focus { border-color: var(--primary); }
    .fd-textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 14px; font-size: 13px;
      color: var(--fg); outline: none; resize: vertical; min-height: 120px;
      font-family: inherit; line-height: 1.6;
      transition: border-color 0.2s;
    }
    .fd-textarea:focus { border-color: var(--primary); }
    .fd-label { display:block; font-size:12px; font-weight:600; color:var(--fg-muted); margin: 14px 0 6px; }

    /* Home */

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .gallery-item {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      display: flex; flex-direction: column;
      animation: fadeUp 0.25s ease both;
    }
    .gallery-item:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,111,238,0.1);
    }
    .gallery-thumb {
      width: 100%; aspect-ratio: 9/16; background: var(--bg);
      display:block; object-fit: cover;
    }
    .gallery-meta { padding: 12px; }
    .gallery-meta .d { font-size: 11px; color: var(--fg-muted); }

    .empty {
      text-align: center; padding: 48px 24px; color: var(--fg-muted);
      border: 1px dashed var(--border); border-radius: 14px;
      line-height: 1.7; background: rgba(0,111,238,0.02);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-title { font-size: 14px; font-weight: 600; color: var(--fg); margin-bottom: 4px; }
    .empty-text { font-size: 13px; margin-bottom: 16px; }

    /* Home top */
    .home-top {
      display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Result preview */
    .result-img {
      width: 100%; max-width: 360px; aspect-ratio: 9/16;
      background: #fff; border: 1px solid var(--border); border-radius: 12px;
      object-fit: contain; display: block; margin: 0 auto;
    }

    .row { display:flex; gap:8px; flex-wrap: wrap; }
    .grow { flex: 1 1 auto; }

    #toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--fg); color: var(--bg);
      padding: 10px 18px; border-radius: 10px;
      font-size: 13px; font-weight: 600;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s, transform 0.2s; z-index: 9999; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .spinner {
      width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hint { font-size: 12px; color: var(--fg-muted); margin-top: 6px; }

    .view-only-banner {
      background: rgba(0,111,238,0.08); color: var(--primary);
      border: 1px solid rgba(0,111,238,0.25);
      padding: 10px 14px; border-radius: 10px; font-size: 13px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <!-- 좌상단: 홈 -->
  <div class="top-overlay-left">
    <a href="/" class="overlay-btn" title="홈">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Home</span>
    </a>
  </div>

  <!-- 우상단: 테마 + 공유 -->
  <div class="top-overlay">
    <button id="themeToggleBtn" class="overlay-btn" onclick="cycleTheme()" title="보기 모드">💻</button>
    <button id="shareBtn" class="overlay-btn" onclick="shareCurrentPage()" title="공유">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
        <polyline points="16 6 12 2 8 6"/>
        <line x1="12" x2="12" y1="2" y2="15"/>
      </svg>
      <span>공유</span>
    </button>
  </div>

  <div class="fd-root">
    <!-- 앱 헤더 -->
    <header class="app-header">
      <span class="app-badge">◆ Creative</span>
      <h1 class="app-title">Signage <span>Maker</span></h1>
      <p class="app-desc">학교 행사 안내용 세로 사이니지 이미지를 AI로 생성하세요</p>
    </header>

    <!-- ══ 홈 뷰 ══ -->
    <div id="view-home" class="fd-view active">
      <div class="home-top">
        <div class="fd-section-title" style="margin:0;flex:1">생성된 이미지</div>
        <button class="fd-btn fd-btn-primary" id="btn-new">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          새 이미지
        </button>
      </div>
      <div id="gallery-wrap"></div>
    </div>

    <!-- ════════ Compose ════════ -->
    <div id="view-compose" class="fd-view">
      <div class="row" style="margin-bottom:16px;">
        <button class="fd-btn fd-btn-ghost fd-btn-sm" data-go="home">← 홈</button>
      </div>
      <div class="fd-card">
        <div class="fd-section-title">새 사이니지 이미지</div>
        <label class="fd-label">삽입할 텍스트</label>
        <textarea id="src-text" class="fd-textarea" placeholder="예: 5월 1일 운동회"></textarea>

        <label class="fd-label">스타일</label>
        <select id="style-preset" class="fd-select">
          <option value="귀엽고 산뜻한 느낌">귀엽고 산뜻한 느낌</option>
          <option value="차분하고 정돈된 학교 공지 스타일">차분하고 정돈된 학교 공지 스타일</option>
          <option value="활기찬 포스터/플래카드 풍">활기찬 포스터/플래카드 풍</option>
          <option value="미니멀 타이포그래피 중심">미니멀 타이포그래피 중심</option>
          <option value="손그림/일러스트풍">손그림/일러스트풍</option>
          <option value="__custom__">직접 입력…</option>
        </select>
        <input id="style-custom" class="fd-input" placeholder="원하는 스타일을 자유롭게 입력" style="margin-top:8px; display:none;" />

        <div class="row" style="margin-top: 18px; justify-content:flex-end;">
          <button class="fd-btn fd-btn-primary" id="btn-make-prompt">프롬프트 만들기</button>
        </div>
      </div>
    </div>

    <!-- ════════ Prompt review ════════ -->
    <div id="view-prompt" class="fd-view">
      <div class="row" style="margin-bottom:16px;">
        <button class="fd-btn fd-btn-ghost fd-btn-sm" data-go="home">← 홈</button>
        <button class="fd-btn fd-btn-ghost fd-btn-sm" id="btn-back-compose">◀ 다시 작성</button>
      </div>
      <div id="view-only-banner" class="view-only-banner" style="display:none;">
        🔗 공유된 프롬프트입니다. <span id="view-only-mode"></span>
      </div>
      <div class="fd-card">
        <div class="fd-section-title">다듬어진 프롬프트</div>
        <textarea id="final-prompt" class="fd-textarea" style="min-height:180px;"></textarea>
        <div class="hint">필요 시 자유롭게 수정하세요. 한국어 텍스트는 정확히 따옴표 안에 들어 있어야 합니다.</div>

        <div style="margin-top: 18px; padding: 14px; background: rgba(0,111,238,0.05); border: 1px solid rgba(0,111,238,0.15); border-radius: 10px;">
          <div style="font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-muted); margin-bottom: 12px;">공유</div>
          <div class="row" style="gap: 6px;">
            <button class="fd-btn fd-btn-ghost fd-btn-sm" id="btn-share-view">🔗 보기 링크</button>
            <button class="fd-btn fd-btn-ghost fd-btn-sm" id="btn-share-copy">🔗 복제 링크</button>
          </div>
        </div>

        <div style="margin-top: 20px; padding: 14px; background: rgba(255,193,7,0.06); border: 1px solid rgba(255,193,7,0.2); border-radius: 10px;">
          <label class="fd-label" style="margin:0 0 10px;">관리자 코드 (4자리)</label>
          <input id="admin-code" class="fd-input" inputmode="numeric" maxlength="4" placeholder="0000" autocomplete="off" style="font-size: 18px; text-align: center; letter-spacing: 4px;" />
          <div class="hint" style="margin-top: 8px; text-align: center;">환경변수에서 설정된 4자리 숫자 코드</div>
        </div>

        <div class="row" style="margin-top: 20px; justify-content:flex-end;">
          <button class="fd-btn fd-btn-primary" id="btn-generate">이미지 생성</button>
        </div>
      </div>
    </div>

    <!-- ════════ Result ════════ -->
    <div id="view-result" class="fd-view">
      <div class="row" style="margin-bottom:16px;">
        <button class="fd-btn fd-btn-ghost fd-btn-sm" data-go="home">← 홈</button>
      </div>
      <div class="fd-card">
        <div class="fd-section-title">생성된 이미지</div>
        <img id="result-img" class="result-img" alt="생성된 사이니지 이미지" />
        <div id="result-images-container" style="margin-top: 16px;"></div>
        <div class="row" style="margin-top: 18px; justify-content: center; gap: 8px;">
          <button class="fd-btn fd-btn-success" id="btn-download">⬇ 1080×1920 다운로드</button>
          <button class="fd-btn fd-btn-ghost" id="btn-regenerate">🔁 더 만들어 보기 <span id="regen-left">(2/2)</span></button>
        </div>
      </div>
      <div class="fd-card" style="margin-top: 16px;">
        <div class="fd-section-title">생성 정보</div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 14px;">
          <div>
            <label class="fd-label" style="margin: 0 0 8px;">삽입 텍스트</label>
            <div style="background: var(--bg); padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); font-size: 13px; color: var(--fg); word-break: break-word; line-height: 1.5; max-height: 120px; overflow-y: auto;">
              <span id="result-text">—</span>
            </div>
          </div>
          <div>
            <label class="fd-label" style="margin: 0 0 8px;">스타일</label>
            <div style="background: var(--bg); padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); font-size: 13px; color: var(--fg);">
              <span id="result-style">—</span>
            </div>
          </div>
        </div>
        <div class="row" style="margin-top: 14px; justify-content: flex-end;">
          <button class="fd-btn fd-btn-danger fd-btn-sm" id="btn-delete-item">🗑 삭제</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    /* ══════════════════════════════════
       상태 / 저장소
    ══════════════════════════════════ */
    const STORAGE_KEY = 'vives-signage';
    const STYLE_PRESETS = [
      '귀엽고 산뜻한 느낌',
      '차분하고 정돈된 학교 공지 스타일',
      '활기찬 포스터/플래카드 풍',
      '미니멀 타이포그래피 중심',
      '손그림/일러스트풍',
    ];

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return { items: [] };
        const d = JSON.parse(raw);
        if (!Array.isArray(d.items)) d.items = [];
        return d;
      } catch { return { items: [] }; }
    }
    function saveData(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }

    let state = {
      sourceText: '',
      style: '',
      finalPrompt: '',
      currentImageDataUrl: null,
      currentItemId: null,
      generatedImages: [], // 현재 세션의 생성 이미지들
      regenCountLeft: 2,
      viewOnly: null, // 'view' | 'copy' | null
    };

    /* ══════════════════════════════════
       View routing
    ══════════════════════════════════ */
    function showView(name) {
      document.querySelectorAll('.fd-view').forEach(v => v.classList.remove('active'));
      const el = document.getElementById('view-' + name);
      if (el) el.classList.add('active');
      window.scrollTo(0, 0);
    }

    document.querySelectorAll('[data-go]').forEach(b => {
      b.addEventListener('click', () => {
        if (b.dataset.go === 'home') {
          location.hash = '';
          renderGallery();
          showView('home');
        } else {
          showView(b.dataset.go);
        }
      });
    });

    /* ══════════════════════════════════
       Toast
    ══════════════════════════════════ */
    let toastTimer;
    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
    }

    /* ══════════════════════════════════
       Gallery
    ══════════════════════════════════ */
    function fmtDate(ts) {
      const d = new Date(ts);
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }
    function renderGallery() {
      const wrap = document.getElementById('gallery-wrap');
      const data = loadData();
      if (!data.items.length) {
        wrap.innerHTML = `<div class="empty">
          <div class="empty-icon">🖼️</div>
          <div class="empty-title">아직 생성된 이미지가 없어요</div>
          <div class="empty-text">위의 <strong>새 이미지</strong> 버튼으로 시작해 보세요.</div>
        </div>`;
        return;
      }
      const items = [...data.items].sort((a, b) => b.createdAt - a.createdAt);
      wrap.innerHTML = `<div class="gallery-grid">${items.map(it => `
        <div class="gallery-item" data-id="${it.id}">
          <img class="gallery-thumb" src="${it.imageDataUrl}" alt="" loading="lazy" />
          <div class="gallery-meta">
            <div class="d">${fmtDate(it.createdAt)}</div>
          </div>
        </div>`).join('')}</div>`;
      wrap.querySelectorAll('.gallery-item').forEach(el => {
        el.addEventListener('click', () => openItem(el.dataset.id));
      });
    }
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function openItem(id) {
      const data = loadData();
      const it = data.items.find(x => x.id === id);
      if (!it) return;
      state.sourceText = it.sourceText || '';
      state.style = it.style || '';
      state.finalPrompt = it.finalPrompt || '';
      state.currentImageDataUrl = it.imageDataUrl;
      state.currentItemId = it.id;
      state.regenCountLeft = 0;

      // 메타데이터 표시
      document.getElementById('result-text').textContent = state.sourceText || '—';
      document.getElementById('result-style').textContent = state.style || '—';

      // 이미지 표시
      const container = document.getElementById('result-images-container');
      const allImages = it.images || [it.imageDataUrl];
      container.innerHTML = allImages.length > 1 ? allImages.map((img, idx) => `
        <div style="margin-bottom: 16px; cursor: pointer; border-radius: 12px; overflow: hidden; border: 2px solid ${idx === 0 ? 'var(--primary)' : 'var(--border)'}; transition: border-color 0.2s;"
             onclick="state.currentImageDataUrl='${img}'; document.getElementById('result-img').src='${img}'; document.querySelectorAll('#result-images-container > div').forEach(el => el.style.borderColor='var(--border)'); this.style.borderColor='var(--primary)';">
          <img src="${img}" alt="생성 이미지 ${idx+1}" style="width: 100%; aspect-ratio: 9/16; object-fit: cover; display: block;" />
          <div style="padding: 8px 12px; background: var(--card-bg); font-size: 12px; color: var(--fg-muted); text-align: center;">
            이미지 ${idx+1}
          </div>
        </div>
      `).join('') : '';

      // 첫 번째 이미지를 메인으로 설정
      if (allImages.length > 0) {
        document.getElementById('result-img').src = allImages[0];
      }

      document.getElementById('btn-regenerate').style.display = 'none';
      showView('result');
    }

    /* ══════════════════════════════════
       Compose
    ══════════════════════════════════ */
    document.getElementById('btn-new').addEventListener('click', () => {
      document.getElementById('src-text').value = '';
      document.getElementById('style-preset').value = STYLE_PRESETS[0];
      document.getElementById('style-custom').style.display = 'none';
      document.getElementById('style-custom').value = '';
      state.generatedImages = [];
      state.currentItemId = null;
      showView('compose');
    });

    document.getElementById('style-preset').addEventListener('change', (e) => {
      const cust = document.getElementById('style-custom');
      cust.style.display = e.target.value === '__custom__' ? 'block' : 'none';
    });

    document.getElementById('btn-make-prompt').addEventListener('click', async () => {
      const text = document.getElementById('src-text').value.trim();
      const sel = document.getElementById('style-preset').value;
      const style = sel === '__custom__'
        ? document.getElementById('style-custom').value.trim()
        : sel;
      if (!text) { toast('삽입할 텍스트를 입력해 주세요.'); return; }
      if (sel === '__custom__' && !style) { toast('스타일을 입력해 주세요.'); return; }

      const btn = document.getElementById('btn-make-prompt');
      btn.disabled = true;
      const old = btn.innerHTML;
      btn.innerHTML = '<span class="spinner"></span> 생성 중…';
      try {
        const res = await fetch('/.netlify/functions/signage-prompt', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, style }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '실패');
        state.sourceText = text;
        state.style = style;
        state.finalPrompt = data.prompt;
        state.viewOnly = null;
        document.getElementById('view-only-banner').style.display = 'none';
        document.getElementById('final-prompt').value = state.finalPrompt;
        document.getElementById('admin-code').value = '';
        document.getElementById('btn-generate').disabled = false;
        showView('prompt');
      } catch (e) {
        toast(e.message || '프롬프트 생성 실패');
      } finally {
        btn.disabled = false; btn.innerHTML = old;
      }
    });

    document.getElementById('btn-back-compose').addEventListener('click', () => showView('compose'));

    /* ══════════════════════════════════
       Share (vives-share base64url)
    ══════════════════════════════════ */
    function b64urlEncode(str) {
      return btoa(unescape(encodeURIComponent(str)))
        .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    }
    function b64urlDecode(s) {
      const raw = s.replace(/-/g,'+').replace(/_/g,'/');
      const pad = (4 - raw.length % 4) % 4;
      return decodeURIComponent(escape(atob(raw + '='.repeat(pad))));
    }

    async function makeShareLink(permission) {
      state.finalPrompt = document.getElementById('final-prompt').value.trim();
      if (!state.finalPrompt) { toast('공유할 프롬프트가 없습니다.'); return; }
      const payload = JSON.stringify({
        type: 'signage-prompt',
        sourceText: state.sourceText,
        style: state.style,
        finalPrompt: state.finalPrompt,
        permission,
      });
      const longUrl = `${location.origin}/signage-maker/#share=${b64urlEncode(payload)}`;
      let url = longUrl;
      try {
        const res = await fetch('/.netlify/functions/shorten', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: longUrl }),
        });
        const data = await res.json();
        if (res.ok && data.shortURL) url = data.shortURL;
      } catch {}
      try {
        await navigator.clipboard.writeText(url);
        toast('공유 링크가 클립보드에 복사되었습니다.');
      } catch {
        prompt('아래 링크를 복사하세요:', url);
      }
    }
    document.getElementById('btn-share-view').addEventListener('click', () => makeShareLink('view'));
    document.getElementById('btn-share-copy').addEventListener('click', () => makeShareLink('copy'));

    /* ══════════════════════════════════
       Image generation + 1080x1920 변환
    ══════════════════════════════════ */
    async function generateImage() {
      const prompt = document.getElementById('final-prompt').value.trim();
      const code = document.getElementById('admin-code').value.trim();
      if (!prompt) { toast('프롬프트가 비어 있습니다.'); return; }
      if (!/^\d{4}$/.test(code)) { toast('관리자 코드는 4자리 숫자입니다.'); return; }

      const btn = document.getElementById('btn-generate');
      btn.disabled = true;
      const old = btn.innerHTML;
      btn.innerHTML = '<span class="spinner"></span> 생성 중… (10~30초)';
      try {
        const res = await fetch('/.netlify/functions/signage-image', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt, code }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '실패');
        const srcDataUrl = `data:image/png;base64,${data.b64}`;
        const finalDataUrl = await fitTo1080x1920(srcDataUrl);

        state.finalPrompt = prompt;
        state.currentImageDataUrl = finalDataUrl;
        state.generatedImages.push(finalDataUrl);

        let item;
        const d = loadData();
        if (state.currentItemId) {
          // 기존 item에 이미지 추가 (재생성의 경우)
          item = d.items.find(x => x.id === state.currentItemId);
          if (item) {
            item.images = state.generatedImages;
          }
        } else {
          // 새로운 item 생성
          item = {
            id: 'sg_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
            title: (state.sourceText || '').split('\n')[0].slice(0, 40) || '제목 없음',
            createdAt: Date.now(),
            sourceText: state.sourceText,
            style: state.style,
            finalPrompt: state.finalPrompt,
            imageDataUrl: finalDataUrl,
            images: state.generatedImages,
          };
          d.items.push(item);
          state.currentItemId = item.id;
        }
        try {
          saveData(d);
        } catch (e) {
          toast('로컬 저장 용량이 부족할 수 있어요. 일부 항목을 정리해 주세요.');
        }
        state.regenCountLeft = 2;

        // 메타데이터 표시
        document.getElementById('result-text').textContent = state.sourceText || '—';
        document.getElementById('result-style').textContent = state.style || '—';

        // 이미지 미리보기 표시
        const container = document.getElementById('result-images-container');
        container.innerHTML = state.generatedImages.length > 1 ? state.generatedImages.map((img, idx) => `
          <div style="margin-bottom: 16px; cursor: pointer; border-radius: 12px; overflow: hidden; border: 2px solid ${idx === state.generatedImages.length - 1 ? 'var(--primary)' : 'var(--border)'}; transition: border-color 0.2s;"
               onclick="state.currentImageDataUrl='${img}'; document.getElementById('result-img').src='${img}'; document.querySelectorAll('#result-images-container > div').forEach(el => el.style.borderColor='var(--border)'); this.style.borderColor='var(--primary)';">
            <img src="${img}" alt="생성 이미지 ${idx+1}" style="width: 100%; aspect-ratio: 9/16; object-fit: cover; display: block;" />
            <div style="padding: 8px 12px; background: var(--card-bg); font-size: 12px; color: var(--fg-muted); text-align: center;">
              이미지 ${idx+1}
            </div>
          </div>
        `).join('') : '';

        document.getElementById('result-img').src = finalDataUrl;
        const regenBtn = document.getElementById('btn-regenerate');
        regenBtn.style.display = '';
        regenBtn.disabled = false;
        document.getElementById('regen-left').textContent = `(${state.regenCountLeft}/2)`;
        showView('result');
      } catch (e) {
        toast(e.message || '이미지 생성 실패');
      } finally {
        btn.disabled = false; btn.innerHTML = old;
      }
    }
    document.getElementById('btn-generate').addEventListener('click', generateImage);

    // 임시 테스트용 logincode 자동 입력 (개발 중에만 사용, 프로덕션에서는 제거)
    window.setTestCode = () => document.getElementById('admin-code').value = '1234';

    // ══════════════════════════════════
    // 공유 버튼
    function shareCurrentPage() {
      const url = location.href;
      const copy = () => navigator.clipboard.writeText(url)
        .then(() => toast('링크가 복사되었습니다.'))
        .catch(() => toast('복사에 실패했습니다.'));
      if (navigator.share) {
        navigator.share({ title: 'Signage Maker', url }).catch(copy);
      } else {
        copy();
      }
    }

    function fitTo1080x1920(srcDataUrl) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          const W = 1080, H = 1920;
          const canvas = document.createElement('canvas');
          canvas.width = W; canvas.height = H;
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, W, H);
          const r = Math.min(W / img.width, H / img.height);
          const dw = img.width * r, dh = img.height * r;
          const dx = (W - dw) / 2, dy = (H - dh) / 2;
          ctx.imageSmoothingQuality = 'high';
          ctx.drawImage(img, dx, dy, dw, dh);
          resolve(canvas.toDataURL('image/png'));
        };
        img.onerror = () => reject(new Error('이미지 로드 실패'));
        img.src = srcDataUrl;
      });
    }

    /* ══════════════════════════════════
       Download / Regenerate
    ══════════════════════════════════ */
    document.getElementById('btn-download').addEventListener('click', () => {
      if (!state.currentImageDataUrl) return;
      const a = document.createElement('a');
      a.href = state.currentImageDataUrl;
      const data = loadData();
      const item = data.items.find(x => x.id === state.currentItemId);
      const text = (item?.sourceText || state.sourceText || '이미지').slice(0, 30);
      const stamp = new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
      a.download = `${text}_${stamp}.png`;
      a.click();
    });

    document.getElementById('btn-regenerate').addEventListener('click', async () => {
      if (state.regenCountLeft <= 0) { toast('재생성 가능 횟수를 모두 사용했어요.'); return; }
      const code = document.getElementById('admin-code').value.trim();
      if (!/^\d{4}$/.test(code)) {
        const c = window.prompt('관리자 코드 (4자리)');
        if (!c) return;
        document.getElementById('admin-code').value = c;
      }
      state.regenCountLeft--;
      document.getElementById('regen-left').textContent = `(${state.regenCountLeft}/2)`;
      await generateImage();
    });

    document.getElementById('btn-delete-item').addEventListener('click', () => {
      if (!state.currentItemId) return;
      if (!window.confirm('이 항목을 삭제하시겠어요?\n(되돌릴 수 없습니다)')) return;
      const d = loadData();
      d.items = d.items.filter(x => x.id !== state.currentItemId);
      saveData(d);
      toast('삭제되었습니다.');
      location.hash = '';
      renderGallery();
      showView('home');
    });

    /* ══════════════════════════════════
       Hash share intake
    ══════════════════════════════════ */
    function handleHashShare() {
      const h = location.hash;
      if (!h.startsWith('#share=')) return false;
      try {
        const decoded = b64urlDecode(h.slice(7));
        const shared = JSON.parse(decoded);
        if (shared.type !== 'signage-prompt') return false;
        state.sourceText = shared.sourceText || '';
        state.style = shared.style || '';
        state.finalPrompt = shared.finalPrompt || '';
        state.viewOnly = shared.permission === 'copy' ? 'copy' : 'view';
        document.getElementById('final-prompt').value = state.finalPrompt;
        const banner = document.getElementById('view-only-banner');
        const mode = document.getElementById('view-only-mode');
        banner.style.display = '';
        if (state.viewOnly === 'copy') {
          mode.textContent = '복제가 허용되어 있어 그대로 사용·수정할 수 있습니다.';
          document.getElementById('final-prompt').readOnly = false;
        } else {
          mode.textContent = '보기 전용입니다. 그대로 이미지 생성은 가능하지만 다른 곳에 다시 공유하지는 마세요.';
          document.getElementById('final-prompt').readOnly = false;
        }
        document.getElementById('admin-code').value = '';
        showView('prompt');
        return true;
      } catch { return false; }
    }

    /* ══════════════════════════════════
       Init
    ══════════════════════════════════ */
    renderGallery();
    if (!handleHashShare()) showView('home');
    window.addEventListener('hashchange', () => {
      if (location.hash === '' || location.hash === '#') {
        showView('home'); renderGallery();
      } else handleHashShare();
    });
  </script>
</body>
