<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signage Maker — byeduin</title>
  <link rel="icon" href="/logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="/common/hero-theme.css">
  <script src="/common/theme.js"></script>
  <script src="/common/init.js"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      padding: 56px 1rem 5rem;
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,111,238,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,111,238,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }

    .fd-root { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; }

    .fd-view { display: none; }
    .fd-view.active { display: block; }

    .fd-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }
    .fd-section-title {
      font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--fg-muted); margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .fd-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .fd-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 18px; border-radius: 10px; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
      transition: all 0.15s; min-height: 40px; white-space: nowrap;
    }
    .fd-btn-primary { background: var(--primary); color: #fff; }
    .fd-btn-primary:hover { background: var(--primary-h); }
    .fd-btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .fd-btn-ghost {
      background: var(--card-bg); color: var(--fg-muted);
      border: 1px solid var(--border);
    }
    .fd-btn-ghost:hover { border-color: var(--primary); color: var(--primary); background: rgba(0,111,238,0.06); }
    .fd-btn-success { background: rgba(23,201,100,0.1); color: var(--success); border: 1px solid rgba(23,201,100,0.25); }
    .fd-btn-success:hover { background: rgba(23,201,100,0.2); }
    .fd-btn-danger { background: rgba(243,18,96,0.1); color: var(--danger); border: 1px solid rgba(243,18,96,0.2); }
    .fd-btn-danger:hover { background: rgba(243,18,96,0.18); }
    .fd-btn-sm { padding: 6px 12px; font-size: 12px; min-height: 32px; border-radius: 8px; }

    .fd-input, .fd-select {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px; font-size: 14px;
      color: var(--fg); outline: none; transition: border-color 0.2s;
      font-family: inherit;
    }
    .fd-input:focus, .fd-select:focus { border-color: var(--primary); }
    .fd-textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 14px; font-size: 13px;
      color: var(--fg); outline: none; resize: vertical; min-height: 120px;
      font-family: inherit; line-height: 1.6;
      transition: border-color 0.2s;
    }
    .fd-textarea:focus { border-color: var(--primary); }
    .fd-label { display:block; font-size:12px; font-weight:600; color:var(--fg-muted); margin: 14px 0 6px; }

    /* Home */

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .gallery-item {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      display: flex; flex-direction: column;
      animation: fadeUp 0.25s ease both;
    }
    .gallery-item:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,111,238,0.1);
    }
    .gallery-thumb {
      width: 100%; aspect-ratio: 9/16; background: var(--bg);
      display:block; object-fit: cover;
    }
    .gallery-meta { padding: 12px; }
    .gallery-meta .d { font-size: 11px; color: var(--fg-muted); }

    .empty {
      text-align: center; padding: 48px 24px; color: var(--fg-muted);
      border: 1px dashed var(--border); border-radius: 14px;
      line-height: 1.7; background: rgba(0,111,238,0.02);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-title { font-size: 14px; font-weight: 600; color: var(--fg); margin-bottom: 4px; }
    .empty-text { font-size: 13px; margin-bottom: 16px; }

    /* Home top */
    .home-top {
      display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Result preview */
    .result-img {
      width: 100%; max-width: 360px; aspect-ratio: 9/16;
      background: #fff; border: 1px solid var(--border); border-radius: 12px;
      object-fit: contain; display: block; margin: 0 auto;
    }

    .row { display:flex; gap:8px; flex-wrap: wrap; }
    .grow { flex: 1 1 auto; }

    #toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--fg); color: var(--bg);
      padding: 10px 18px; border-radius: 10px;
      font-size: 13px; font-weight: 600;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s, transform 0.2s; z-index: 9999; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .spinner {
      width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hint { font-size: 12px; color: var(--fg-muted); margin-top: 6px; }

    .view-only-banner {
      background: rgba(0,111,238,0.08); color: var(--primary);
      border: 1px solid rgba(0,111,238,0.25);
      padding: 10px 14px; border-radius: 10px; font-size: 13px;
      margin-bottom: 16px;
    }
  </style>
</head>

  <script>
    /* ══════════════════════════════════
       헬퍼 함수
    ══════════════════════════════════ */
    function downloadFromButton(button) {
      const dataUrl = button.dataset.img;
      const filename = button.dataset.filename;

      console.log('다운로드 시작:', { filename, dataUrlLength: dataUrl ? dataUrl.length : 0 });

      if (!dataUrl) {
        console.error('이미지 데이터 없음');
        alert('이미지를 불러올 수 없습니다.');
        return false;
      }

      try {
        // 방법 1: 직접 다운로드 (data URL이면 작동)
        console.log('방법 1: 직접 다운로드 시도');
        const a = document.createElement('a');
        a.href = dataUrl;
        a.download = filename;
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        setTimeout(() => document.body.removeChild(a), 100);
        console.log('✓ 방법 1 성공');
        return true;
      } catch (e1) {
        console.warn('방법 1 실패:', e1.message);

        try {
          // 방법 2: blob 변환
          console.log('방법 2: blob 변환 시도');
          if (!dataUrl.includes(',')) {
            throw new Error('유효한 data URL 형식 아님');
          }

          const parts = dataUrl.split(',');
          const mimeMatch = parts[0].match(/:(.*?);/);
          const mime = mimeMatch ? mimeMatch[1] : 'image/png';
          const bstr = atob(parts[1]);
          const n = bstr.length;
          const u8arr = new Uint8Array(n);
          for (let i = 0; i < n; i++) {
            u8arr[i] = bstr.charCodeAt(i);
          }
          const blob = new Blob([u8arr], { type: mime });
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.href = url;
          link.download = filename;
          link.style.display = 'none';
          document.body.appendChild(link);
          link.click();
          setTimeout(() => document.body.removeChild(link), 100);
          setTimeout(() => URL.revokeObjectURL(url), 200);
          console.log('✓ 방법 2 성공');
          return true;
        } catch (e2) {
          console.error('방법 2 실패:', e2.message);
          console.error('전체 오류 스택:', e2);
          alert('다운로드 실패했습니다.\n개발자 도구 콘솔을 확인해주세요: F12 → Console');
          return false;
        }
      }
    }

    /* ══════════════════════════════════
       상태 / IndexedDB 저장소
    ══════════════════════════════════ */
    const STORAGE_KEY = 'vives-signage';
    const DB_NAME = 'vives-signage-db';
    const DB_VERSION = 1;
    const STORE_NAME = 'images';

    const STYLE_PRESETS = [
      '귀엽고 산뜻한 느낌',
      '차분하고 정돈된 학교 공지 스타일',
      '활기찬 포스터/플래카드 풍',
      '미니멀 타이포그래피 중심',
      '손그림/일러스트풍',
    ];

    let dbInstance = null;

    async function initDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onerror = () => reject(req.error);
        req.onsuccess = () => {
          dbInstance = req.result;
          resolve(dbInstance);
        };
        req.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME);
          }
        };
      });
    }

    async function loadData() {
      try {
        if (!dbInstance) await initDB();
        return new Promise((resolve) => {
          const tx = dbInstance.transaction(STORE_NAME, 'readonly');
          const store = tx.objectStore(STORE_NAME);
          const req = store.get(STORAGE_KEY);
          req.onsuccess = () => {
            const d = req.result;
            if (!d || !Array.isArray(d.items)) {
              resolve({ items: [] });
            } else {
              resolve(d);
            }
          };
          req.onerror = () => resolve({ items: [] });
        });
      } catch { return { items: [] }; }
    }

    async function saveData(d) {
      if (!dbInstance) await initDB();
      return new Promise((resolve, reject) => {
        const tx = dbInstance.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        const req = store.put(d, STORAGE_KEY);
        req.onsuccess = () => resolve();
        req.onerror = () => reject(req.error);
      });
    }

    async function saveDataWithCleanup(d) {
      try {
        // 첫 시도
        await saveData(d);
        return true;
      } catch (e) {
        // 저장 실패 시 가장 오래된 아이템 삭제 후 재시도
        console.warn('저장 실패, 오래된 아이템 정리 중...', e);

        if (!d.items || d.items.length === 0) {
          throw new Error('저장할 데이터가 없습니다.');
        }

        // 가장 오래된 아이템 찾기
        const sortedItems = [...d.items].sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
        const oldestItem = sortedItems[0];

        if (!oldestItem) {
          throw e; // 재시도 할 아이템이 없음
        }

        console.log('가장 오래된 아이템 삭제:', { id: oldestItem.id, createdAt: new Date(oldestItem.createdAt).toLocaleString('ko-KR') });

        // 오래된 아이템 제거
        d.items = d.items.filter(x => x.id !== oldestItem.id);

        // 재저장 시도
        try {
          await saveData(d);
          console.log('✓ 아이템 삭제 후 저장 성공');
          return true;
        } catch (e2) {
          // 여전히 실패하면 더 많이 삭제 (최대 3개)
          console.warn('여전히 실패, 추가 정리 중...');
          for (let i = 1; i < Math.min(3, sortedItems.length); i++) {
            const item = sortedItems[i];
            console.log(`아이템 ${i}개 더 삭제:`, item.id);
            d.items = d.items.filter(x => x.id !== item.id);
            try {
              await saveData(d);
              console.log('✓ 추가 정리 후 저장 성공');
              return true;
            } catch {}
          }
          throw e2;
        }
      }
    }

    let state = {
      sourceText: '',
      style: '',
      finalPrompt: '',
      currentImageDataUrl: null,
      currentItemId: null,
      generatedImages: [], // 현재 세션의 생성 이미지들
      regenCountLeft: 2,
      viewOnly: null, // 'view' | 'copy' | null
      isExistingItem: false, // 갤러리에서 열었는지 새로 생성했는지
    };

    /* ══════════════════════════════════
       View routing
    ══════════════════════════════════ */
    function showView(name) {
      document.querySelectorAll('.fd-view').forEach(v => v.classList.remove('active'));
      const el = document.getElementById('view-' + name);
      if (el) el.classList.add('active');
      window.scrollTo(0, 0);
    }

    document.querySelectorAll('[data-go]').forEach(b => {
      b.addEventListener('click', async () => {
        if (b.dataset.go === 'home') {
          location.hash = '';
          await renderGallery();
          showView('home');
        } else {
          showView(b.dataset.go);
        }
      });
    });

    /* ══════════════════════════════════
       Toast
    ══════════════════════════════════ */
    let toastTimer;
    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
    }

    /* ══════════════════════════════════
       Gallery
    ══════════════════════════════════ */
    function fmtDate(ts) {
      const d = new Date(ts);
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }
    async function renderGallery() {
      const wrap = document.getElementById('gallery-wrap');
      const data = await loadData();
      if (!data.items.length) {
        wrap.innerHTML = `<div class="empty">
          <div class="empty-icon">🖼️</div>
          <div class="empty-title">아직 생성된 이미지가 없어요</div>
          <div class="empty-text">위의 <strong>새 이미지</strong> 버튼으로 시작해 보세요.</div>
        </div>`;
        return;
      }
      const items = [...data.items].sort((a, b) => b.createdAt - a.createdAt);
      wrap.innerHTML = `<div class="gallery-grid">${items.map(it => {
        const thumb = (it.images && it.images.length > 0) ? it.images[it.images.length - 1] : it.imageDataUrl;
        return `
        <div class="gallery-item" data-id="${it.id}">
          <img class="gallery-thumb" src="${thumb}" alt="" loading="lazy" />
          <div class="gallery-meta">
            <div class="d">${fmtDate(it.createdAt)}</div>
          </div>
        </div>`;
      }).join('')}</div>`;
      wrap.querySelectorAll('.gallery-item').forEach(el => {
        el.addEventListener('click', () => openItem(el.dataset.id));
      });
    }
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    async function openItem(id) {
      const data = await loadData();
      const it = data.items.find(x => x.id === id);
      if (!it) return;
      state.sourceText = it.sourceText || '';
      state.style = it.style || '';
      state.finalPrompt = it.finalPrompt || '';
      state.currentImageDataUrl = it.imageDataUrl;
      state.currentItemId = it.id;
      state.isExistingItem = true; // 갤러리에서 열었음을 표시
      state.generatedImages = it.images || [it.imageDataUrl];

      // 메타데이터 표시
      document.getElementById('result-text').textContent = state.sourceText || '—';
      document.getElementById('result-style').textContent = state.style || '—';
      const createdTime = it.createdAt
        ? new Date(it.createdAt).toLocaleString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' })
        : '—';
      document.getElementById('result-created').textContent = createdTime;

      // 이미지 갤러리 표시
      const container = document.getElementById('result-images-container');
      const allImages = state.generatedImages;
      container.innerHTML = allImages.map((img, idx) => {
        const text = (it.sourceText || '이미지').slice(0, 30);
        const stamp = new Date(it.createdAt).toISOString().replace(/[:.]/g,'-').slice(0,19);
        return `
          <div style="border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: var(--card-bg);">
            <img src="${img}" alt="생성 이미지 ${idx+1}" style="width: 100%; aspect-ratio: 9/16; object-fit: cover; display: block;" />
            <div style="padding: 10px; text-align: center;">
              <button class="fd-btn fd-btn-success fd-btn-sm" style="width: 100%;"
                      data-img="${img.replace(/"/g, '&quot;')}"
                      data-filename="${(text + '_' + stamp + '.png').replace(/"/g, '&quot;')}"
                      onclick="downloadFromButton(this)">⬇ 다운로드</button>
            </div>
          </div>
        `;
      }).join('');

      // 이미지가 1개 또는 2개면 "더 만들어 보기" 버튼 표시
      const regenBtn = document.getElementById('btn-regenerate');
      if (allImages.length >= 3) {
        regenBtn.style.display = 'none';
      } else {
        regenBtn.style.display = '';
        regenBtn.disabled = false;
      }
      showView('result');
    }

    /* ══════════════════════════════════
       Compose
    ══════════════════════════════════ */
    document.getElementById('btn-new').addEventListener('click', () => {
      document.getElementById('src-text').value = '';
      document.getElementById('style-preset').value = STYLE_PRESETS[0];
      document.getElementById('style-custom').style.display = 'none';
      document.getElementById('style-custom').value = '';
      state.generatedImages = [];
      state.currentItemId = null;
      showView('compose');
    });

    document.getElementById('style-preset').addEventListener('change', (e) => {
      const cust = document.getElementById('style-custom');
      cust.style.display = e.target.value === '__custom__' ? 'block' : 'none';
    });

    document.getElementById('btn-make-prompt').addEventListener('click', async () => {
      const text = document.getElementById('src-text').value.trim();
      const sel = document.getElementById('style-preset').value;
      const style = sel === '__custom__'
        ? document.getElementById('style-custom').value.trim()
        : sel;
      if (!text) { toast('삽입할 텍스트를 입력해 주세요.'); return; }
      if (sel === '__custom__' && !style) { toast('스타일을 입력해 주세요.'); return; }

      const btn = document.getElementById('btn-make-prompt');
      btn.disabled = true;
      const old = btn.innerHTML;
      btn.innerHTML = '<span class="spinner"></span> 생성 중…';
      try {
        const res = await fetch('/.netlify/functions/signage-prompt', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, style }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '실패');
        state.sourceText = text;
        state.style = style;
        state.finalPrompt = data.prompt;
        state.viewOnly = null;
        document.getElementById('view-only-banner').style.display = 'none';
        document.getElementById('final-prompt').value = state.finalPrompt;
        document.getElementById('admin-code').value = '';
        document.getElementById('btn-generate').disabled = false;
        showView('prompt');
      } catch (e) {
        toast(e.message || '프롬프트 생성 실패');
      } finally {
        btn.disabled = false; btn.innerHTML = old;
      }
    });

    document.getElementById('btn-back-compose').addEventListener('click', () => showView('compose'));

    /* ══════════════════════════════════
       Share (vives-share base64url)
    ══════════════════════════════════ */
    function b64urlEncode(str) {
      return btoa(unescape(encodeURIComponent(str)))
        .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    }
    function b64urlDecode(s) {
      const raw = s.replace(/-/g,'+').replace(/_/g,'/');
      const pad = (4 - raw.length % 4) % 4;
      return decodeURIComponent(escape(atob(raw + '='.repeat(pad))));
    }

    async function makeShareLink(permission) {
      state.finalPrompt = document.getElementById('final-prompt').value.trim();
      if (!state.finalPrompt) { toast('공유할 프롬프트가 없습니다.'); return; }
      const payload = JSON.stringify({
        type: 'signage-prompt',
        sourceText: state.sourceText,
        style: state.style,
        finalPrompt: state.finalPrompt,
        permission,
      });
      const longUrl = `${location.origin}/signage-maker/#share=${b64urlEncode(payload)}`;
      let url = longUrl;
      try {
        const res = await fetch('/.netlify/functions/shorten', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: longUrl }),
        });
        const data = await res.json();
        if (res.ok && data.shortURL) url = data.shortURL;
      } catch {}
      try {
        await navigator.clipboard.writeText(url);
        toast('공유 링크가 클립보드에 복사되었습니다.');
      } catch {
        prompt('아래 링크를 복사하세요:', url);
      }
    }
    document.getElementById('btn-share-view').addEventListener('click', () => makeShareLink('view'));
    document.getElementById('btn-share-copy').addEventListener('click', () => makeShareLink('copy'));

    /* ══════════════════════════════════
       Image generation + 1080x1920 변환
    ══════════════════════════════════ */
    async function generateImage() {
      // final-prompt 필드가 있으면 그 값을 사용, 없으면 state.finalPrompt 사용 (갤러리에서 열었을 때)
      const finalPromptEl = document.getElementById('final-prompt');
      const prompt = finalPromptEl ? finalPromptEl.value.trim() : state.finalPrompt;
      const code = document.getElementById('admin-code').value.trim();
      if (!prompt) { toast('프롬프트가 비어 있습니다.'); return; }
      if (!/^\d{4}$/.test(code)) { toast('관리자 코드는 4자리 숫자입니다.'); return; }

      const btn = document.getElementById('btn-generate');
      btn.disabled = true;
      const old = btn.innerHTML;
      btn.innerHTML = '<span class="spinner"></span> 생성 중… (10~30초)';
      try {
        const res = await fetch('/.netlify/functions/signage-image', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt, code }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '실패');
        const srcDataUrl = `data:image/png;base64,${data.b64}`;
        const finalDataUrl = await fitTo1080x1920(srcDataUrl);

        state.finalPrompt = prompt;
        state.currentImageDataUrl = finalDataUrl;
        state.generatedImages.push(finalDataUrl);

        let item;
        const d = await loadData();
        let saveSuccess = false;
        if (state.currentItemId) {
          // 기존 item에 이미지 추가 (재생성의 경우)
          item = d.items.find(x => x.id === state.currentItemId);
          if (item) {
            item.images = state.generatedImages;
          }
        } else {
          // 새로운 item 생성
          item = {
            id: 'sg_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
            title: (state.sourceText || '').split('\n')[0].slice(0, 40) || '제목 없음',
            createdAt: Date.now(),
            sourceText: state.sourceText,
            style: state.style,
            finalPrompt: state.finalPrompt,
            imageDataUrl: finalDataUrl,
            images: state.generatedImages,
          };
          d.items.push(item);
          state.currentItemId = item.id;
        }

        try {
          await saveDataWithCleanup(d);
          saveSuccess = true;
        } catch (e) {
          console.error('저장 실패:', e.message);
          toast('저장 실패했습니다. 다시 시도해 주세요.');
          // 방금 추가한 항목 제거
          d.items = d.items.filter(x => x.id !== item.id);
          try {
            await saveDataWithCleanup(d);
          } catch {}
          btn.disabled = false;
          btn.innerHTML = old;
          return;
        }

        if (!saveSuccess) {
          btn.disabled = false;
          btn.innerHTML = old;
          return;
        }

        state.regenCountLeft = 2;
        state.isExistingItem = false; // 새로 생성한 아이템
        const createdAt = Date.now();

        // 메타데이터 표시
        document.getElementById('result-text').textContent = state.sourceText || '—';
        document.getElementById('result-style').textContent = state.style || '—';
        const createdTime = new Date(createdAt).toLocaleString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });
        document.getElementById('result-created').textContent = createdTime;

        // 이미지 갤러리 표시
        const container = document.getElementById('result-images-container');
        const stamp = new Date(createdAt).toISOString().replace(/[:.]/g,'-').slice(0,19);
        const dlText = (state.sourceText || '이미지').slice(0, 30);

        container.innerHTML = state.generatedImages.map((img, idx) => `
          <div style="border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: var(--card-bg);">
            <img src="${img}" alt="생성 이미지 ${idx+1}" style="width: 100%; aspect-ratio: 9/16; object-fit: cover; display: block;" />
            <div style="padding: 10px; text-align: center;">
              <button class="fd-btn fd-btn-success fd-btn-sm" style="width: 100%;"
                      data-img="${img.replace(/"/g, '&quot;')}"
                      data-filename="${(dlText + '_' + stamp + '.png').replace(/"/g, '&quot;')}"
                      onclick="downloadFromButton(this)">⬇ 다운로드</button>
            </div>
          </div>
        `).join('');

        const regenBtn = document.getElementById('btn-regenerate');
        // 이미지가 3개면 버튼 숨김, 아니면 표시
        if (state.generatedImages.length >= 3) {
          regenBtn.style.display = 'none';
        } else {
          regenBtn.style.display = '';
          regenBtn.disabled = false;
        }
        showView('result');
      } catch (e) {
        toast(e.message || '이미지 생성 실패');
      } finally {
        btn.disabled = false; btn.innerHTML = old;
      }
    }
    document.getElementById('btn-generate').addEventListener('click', generateImage);

    // 임시 테스트용 logincode 자동 입력 (개발 중에만 사용, 프로덕션에서는 제거)
    window.setTestCode = () => document.getElementById('admin-code').value = '1234';

    // ══════════════════════════════════
    // 공유 버튼
    function shareCurrentPage() {
      const url = location.href;
      const copy = () => navigator.clipboard.writeText(url)
        .then(() => toast('링크가 복사되었습니다.'))
        .catch(() => toast('복사에 실패했습니다.'));
      if (navigator.share) {
        navigator.share({ title: 'Signage Maker', url }).catch(copy);
      } else {
        copy();
      }
    }

    function fitTo1080x1920(srcDataUrl) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          const W = 1080, H = 1920;
          const canvas = document.createElement('canvas');
          canvas.width = W; canvas.height = H;
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, W, H);
          const r = Math.min(W / img.width, H / img.height);
          const dw = img.width * r, dh = img.height * r;
          const dx = (W - dw) / 2, dy = (H - dh) / 2;
          ctx.imageSmoothingQuality = 'high';
          ctx.drawImage(img, dx, dy, dw, dh);
          resolve(canvas.toDataURL('image/png'));
        };
        img.onerror = () => reject(new Error('이미지 로드 실패'));
        img.src = srcDataUrl;
      });
    }

    /* ══════════════════════════════════
       Regenerate
    ══════════════════════════════════ */
    document.getElementById('btn-regenerate').addEventListener('click', async () => {
      if (state.regenCountLeft <= 0) { toast('재생성 가능 횟수를 모두 사용했어요.'); return; }

      // 프롬프트 화면으로 이동하면서 기존 프롬프트 표시
      document.getElementById('final-prompt').value = state.finalPrompt || '';
      document.getElementById('admin-code').value = '';
      document.getElementById('final-prompt').readOnly = false;
      showView('prompt');
    });

    document.getElementById('btn-delete-item').addEventListener('click', async () => {
      if (!state.currentItemId) return;
      if (!window.confirm('이 항목을 삭제하시겠어요?\n(되돌릴 수 없습니다)')) return;
      const d = await loadData();
      d.items = d.items.filter(x => x.id !== state.currentItemId);
      await saveData(d);
      toast('삭제되었습니다.');
      location.hash = '';
      await renderGallery();
      showView('home');
    });

    /* ══════════════════════════════════
       Hash share intake
    ══════════════════════════════════ */
    function handleHashShare() {
      const h = location.hash;
      if (!h.startsWith('#share=')) return false;
      try {
        const decoded = b64urlDecode(h.slice(7));
        const shared = JSON.parse(decoded);
        if (shared.type !== 'signage-prompt') return false;
        state.sourceText = shared.sourceText || '';
        state.style = shared.style || '';
        state.finalPrompt = shared.finalPrompt || '';
        state.viewOnly = shared.permission === 'copy' ? 'copy' : 'view';
        document.getElementById('final-prompt').value = state.finalPrompt;
        const banner = document.getElementById('view-only-banner');
        const mode = document.getElementById('view-only-mode');
        banner.style.display = '';
        if (state.viewOnly === 'copy') {
          mode.textContent = '복제가 허용되어 있어 그대로 사용·수정할 수 있습니다.';
          document.getElementById('final-prompt').readOnly = false;
        } else {
          mode.textContent = '보기 전용입니다. 그대로 이미지 생성은 가능하지만 다른 곳에 다시 공유하지는 마세요.';
          document.getElementById('final-prompt').readOnly = false;
        }
        document.getElementById('admin-code').value = '';
        showView('prompt');
        return true;
      } catch { return false; }
    }

    /* ══════════════════════════════════
       Init
    ══════════════════════════════════ */
    (async () => {
      await initDB();
      await renderGallery();
      if (!handleHashShare()) showView('home');
    })();

    window.addEventListener('hashchange', async () => {
      if (location.hash === '' || location.hash === '#') {
        showView('home');
        await renderGallery();
      } else handleHashShare();
    });
  </script>
